<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IM 70.3 墾丁 鐵人三項訓練營 | 線上報名表</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        /* 隱藏原生卷軸，讓畫面更乾淨 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased selection:bg-sky-200 selection:text-sky-900">

    <nav class="fixed w-full z-50 glass-card border-b border-gray-200 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-2">
                    <a href="camp.html" class="flex items-center space-x-2">
                        <i class="fas fa-swimmer text-orange-600 text-xl"></i>
                        <span class="font-bold text-xl tracking-tight text-slate-900">川岳中醫 <span class="text-gray-400 font-light">x</span> 光聿KUANGYU</span>
                    </a>
                </div>
                <div>
                    <a href="camp.html" class="text-sm font-medium text-slate-500 hover:text-sky-600 transition">返回簡章</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 pt-28 pb-16">
        
        <section class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="bg-slate-900 p-8 text-center text-white relative overflow-hidden">
                <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
                <h2 class="text-3xl font-black relative z-10 tracking-wide">IM 70.3 墾丁訓練營</h2>
                <p class="text-sky-200 text-sm mt-3 relative z-10 font-medium tracking-wider">線上報名系統</p>
            </div>
            
            <form id="trainingForm" class="p-6 md:p-10 space-y-10">
                
                <div>
                    <h3 class="text-lg font-bold text-slate-900 border-b-2 border-slate-100 pb-3 mb-6 flex items-center">
                        <i class="fas fa-id-card text-sky-600 mr-2 w-5"></i> 01 / 基本與保險資料
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">姓名 <span class="text-orange-500">*</span></label>
                            <input type="text" name="name" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-slate-800 outline-none transition bg-slate-50 focus:bg-white">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">性別 <span class="text-orange-500">*</span></label>
                            <select name="gender" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-slate-800 outline-none transition bg-slate-50 focus:bg-white">
                                <option value="" disabled selected>請選擇性別</option>
                                <option value="男">男</option>
                                <option value="女">女</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">國籍 <span class="text-orange-500">*</span></label>
                            <input type="text" name="nationality" value="台灣" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-slate-800 outline-none transition bg-slate-50 focus:bg-white">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">出生年月日 <span class="text-orange-500">*</span></label>
                            <input type="date" name="dob" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-slate-800 outline-none transition bg-slate-50 focus:bg-white">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">身分證字號 / 護照號碼 <span class="text-orange-500">*</span></label>
                            <input type="text" name="idNumber" required placeholder="保險用" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-slate-800 outline-none transition bg-slate-50 focus:bg-white uppercase">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">聯絡電話 <span class="text-orange-500">*</span></label>
                            <input type="tel" name="phone" required placeholder="例如：0912345678" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-slate-800 outline-none transition bg-slate-50 focus:bg-white">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Email 信箱 <span class="text-orange-500">*</span></label>
                            <input type="email" name="email" required placeholder="example@email.com" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-slate-800 outline-none transition bg-slate-50 focus:bg-white">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">LINE ID <span class="text-orange-500">*</span></label>
                            <input type="text" name="lineId" required placeholder="加入群組聯絡用" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-slate-800 outline-none transition bg-slate-50 focus:bg-white">
                        </div>
                    </div>
                </div>

                <div>
                    <h3 class="text-lg font-bold text-slate-900 border-b-2 border-slate-100 pb-3 mb-6 flex items-center">
                        <i class="fas fa-phone-alt text-sky-600 mr-2 w-5"></i> 02 / 緊急聯絡資訊
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">聯絡人姓名 <span class="text-orange-500">*</span></label>
                            <input type="text" name="emergName" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-slate-800 outline-none transition bg-slate-50 focus:bg-white">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">關係 <span class="text-orange-500">*</span></label>
                            <input type="text" name="emergRel" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-slate-800 outline-none transition bg-slate-50 focus:bg-white">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">聯絡電話 <span class="text-orange-500">*</span></label>
                            <input type="tel" name="emergPhone" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-slate-800 outline-none transition bg-slate-50 focus:bg-white">
                        </div>
                    </div>
                </div>

                <div>
                    <h3 class="text-lg font-bold text-slate-900 border-b-2 border-slate-100 pb-3 mb-6 flex items-center">
                        <i class="fas fa-layer-group text-sky-600 mr-2 w-5"></i> 03 / 方案與能力調查
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">報名方案 <span class="text-orange-500">*</span></label>
                            <select name="plan" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-slate-800 outline-none transition bg-slate-50 focus:bg-white">
                                <option value="" disabled selected>請選擇方案</option>
                                <option value="基本方案">基本方案 (NT$25,000)</option>
                                <option value="進階方案">進階方案 (NT$45,000)</option>
                                <option value="VIP方案">VIP方案 (NT$55,000)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">三鐵衣尺寸 (Alé 客製化) <span class="text-orange-500">*</span></label>
                            <input type="text" name="size" required placeholder="例如：男上衣M / 褲子L" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-slate-800 outline-none transition bg-slate-50 focus:bg-white">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">51.5km 最佳完賽成績 <span class="text-orange-500">*</span></label>
                        <textarea name="experience" rows="2" required placeholder="請簡述最佳成績 (總時間、游/騎/跑分項)，以利教練評估強度" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-slate-800 outline-none transition bg-slate-50 focus:bg-white resize-none"></textarea>
                    </div>
                </div>

                <div>
                    <h3 class="text-lg font-bold text-slate-900 border-b-2 border-slate-100 pb-3 mb-6 flex items-center">
                        <i class="fas fa-wallet text-sky-600 mr-2 w-5"></i> 04 / 付款方式
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">繳費方式 <span class="text-orange-500">*</span></label>
                            <select name="paymentMethod" id="paymentMethod" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-slate-800 outline-none transition bg-slate-50 focus:bg-white">
                                <option value="" disabled selected>請選擇付款方式</option>
                                <option value="匯款">銀行匯款 / ATM 轉帳</option>
                                <option value="現金">現場現金繳納</option>
                                <option value="LINE PAY">LINE PAY</option>
                            </select>
                        </div>
                        <div id="bankDetails" class="hidden">
                            <label class="block text-sm font-bold text-slate-700 mb-2">轉帳帳號後五碼 <span class="text-orange-500">*</span></label>
                            <input type="text" name="bankLastFive" id="bankLastFiveInput" placeholder="以便對帳使用" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-slate-800 outline-none transition bg-slate-50 focus:bg-white">
                            <div class="mt-3 p-3 bg-slate-100 rounded border border-slate-200 text-sm text-slate-600">
                                <span class="font-bold text-slate-800">匯款資訊：</span>國泰世華 (013) <br>帳號：269506136805 / 戶名：費聿凡
                            </div>
                        </div>
                    </div>
                </div>

                <div>
                    <h3 class="text-lg font-bold text-slate-900 border-b-2 border-slate-100 pb-3 mb-6 flex items-center">
                        <i class="fas fa-comment-dots text-sky-600 mr-2 w-5"></i> 05 / 其他備註
                    </h3>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">備註與期望 (選填)</label>
                        <textarea name="notes" rows="3" placeholder="如有特殊過敏史、傷病史或對訓練營的期望，請在此提出" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-slate-800 outline-none transition bg-slate-50 focus:bg-white resize-none"></textarea>
                    </div>
                </div>

                <div class="pt-6">
                    <div class="space-y-4">
                        <label class="flex items-start cursor-pointer group">
                            <div class="flex items-center h-5 mt-0.5">
                                <input type="checkbox" required class="w-4 h-4 text-sky-600 bg-gray-100 border-gray-300 rounded focus:ring-sky-500">
                            </div>
                            <div class="ml-3 text-sm text-slate-600 group-hover:text-slate-900 transition">
                                我已詳閱並同意報名與退費機制（開訓後因個人因素恕不提供中途退費或遞補）。
                            </div>
                        </label>
                        <label class="flex items-start cursor-pointer group">
                            <div class="flex items-center h-5 mt-0.5">
                                <input type="checkbox" required class="w-4 h-4 text-sky-600 bg-gray-100 border-gray-300 rounded focus:ring-sky-500">
                            </div>
                            <div class="ml-3 text-sm text-slate-600 group-hover:text-slate-900 transition">
                                我確認自身健康狀況良好，並同意戶外訓練安全聲明（配合教練指示，對自身安全負最終責任）。
                            </div>
                        </label>
                        <label class="flex items-start cursor-pointer group">
                            <div class="flex items-center h-5 mt-0.5">
                                <input type="checkbox" required class="w-4 h-4 text-sky-600 bg-gray-100 border-gray-300 rounded focus:ring-sky-500">
                            </div>
                            <div class="ml-3 text-sm text-slate-600 group-hover:text-slate-900 transition">
                                我同意授權訓練營側拍影像，供川岳與光聿團隊作為社群分享及活動宣傳使用。
                            </div>
                        </label>
                    </div>
                </div>

                <div class="pt-6 border-t border-gray-200">
                    <button type="submit" id="submitBtn" class="w-full bg-sky-600 text-white font-bold py-4 px-6 rounded-lg shadow hover:bg-sky-700 transition transform active:scale-[0.99] text-lg tracking-widest">
                        確認送出報名
                    </button>
                    <div id="statusContainer" class="hidden mt-6 p-4 rounded-lg text-center border">
                        <p id="statusMsg" class="font-bold"></p>
                    </div>
                </div>
            </form>
        </section>

    </main>

    <footer class="bg-slate-900 text-slate-400 py-10 text-center text-sm">
        <p class="tracking-wider">Copyright &copy; 2026 川岳中醫 x 光聿KUANGYU. All rights reserved.</p>
    </footer>

    <script>
        // 處理匯款欄位的顯示與隱藏
        const paymentMethodSelect = document.getElementById('paymentMethod');
        const bankDetails = document.getElementById('bankDetails');
        const bankLastFiveInput = document.getElementById('bankLastFiveInput');

        paymentMethodSelect.addEventListener('change', function(e) {
            if (e.target.value === '匯款') {
                bankDetails.classList.remove('hidden');
                bankLastFiveInput.setAttribute('required', 'required');
            } else {
                bankDetails.classList.add('hidden');
                bankLastFiveInput.removeAttribute('required');
                bankLastFiveInput.value = '';
            }
        });

        // 處理表單送出
        document.getElementById('trainingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const form = e.target;
            const submitBtn = document.getElementById('submitBtn');
            const statusContainer = document.getElementById('statusContainer');
            const statusMsg = document.getElementById('statusMsg');
            
            // 請確保此處為您測試成功的 GAS URL
            const scriptUrl = 'https://script.google.com/macros/s/AKfycbyxcVuvzxcV28ddUvu4LO9c7d3lqQT2AIzD29e3LlnEpI_g1E3o3ecFvE5G-3WL9hms1g/exec';
            
            submitBtn.disabled = true;
            submitBtn.textContent = '資料傳送中...';
            submitBtn.classList.add('opacity-70', 'cursor-not-allowed');
            
            statusContainer.classList.remove('hidden', 'bg-green-50', 'border-green-200', 'bg-red-50', 'border-red-200');
            statusContainer.classList.add('bg-slate-50', 'border-slate-200');
            statusMsg.textContent = '正在為您處理報名資訊，請稍候...';
            statusMsg.className = 'font-bold text-slate-600 animate-pulse';
            
            const formData = new FormData(form);
            
            fetch(scriptUrl, {
                method: 'POST',
                body: new URLSearchParams(formData),
                mode: 'no-cors'
            })
            .then(() => {
                statusContainer.classList.remove('bg-slate-50', 'border-slate-200');
                statusContainer.classList.add('bg-green-50', 'border-green-200');
                statusMsg.textContent = '報名資料已成功送出！我們將儘速與您聯絡。';
                statusMsg.className = 'font-bold text-green-700';
                
                submitBtn.textContent = '提交成功';
                form.reset();
                bankDetails.classList.add('hidden');
            })
            .catch(error => {
                console.error('Error:', error);
                statusContainer.classList.remove('bg-slate-50', 'border-slate-200');
                statusContainer.classList.add('bg-red-50', 'border-red-200');
                statusMsg.textContent = '系統提交失敗，請檢查網路連線或稍後再試。';
                statusMsg.className = 'font-bold text-red-700';
                
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
                submitBtn.textContent = '確認送出報名';
            });
        });
    </script>

</body>
</html>
