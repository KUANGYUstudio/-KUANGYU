<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>App 圖示完美比例產生器 V3 (自訂檔名版)</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --primary: #2e67a8;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #334155;
      --text-sub: #64748b;
      --border: #e2e8f0;
    }
    body { 
      font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
      padding: 40px 20px; 
      margin: 0 auto; 
      max-width: 600px; 
      background-color: var(--bg); 
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
    }
    .container {
      background: var(--card-bg); 
      padding: 30px; 
      border-radius: 16px; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.05); 
      border: 1px solid var(--border);
      text-align: center;
    }
    h2 { color: var(--primary); margin-top: 0; }
    p { color: var(--text-sub); font-size: 15px; margin-bottom: 24px; line-height: 1.6; }
    .control-group {
      margin-bottom: 20px;
      text-align: left;
      background: #f1f5f9;
      padding: 16px;
      border-radius: 12px;
    }
    label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
    input[type="file"], input[type="range"], input[type="color"], input[type="text"] { width: 100%; display: block; }
    input[type="file"] { padding: 8px; font-size: 14px; }
    input[type="color"] { border: 1px solid var(--border); border-radius: 4px; padding: 0; height: 40px; cursor: pointer; }
    input[type="text"] { padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; outline: none; }
    input[type="text"]:focus { border-color: var(--primary); }
    .preview-container {
      margin: 30px auto; width: 180px; height: 180px; border-radius: 22.5%; 
      overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.05);
    }
    canvas { display: block; width: 100%; height: 100%; }
    .btn {
      background: var(--primary); color: white; border: none; padding: 14px 24px;
      border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; transition: 0.2s;
    }
    .btn:hover { background: #235284; }
    .btn:disabled { background: #cbd5e1; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="container">
    <h2>高畫質圖示產生器 V3</h2>
    <p>上傳修改好尺寸的 SVG 向量圖示，設定專屬檔案名稱，系統將為您輸出最完美的 App 桌面圖示。</p>

    <div class="control-group">
      <label>1. 上傳 SVG 向量圖示</label>
      <input type="file" id="upload" accept="image/svg+xml, image/png">
    </div>

    <div class="control-group">
      <label>2. 調整圖示大小 (預設 65% 最佳比例)</label>
      <input type="range" id="scale" min="30" max="100" value="65">
      <div style="text-align:right; font-size:12px; color:var(--text-sub);" id="scaleValue">65%</div>
    </div>

    <div class="control-group">
      <label>3. 選擇明亮底色 (預設為純白)</label>
      <input type="color" id="bgColor" value="#ffffff">
    </div>

    <div class="control-group">
      <label>4. 設定輸出檔案名稱 (不需輸入 .png)</label>
      <input type="text" id="fileName" value="icon-final" placeholder="例如: my-icon">
    </div>

    <label style="text-align: center; color: var(--text-sub);">手機桌面銳利度預覽</label>
    <div class="preview-container">
      <canvas id="canvas" width="512" height="512"></canvas>
    </div>

    <button class="btn" id="downloadBtn" disabled>請先上傳圖片</button>
  </div>

  <script>
    const upload = document.getElementById('upload');
    const scaleSlider = document.getElementById('scale');
    const scaleValue = document.getElementById('scaleValue');
    const bgColorPicker = document.getElementById('bgColor');
    const fileNameInput = document.getElementById('fileName');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const downloadBtn = document.getElementById('downloadBtn');

    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';

    let currentImg = null;

    function drawCanvas() {
      ctx.fillStyle = bgColorPicker.value;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (currentImg) {
        const scale = scaleSlider.value / 100;
        const maxDim = Math.max(currentImg.width, currentImg.height);
        const ratio = 512 / maxDim; 
        
        const scaledWidth = currentImg.width * ratio * scale;
        const scaledHeight = currentImg.height * ratio * scale;
        const x = (512 - scaledWidth) / 2;
        const y = (512 - scaledHeight) / 2;

        ctx.drawImage(currentImg, x, y, scaledWidth, scaledHeight);
      }
    }

    drawCanvas();

    function updateBtnText() {
      if (currentImg) {
        let name = fileNameInput.value.trim() || 'icon';
        downloadBtn.textContent = `下載 ${name}.png`;
      }
    }

    upload.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          currentImg = img;
          drawCanvas();
          downloadBtn.disabled = false;
          updateBtnText();
        }
        img.src = event.target.result;
      }
      reader.readAsDataURL(file);
    });

    scaleSlider.addEventListener('input', function(e) {
      scaleValue.textContent = e.target.value + '%';
      drawCanvas();
    });

    bgColorPicker.addEventListener('input', drawCanvas);
    fileNameInput.addEventListener('input', updateBtnText);

    downloadBtn.addEventListener('click', function() {
      if (!currentImg) return;
      let name = fileNameInput.value.trim();
      if (!name) name = 'icon';
      
      const link = document.createElement('a');
      link.download = name + '.png';
      link.href = canvas.toDataURL('image/png', 1.0);
      link.click();
    });
  </script>
</body>
</html>
