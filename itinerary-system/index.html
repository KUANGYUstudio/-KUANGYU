<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>光聿 KUANGYU - 行程小助理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* =========================================
       光聿行程美學定義 (全系統莫蘭迪配色版 + 雙層動態導覽)
       ========================================= */
    :root {
      /* 莫蘭迪活動類別色 */
      --cat-鐵人: #7A9D96;
      --cat-自行車: #A7BEA9;
      --cat-路跑: #D5A4A4;
      --cat-游泳: #8294C4;
      --cat-活動: #ACB1D6;
      --cat-旅遊: #E1D4BB;
      --cat-移地訓練: #967E76;

      /* 系統基礎色 */
      --text-main: #455a64; 
      --text-sub: #78909c; 
      --bg-color: #fdfdfd;
      --card-bg: #ffffff; 
      --brand-main: #546e7a;
      
      /* 莫蘭迪導覽色 (藍灰) */
      --nav-active: #78909c; 
      
      /* 莫蘭迪金幣色 */
      --coin-gold: #dbc67a;
      
      /* 結算色 (輕柔紅) */
      --settle-pink: #e2979c;
      
      --action-button-color: #546e7a;
      --action-button-bg: #eceff1;
    }

    body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; background: var(--bg-color); margin: 0; padding: 0; color: var(--text-main); min-height: 100vh; }
    .container { max-width: 800px; width: 100%; margin: 0 auto; padding: 30px 20px; box-sizing: border-box; text-align: center; }
    
    .header-title { font-size: 26px; font-weight: 800; color: var(--brand-main); letter-spacing: 2px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 12px; }
    .refresh-btn { cursor: pointer; font-size: 14px; background: var(--action-button-bg); color: var(--action-button-color); padding: 6px 8px; border-radius: 50%; font-weight: bold; line-height: 1; display: inline-flex; align-items: center; justify-content: center; transition: 0.2s; }
    .refresh-btn:hover { background: #cfd8dc; }

    .sticky-controls {
        position: sticky;
        top: 0;
        background: rgba(253, 253, 253, 0.95);
        backdrop-filter: blur(10px);
        z-index: 100;
        padding: 10px 0 5px 0;
        border-bottom: 1px solid rgba(0,0,0,0.03);
        margin-bottom: 25px;
    }

    .action-bar { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 15px; }
    .top-btns { display: flex; gap: 10px; align-items: center; }
    
    .acc-toggle-btn { 
        background: var(--coin-gold); 
        color: #fff; 
        border: none; 
        width: 36px; 
        height: 36px; 
        border-radius: 50%; 
        font-weight: 900; 
        cursor: pointer; 
        font-size: 18px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        box-shadow: 0 4px 10px rgba(219, 198, 122, 0.2); 
        transition: 0.2s; 
    }
    .acc-toggle-btn:hover { transform: scale(1.05); filter: brightness(1.05); }
    
    .view-switcher { background: #eceff1; border-radius: 20px; padding: 3px; display: flex; gap: 2px; }
    .view-btn { border: none; padding: 6px 16px; border-radius: 17px; cursor: pointer; font-size: 12px; font-weight: bold; color: #90a4ae; background: transparent; transition: 0.3s; }
    .view-btn.active { background: #fff; color: var(--brand-main); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

    .filter-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
    .filter-btn { padding: 8px 16px; background: #fff; border: 1px solid #e0e0e0; border-radius: 20px; font-size: 13px; font-weight: bold; color: #78909c; cursor: pointer; transition: 0.2s; }
    .filter-btn.active { background: var(--brand-main); color: #fff; border-color: var(--brand-main); }

    .year-nav-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; }
    .year-nav-btn { padding: 4px 14px; border-radius: 15px; background: #f5f5f5; color: #90a4ae; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .year-nav-btn.active { background: var(--nav-active); color: #fff; }

    .month-nav-container { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; padding-bottom: 5px; }
    .month-nav-btn { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid #eceff1; background: #fff; color: #b0bec5; font-size: 14px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .month-nav-btn.has-data { border-color: var(--nav-active); color: var(--nav-active); }
    .month-nav-btn.active { background: var(--nav-active); color: #fff; border-color: var(--nav-active); transform: scale(1.1); }

    #acc-panel { display: none; background: #fff; border-radius: 20px; padding: 25px; margin-bottom: 30px; text-align: left; border: 1px solid #eceff1; animation: fadeIn 0.3s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
    .acc-grand-banner { background: var(--brand-main); color: #fff; padding: 20px; border-radius: 16px; text-align: center; margin-bottom: 25px; }
    .acc-grand-label { font-size: 13px; opacity: 0.8; margin-bottom: 5px; }
    .acc-grand-val { font-size: 32px; font-weight: 900; color: #fff; }

    .acc-title { font-size: 15px; font-weight: 800; margin-bottom: 15px; color: var(--brand-main); display: flex; align-items: center;}
    .acc-title::before { content: ''; display: inline-block; width: 4px; height: 14px; background: var(--nav-active); margin-right: 8px; border-radius: 2px; }
    
    .acc-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 25px; }
    .acc-card { background: #fafafa; padding: 12px 15px; border-radius: 12px; border: 1px solid #f0f0f0; transition: 0.2s;}
    .acc-card:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.03); }
    .acc-label { font-size: 12px; color: #90a4ae; font-weight: bold; }
    .acc-val { font-size: 15px; font-weight: 800; color: var(--brand-main); }
    
    .acc-tabs { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
    .acc-tab-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #e0e0e0; background: #fff; color: #90a4ae; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; }
    .acc-tab-btn.active { background: var(--brand-main); color: #fff; border-color: var(--brand-main); }

    .acc-detail-container { background: #fff; border-radius: 12px; border: 1px solid #eceff1; overflow: hidden; }
    .acc-detail-item { display: flex; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid #f5f5f5; font-size: 14px; }
    .acc-detail-name { color: var(--text-main); font-weight: bold; }
    .acc-detail-amount { color: var(--brand-main); font-weight: 900; }

    .view-container { display: none; text-align: left; }
    .view-container.active { display: block; }

    /* 修復：補回日曆網格排版設定 */
    .past-toggle-btn { text-align: center; color: #90a4ae; font-size: 13px; cursor: pointer; margin-bottom: 20px; font-weight: bold; background: #f5f5f5; padding: 10px; border-radius: 20px; transition: 0.2s; }
    .past-toggle-btn:hover { background: #eceff1; color: var(--brand-main); }

    .month-title { font-weight: 800; font-size: 22px; margin: 20px 0 20px; padding-left: 5px; color: var(--brand-main); }
    .calendar-header, .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .weekday-header { font-weight: bold; font-size: 15px; text-align: center; color: #90a4ae; padding-bottom: 10px; }

    .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 14px; background-color: transparent; color: #cfd8dc; transition: 0.2s ease; font-size: 18px; position: relative; border: 2px solid transparent; }
    .day-number { position: relative; z-index: 2; }
    
    /* 賽事行程：莫蘭迪彩色外框 */
    .day.has-event { background-color: #fff; color: #455a64; cursor: pointer; font-weight: 600; box-shadow: 0 2px 6px rgba(0,0,0,0.03); border-width: 2px; }
    
    /* 日常帳務：莫蘭迪低調點點 */
    .day.has-expense { cursor: pointer; font-weight: 600; color: #455a64; }
    .day.has-expense::after { content: ''; position: absolute; bottom: 4px; width: 4px; height: 4px; border-radius: 50%; background-color: #cfd8dc; transition: 0.2s; }
    
    .day.selected { color: #fff !important; transform: scale(1.05); box-shadow: 0 5px 15px rgba(0,0,0,0.1) !important; z-index: 10; border-color: transparent !important; }
    .day.has-expense.selected { background-color: #b0bec5; } 
    .day.selected::after { background-color: #fff !important; } 

    .list-item { background: #fff; border-radius: 15px; padding: 15px 20px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; cursor: pointer; border: 1px solid #eceff1; transition: 0.2s; border-left: 6px solid #cfd8dc; }
    .list-item:hover { transform: translateX(5px); box-shadow: 0 5px 15px rgba(0,0,0,0.04); }
    .list-date .m { font-size: 11px; color: #90a4ae; display: block; }
    .list-date .d { font-size: 22px; font-weight: 800; color: var(--brand-main); }
    .list-name { font-size: 17px; font-weight: bold; color: var(--brand-main); flex: 1; }
    .list-countdown-days { font-size: 18px; font-weight: 900; color: var(--settle-pink); margin: 0 3px; }

    .detail-panel { grid-column: 1 / -1; background: transparent; border-radius: 16px; margin: 10px 0; max-height: 0; opacity: 0; overflow: hidden; transition: max-height 0.4s ease, opacity 0.3s ease; box-sizing: border-box; width: 100%; }
    .detail-panel.open { max-height: 8000px; opacity: 1; margin-bottom: 30px; text-align: left; overflow: visible; }
    .detail-header { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid #f5f5f5; padding-bottom: 15px; margin-bottom: 20px; }
    .detail-race-name { font-size: 24px; font-weight: 800; color: var(--brand-main); }
    
    .link-btn { font-size: 13px; padding: 6px 14px; background: var(--action-button-bg); color: var(--action-button-color); border-radius: 20px; text-decoration: none; font-weight: bold; display: inline-block; }

    .info-section { margin-bottom: 25px; }
    .info-title { font-weight: bold; font-size: 14px; color: var(--text-sub); margin-bottom: 12px; display: flex; align-items: center; letter-spacing: 0.5px;}
    .info-title::before { content: ''; display: inline-block; width: 6px; height: 16px; margin-right: 10px; border-radius: 3px; background: #eceff1;}
    
    .title-race::before { background: var(--cat-鐵人); }
    .title-stay::before { background: var(--cat-旅遊); }
    .title-trans::before { background: var(--cat-自行車); }
    .title-bill::before { background: var(--settle-pink); }
    
    .info-card { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 10px; font-size: 15px; border-left: 5px solid #eceff1; box-shadow: 0 2px 5px rgba(0,0,0,0.01); }
    .card-race { border-left-color: var(--cat-鐵人); }
    .card-stay { border-left-color: var(--cat-旅遊); }
    .card-trans { border-left-color: var(--cat-自行車); }
    .card-bill { border-left-color: var(--settle-pink); }

    .info-row { display: flex; gap: 12px; margin-bottom: 10px; align-items: baseline; }
    .info-row > span:first-child { color: #90a4ae; min-width: 70px; font-weight: 500;}
    .info-row > span:last-child { color: var(--text-main); flex: 1; font-weight: 500;}
    
    .price-row { display: flex; justify-content: space-between; align-items: center; border-top: 1px dashed #f5f5f5; padding-top: 12px; margin-top: 12px; }
    .price-tag { color: var(--settle-pink); font-weight: 800; font-size: 16px; }
    
    .event-settle-card { background: #fafafa; border: 1.5px solid var(--settle-pink); padding: 10px 16px; border-radius: 12px; display: inline-flex; align-items: baseline; gap: 12px;}

    .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; justify-content: center; align-items: center; z-index: 9999; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div id="loading" class="loading-overlay">正在讀取光聿行程資料...</div>

  <div class="container">
    <div class="header-title">行程小助理 <span class="refresh-btn" onclick="location.reload()">↻</span></div>

    <div class="sticky-controls">
        <div class="action-bar">
          <div class="top-btns">
              <button class="acc-toggle-btn" onclick="toggleAccPanel()">$</button>
              <div class="view-switcher">
                  <button id="btn-cal" class="view-btn active" onclick="switchView('cal')">日曆</button>
                  <button id="btn-list" class="view-btn" onclick="switchView('list')">清單</button>
              </div>
          </div>
          <div id="filter-bar" class="filter-bar"></div>
        </div>
        
        <div id="year-nav" class="year-nav-container"></div>
        <div id="month-nav" class="month-nav-container"></div>
    </div>

    <div id="acc-panel">
      <div class="acc-grand-banner">
        <div id="acc-grand-label-dynamic" class="acc-grand-label">篩選範圍總支出</div>
        <div id="acc-grand-total" class="acc-grand-val">$0</div>
      </div>
      <div style="position: relative; height: 200px; margin-bottom: 25px;"><canvas id="expenseChart"></canvas></div>
      <div class="acc-title">分類佔比</div>
      <div id="dynamic-cat-legend" class="acc-grid"></div>
      <div class="acc-title" style="margin-top:20px;">明細清單</div>
      <div class="acc-tabs" id="acc-tabs"></div>
      <div id="acc-detail-list" class="acc-detail-container"></div>
    </div>

    <div id="cal-view" class="view-container active"><div id="calendar-container"></div></div>
    <div id="list-view" class="view-container"><div id="list-container"></div></div>
  </div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbxUGVmAqfEmepMoAAlY0KkEiGOis9aSR-DpCqA9Nea6ZJZg4YUCg9uBvnJs6HuR0DAjQg/exec";
  let dbData = {};
  let currentFilter = '全部';
  let currentView = 'cal';
  let showPastList = false;
  let selectedMonthFilter = null;
  let displayYear = new Date().getFullYear();

  let accDetailsData = {};
  let currentAccTab = '';
  let expenseChartInstance = null; 

  /* 莫蘭迪帳務分類色，已加入「採買」 */
  const categoryColors = {
      '報名費': '#8294C4', '住宿': '#E1D4BB', '交通': '#7A9D96', '飲食': '#D5A4A4',
      '購物': '#ACB1D6', '採買': '#A7BEA9', '娛樂': '#967E76', '其他': '#A8A8A8'
  };
  function getColorForCategory(cat) { return categoryColors[cat] || '#cfd8dc'; }

  window.onload = initSystem;

  async function initSystem() {
    try {
      const res = await fetch(API_URL + "?t=" + new Date().getTime());
      dbData = await res.json();
      renderFilters();
      renderMain();
      document.getElementById('loading').style.display = 'none';
    } catch (e) {
      document.getElementById('loading').innerHTML = "資料連線失敗";
    }
  }

  window.switchPanelTab = function(btn, tabId) {
      const panel = btn.closest('.detail-panel');
      panel.querySelectorAll('.panel-view-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      panel.querySelectorAll('.panel-tab-content').forEach(c => c.style.display = 'none');
      panel.querySelector('#' + tabId).style.display = 'block';
  }

  function switchView(view) {
      currentView = view;
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-' + view).classList.add('active');
      document.querySelectorAll('.view-container').forEach(c => c.classList.remove('active'));
      document.getElementById(view + '-view').classList.add('active');
      closeCurrentPanel();
      renderMain();
  }

  function renderMain() { 
      renderMonthNav(); 
      if (currentView === 'cal') renderCalendar(); else renderList(); 
  }

  function toggleAccPanel() {
    const panel = document.getElementById('acc-panel');
    const isVisible = panel.style.display === 'block';
    panel.style.display = isVisible ? 'none' : 'block';
    if (!isVisible) calculateAccounting();
  }

  function calculateAccounting() {
    let allExpenses = [];
    const races = currentFilter === '全部' ? dbData['行程'] : dbData['行程'].filter(r => getVal(r, '行程類別') === currentFilter);

    races.forEach(r => {
      const code = getVal(r, '行程代碼');
      const rDate = formatDate(getVal(r, '日期'));
      const regFee = parseFloat(getVal(r, '報名費總額')) || 0;
      if (regFee > 0) allExpenses.push({ date: rDate, category: '報名費', amount: regFee, name: getVal(r, '行程名稱') });
      (dbData['住宿']||[]).filter(s => getVal(s,'行程代碼')===code).forEach(s => {
        const fee = parseFloat(getVal(s,'費用')) || 0;
        if (fee > 0) allExpenses.push({ date: formatDate(getVal(s, '入住日期')) || rDate, category: '住宿', amount: fee, name: getVal(s,'飯店名稱') || getVal(r, '行程名稱') });
      });
      (dbData['交通']||[]).filter(t => getVal(t,'行程代碼')===code).forEach(t => {
        const fee = parseFloat(getVal(t,'票價或油資')) || 0;
        if (fee > 0) allExpenses.push({ date: formatDate(getVal(t, '出發日期')) || rDate, category: '交通', amount: fee, name: getVal(t,'類型') || getVal(r, '行程名稱') });
      });
      (dbData['帳務明細']||[]).filter(b => getVal(b,'行程代碼')===code).forEach(b => {
        const fee = parseFloat(getVal(b,'金額')) || 0;
        if (fee > 0) allExpenses.push({ date: formatDate(getVal(b, '日期')) || rDate, category: getVal(b, '類別') || '其他', amount: fee, name: getVal(b,'項目') || getVal(r, '行程名稱') });
      });
    });

    if (currentFilter === '全部') {
        (dbData['帳務明細']||[]).filter(b => !getVal(b, '行程代碼') || getVal(b, '行程代碼').trim() === '').forEach(b => {
            const fee = parseFloat(getVal(b,'金額')) || 0;
            if (fee > 0) allExpenses.push({ date: formatDate(getVal(b, '日期')), category: getVal(b, '類別') || '其他', amount: fee, name: getVal(b,'項目') || '日常記帳' });
        });
    }

    const now = new Date();
    const currentMonthKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
    let filteredExpenses = allExpenses.filter(e => {
        if (!e.date) return false;
        const eMonth = e.date.substring(0, 7);
        if (selectedMonthFilter) {
            return eMonth === selectedMonthFilter;
        } else {
            return eMonth >= currentMonthKey;
        }
    });

    document.getElementById('acc-grand-label-dynamic').textContent = selectedMonthFilter ? `${selectedMonthFilter.replace('-', '年')}月 總支出` : `本月與未來 總支出`;

    let categoryTotals = {};
    let grandTotal = 0;
    accDetailsData = {}; 

    filteredExpenses.forEach(e => {
        let cat = e.category;
        if (!categoryTotals[cat]) {
            categoryTotals[cat] = 0;
            accDetailsData[cat] = [];
        }
        categoryTotals[cat] += e.amount;
        grandTotal += e.amount;
        accDetailsData[cat].push({ name: e.name, amount: e.amount });
    });

    document.getElementById('acc-grand-total').textContent = '$' + grandTotal.toLocaleString();

    let sortedCats = Object.keys(categoryTotals).sort((a,b) => categoryTotals[b] - categoryTotals[a]);
    const pGrid = document.getElementById('dynamic-cat-legend');
    pGrid.innerHTML = '';
    
    let chartLabels = [];
    let chartData = [];
    let chartColors = [];

    sortedCats.forEach(k => {
      const val = categoryTotals[k];
      const pct = grandTotal === 0 ? 0 : (val / grandTotal) * 100;
      const color = getColorForCategory(k);
      
      chartLabels.push(k);
      chartData.push(val);
      chartColors.push(color);

      pGrid.innerHTML += `
        <div class="acc-card" style="display:flex; justify-content:space-between; align-items:center; padding: 10px 15px;">
            <div style="display:flex; align-items:center; gap: 8px;">
                <div style="width:12px; height:12px; border-radius:3px; background:${color};"></div>
                <span class="acc-label" style="margin:0; font-size:13px; color:var(--text-main);">${k}</span>
            </div>
            <div style="text-align:right;">
                <div class="acc-val" style="font-size:15px; margin-bottom:2px;">$${val.toLocaleString()}</div>
                <div style="font-size:11px; color:#aaa; font-weight:bold;">${pct.toFixed(1)}%</div>
            </div>
        </div>
      `;
    });

    const tabsContainer = document.getElementById('acc-tabs');
    tabsContainer.innerHTML = '';
    if (sortedCats.length === 0) {
        tabsContainer.innerHTML = '<div style="font-size:13px; color:#999; padding: 10px;">該時段無支出資料</div>';
        document.getElementById('acc-detail-list').innerHTML = '';
    } else {
        sortedCats.forEach((cat, index) => {
            const btn = document.createElement('button');
            btn.className = `acc-tab-btn ${index === 0 ? 'active' : ''}`;
            btn.textContent = cat;
            btn.onclick = () => switchAccTab(cat);
            tabsContainer.appendChild(btn);
        });
        currentAccTab = sortedCats[0];
        renderAccDetailsList();
    }

    renderDoughnutChart(chartLabels, chartData, chartColors);
  }

  function renderDoughnutChart(labels, data, colors) {
      const ctx = document.getElementById('expenseChart').getContext('2d');
      if (expenseChartInstance) {
          expenseChartInstance.destroy();
      }

      if (data.length === 0) {
          expenseChartInstance = new Chart(ctx, {
              type: 'doughnut',
              data: { labels: ['無資料'], datasets: [{ data: [1], backgroundColor: ['#f5f5f5'], borderWidth: 0 }] },
              options: { cutout: '75%', plugins: { legend: { display: false }, tooltip: { enabled: false } } }
          });
          return;
      }

      expenseChartInstance = new Chart(ctx, {
          type: 'doughnut',
          data: {
              labels: labels,
              datasets: [{
                  data: data,
                  backgroundColor: colors,
                  borderWidth: 3,
                  borderColor: '#ffffff',
                  hoverOffset: 6
              }]
          },
          options: {
              responsive: true,

  function calculateEventTotal(code) {
    let sum = 0; const race = dbData['行程'].find(r => getVal(r, '行程代碼') === code);
    if (race) sum += parseFloat(getVal(race, '報名費總額')) || 0;
    (dbData['住宿']||[]).filter(s => getVal(s, '行程代碼') === code).forEach(s => sum += parseFloat(getVal(s, '費用')) || 0);
    (dbData['交通']||[]).filter(t => getVal(t, '行程代碼') === code).forEach(t => sum += parseFloat(getVal(t, '票價或油資')) || 0);
    (dbData['帳務明細']||[]).filter(b => getVal(b, '行程代碼') === code).forEach(b => sum += parseFloat(getVal(b, '金額')) || 0);
    return sum;
  }

  function renderFilters() {
    const bar = document.getElementById('filter-bar');
    const cats = ['全部', ...new Set(dbData['行程'].map(r => getVal(r, '行程類別')).filter(c => c))];
    bar.innerHTML = '';
    cats.forEach(c => {
      const btn = document.createElement('button');
      btn.className = `filter-btn ${c === currentFilter ? 'active' : ''}`;
      btn.textContent = c;
      btn.onclick = () => { 
          currentFilter = c; 
          renderFilters(); 
          renderMain(); 
          if(document.getElementById('acc-panel').style.display === 'block') calculateAccounting(); 
      };
      bar.appendChild(btn);
    });
  }

  function renderMonthNav() {
      const yearContainer = document.getElementById('year-nav');
      const navContainer = document.getElementById('month-nav');
      yearContainer.innerHTML = '';
      navContainer.innerHTML = '';
      
      const now = new Date();
      const currentY = now.getFullYear();
      const currentM = now.getMonth() + 1;
      const currentMonthKey = `${currentY}-${String(currentM).padStart(2, '0')}`;

      let races = currentFilter === '全部' ? dbData['行程'] : dbData['行程'].filter(r => getVal(r, '行程類別') === currentFilter);
      const monthKeysWithData = [...new Set(races.map(r => formatDate(getVal(r, '日期')).substring(0, 7)))].filter(k => k);
      
      if (currentFilter === '全部') {
          (dbData['帳務明細']||[]).forEach(b => {
              const bDate = formatDate(getVal(b, '日期'));
              if (bDate) monthKeysWithData.push(bDate.substring(0, 7));
          });
      }
      const uniqueMonthKeysWithData = [...new Set(monthKeysWithData)].sort();

      let uniqueYears = [...new Set(uniqueMonthKeysWithData.map(k => parseInt(k.substring(0, 4))))];
      if (!uniqueYears.includes(currentY)) uniqueYears.push(currentY);
      uniqueYears.sort((a, b) => a - b);

      uniqueYears.forEach(y => {
          const btn = document.createElement('div');
          btn.className = 'year-nav-btn ' + (y === displayYear ? 'active' : '');
          btn.textContent = y + ' 年';
          btn.onclick = () => {
              displayYear = y;
              selectedMonthFilter = null; 
              renderMain();
              if(document.getElementById('acc-panel').style.display === 'block') calculateAccounting();
          };
          yearContainer.appendChild(btn);
      });

      for (let i = 1; i <= 12; i++) {
          const mStr = String(i).padStart(2, '0');
          const mKey = `${displayYear}-${mStr}`;
          const hasData = uniqueMonthKeysWithData.includes(mKey);

          const btn = document.createElement('div');
          btn.className = 'month-nav-btn ' + (hasData ? 'has-data' : 'no-data');
          if (selectedMonthFilter === mKey) btn.classList.add('active');

          btn.textContent = i;

          if (mKey < currentMonthKey && selectedMonthFilter !== mKey) {
              btn.style.opacity = '0.4';
          }

          if (hasData) {
              btn.onclick = () => { 
                  selectedMonthFilter = (selectedMonthFilter === mKey) ? null : mKey; 
                  renderMain();
                  if(document.getElementById('acc-panel').style.display === 'block') calculateAccounting();
              };
          }
          navContainer.appendChild(btn);
      }
  }

  function getVal(obj, key) { 
    if(!obj) return ""; 
    const exactKey = Object.keys(obj).find(k => k.trim() === key);
    if(exactKey) return obj[exactKey];
    const cleanKeyToFind = key.replace(/\s+/g, '').replace('／', '/');
    const fuzzyKey = Object.keys(obj).find(k => k.replace(/\s+/g, '').replace('／', '/') === cleanKeyToFind);
    return fuzzyKey ? obj[fuzzyKey] : "";
  }

  function hasVal(v) { return v !== "" && v !== null && v !== undefined && v !== 0 && v !== "0"; }
  function formatDate(d) { const date = new Date(d); return isNaN(date.getTime()) ? "" : `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`; }

  function renderPriceRow(label, val, payer, method) {
    if(!hasVal(val) && !hasVal(payer)) return '';
    let p = payer || '-', m = method || '-';
    let pm = (m === undefined || !hasVal(m)) ? p : (p==='-' && m==='-' ? '-' : `${p} / ${m}`);
    return `<div class="price-row"><div><span style="color:#7f8c8d;">${label}</span> <span class="price-tag">$${val || 0}</span></div><div style="font-size:12px;color:#888;">${pm}</div></div>`;
  }

  function renderCalendar() {
    const container = document.getElementById('calendar-container'); container.innerHTML = '';
    const now = new Date();
    const currentMonthKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
    let races = currentFilter === '全部' ? dbData['行程'] : dbData['行程'].filter(r => getVal(r, '行程類別') === currentFilter);
    
    let allDatesWithData = races.map(r => formatDate(getVal(r, '日期'))).filter(k=>k);
    if (currentFilter === '全部') {
        (dbData['帳務明細']||[]).forEach(b => {
            const bDate = formatDate(getVal(b, '日期'));
            if (bDate) allDatesWithData.push(bDate);
        });
    }
    const monthKeysToRender = [...new Set(allDatesWithData.map(d => d.substring(0, 7)))];
    if (!monthKeysToRender.includes(currentMonthKey)) monthKeysToRender.push(currentMonthKey);
    monthKeysToRender.sort();

    monthKeysToRender.forEach(mKey => {
      let shouldShow = false;
      if (selectedMonthFilter) {
          shouldShow = (mKey === selectedMonthFilter);
      } else {
          shouldShow = (mKey.startsWith(displayYear)) && (mKey >= currentMonthKey);
      }
      
      if (!shouldShow) return;
      
      const [y, m] = mKey.split('-');
      const section = document.createElement('div'); section.className = 'month-section';
      section.id = 'month-section-' + mKey;
      section.innerHTML = `<div class="month-title">${y}年${m}月</div><div class="calendar-header">${['日','一','二','三','四','五','六'].map(d => `<div class="weekday-header">${d}</div>`).join('')}</div>`;
      const grid = document.createElement('div'); grid.className = 'calendar-grid';
      const firstDay = new Date(y, m-1, 1).getDay(), lastDate = new Date(y, m, 0).getDate();
      for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
      for (let d = 1; d <= lastDate; d++) {
        const dStr = `${y}-${m}-${String(d).padStart(2,'0')}`;
        const cell = document.createElement('div'); cell.className = 'day'; cell.innerHTML = `<span class="day-number">${d}</span>`;
        const event = races.find(r => formatDate(getVal(r, '日期')) === dStr);
        const dailyExpenses = (dbData['帳務明細']||[]).filter(b => formatDate(getVal(b, '日期')) === dStr);
        
        if (event) {
          const cat = getVal(event, '行程類別');
          cell.classList.add('has-event'); 
          // 取莫蘭迪色外框
          const morandiColor = getComputedStyle(document.documentElement).getPropertyValue(`--cat-${cat}`).trim();
          cell.style.borderColor = morandiColor || '#cfd8dc';
          cell.onclick = () => handleDayClick(event, cell, grid, dStr);
        } else if (dailyExpenses.length > 0) {
          cell.classList.add('has-expense');
          cell.onclick = () => handleDayClick(null, cell, grid, dStr);
        }
        grid.appendChild(cell);
      }
      section.appendChild(grid); container.appendChild(section);
    });
  }

  function renderList() {
      const container = document.getElementById('list-container'); container.innerHTML = '';
      let races = currentFilter === '全部' ? dbData['行程'] : dbData['行程'].filter(r => getVal(r, '行程類別') === currentFilter);
      races.sort((a, b) => new Date(getVal(a, '日期')) - new Date(getVal(b, '日期')));
      const today = new Date(); today.setHours(0, 0, 0, 0);
      
      const pastRaces = races.filter(r => new Date(getVal(r, '日期')) < today && formatDate(getVal(r, '日期')).startsWith(displayYear));
      const futureRaces = races.filter(r => new Date(getVal(r, '日期')) >= today && formatDate(getVal(r, '日期')).startsWith(displayYear));
      
      let racesToRender = [];
      if (selectedMonthFilter) {
          racesToRender = races.filter(r => formatDate(getVal(r, '日期')).startsWith(selectedMonthFilter));
      } else {
          racesToRender = showPastList ? races.filter(r => formatDate(getVal(r, '日期')).startsWith(displayYear)) : futureRaces;
          
          if (pastRaces.length > 0) {
              const toggleBtn = document.createElement('div');
              toggleBtn.className = 'past-toggle-btn';
              toggleBtn.textContent = showPastList ? '收起歷史行程 ▲' : `顯示 ${displayYear} 歷史行程 (${pastRaces.length}筆) ▼`;
              toggleBtn.onclick = () => { showPastList = !showPastList; renderList(); };
              container.appendChild(toggleBtn);
          }
      }

      if (racesToRender.length === 0) {
          const emptyMsg = document.createElement('div');
          emptyMsg.style.cssText = "padding:40px; text-align:center; color:#95a5a6; font-size:15px; font-weight:bold;";
          emptyMsg.textContent = "目前沒有行程資料";
          container.appendChild(emptyMsg); return;
      }
      
      racesToRender.forEach(event => {
          const eDate = new Date(getVal(event, '日期')); const cat = getVal(event, '行程類別');
          const daysDiff = Math.ceil((eDate - today) / (1000 * 60 * 60 * 24));
          let countdownHtml = daysDiff > 0 ? `<span style="font-weight:bold; font-size:13px; color:var(--text-main);">還有<span class="list-countdown-days">${daysDiff}</span>天</span>` : (daysDiff === 0 ? `<span style="font-weight:bold; font-size:14px; color:var(--text-main);">今天</span>` : `<span style="font-weight:bold; font-size:13px; color:#bbb;">已結束</span>`);
          const item = document.createElement('div'); item.className = 'list-item'; 
          const morandiColor = getComputedStyle(document.documentElement).getPropertyValue(`--cat-${cat}`).trim();
          item.style.borderLeftColor = morandiColor || '#cfd8dc';
          item.innerHTML = `<div class="list-date"><span class="m">${eDate.getMonth()+1}月</span><span class="d">${eDate.getDate()}</span></div><div class="list-name">${getVal(event, '行程名稱')}</div><div class="list-countdown">${countdownHtml}</div>`;
          item.onclick = () => handleListClick(event, item); container.appendChild(item);
      });
  }

  let currentOpenPanel = null, currentSelectedEl = null;

  function handleDayClick(event, cell, grid, dStr) {
    if (currentSelectedEl === cell && currentOpenPanel) { closeCurrentPanel(); return; }
    if (currentSelectedEl) { currentSelectedEl.classList.remove('selected'); currentSelectedEl.style.backgroundColor = ''; }
    currentSelectedEl = cell; cell.classList.add('selected');
    
    const category = event ? getVal(event, '行程類別') : null;
    if (category) {
        cell.style.backgroundColor = getComputedStyle(document.documentElement).getPropertyValue(`--cat-${category}`).trim();
    }
    
    if (currentOpenPanel) currentOpenPanel.remove();
    const panel = document.createElement('div'); panel.className = 'detail-panel'; panel.innerHTML = generateDetailHTML(event, dStr);
    const cells = Array.from(grid.children), idx = cells.indexOf(cell), rowEnd = Math.min(cells.length - 1, idx + (6 - (idx % 7)));
    grid.insertBefore(panel, cells[rowEnd].nextSibling); setTimeout(() => panel.classList.add('open'), 10); currentOpenPanel = panel;
  }

  function handleListClick(event, item) {
      if (currentSelectedEl === item && currentOpenPanel) { closeCurrentPanel(); return; }
      if (currentOpenPanel) currentOpenPanel.remove();
      currentSelectedEl = item;
      const dStr = formatDate(getVal(event, '日期'));
      const panel = document.createElement('div'); panel.className = 'detail-panel'; panel.innerHTML = generateDetailHTML(event, dStr);
      item.parentNode.insertBefore(panel, item.nextSibling); setTimeout(() => panel.classList.add('open'), 10); currentOpenPanel = panel;
  }

  function closeCurrentPanel() {
      if (currentOpenPanel) { currentOpenPanel.remove(); currentOpenPanel = null;
          if (currentSelectedEl) { currentSelectedEl.classList.remove('selected'); currentSelectedEl.style.backgroundColor = ''; currentSelectedEl = null; }
      }
  }

  function generateReceiptHTML(bills) {
      if (bills.length === 0) return `<div style="text-align:center; color:#95a5a6; font-size:13px; padding:20px;">無帳務明細</div>`;
      const grouped = {};
      bills.forEach(b => {
          const d = formatDate(getVal(b, '日期')) || '未填寫日期';

    if(bills.length > 0) {
      const sums = {}; bills.forEach(b => { const c = getVal(b, '類別') || '其他'; sums[c] = (sums[c] || 0) + (parseFloat(getVal(b, '金額')) || 0); });
      html += `<div class="info-section"><div class="info-title title-bill">其他帳務 (分類總結)</div><div class="info-card card-bill">`;
      Object.keys(sums).forEach(c => {
          html += `<div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:14px; align-items:center;">
              <span style="color:#546e7a; font-weight:bold;">${c}</span>
              <span style="font-weight:900; color:var(--brand-main);">$${sums[c].toLocaleString()}</span>
          </div>`;
      });
      html += `</div></div>`;
    }
    html += `<div style="display: flex; justify-content: flex-end; margin-top: 5px;">
                <div class="event-settle-card">
                    <div style="font-weight:bold; color:var(--settle-pink); font-size:13px;">本場行程結算</div>
                    <div style="font-size:18px; font-weight:900; color:var(--settle-pink);">$${calculateEventTotal(code).toLocaleString()}</div>
                </div>
             </div></div>`;
    html += `<div id="tab-expense" class="panel-tab-content" style="display:none;">`;
    html += generateReceiptHTML(bills);
    html += `</div>`;
    return html;
  }
</script>
</body>
</html>
