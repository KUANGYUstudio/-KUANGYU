<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>光聿 KUANGYU - 行程小助理</title>
  <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=行+程&background=e0f2f1&color=00838f&size=180&bold=true">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* =========================================
       光聿行程美學定義 (旗艦版：柔和粉彩 + 全域編輯)
       ========================================= */
    :root {
      --cat-鐵人: #64b5f6;
      --cat-自行車: #81c784;
      --cat-路跑: #ff8a65;
      --cat-游泳: #4dd0e1;
      --cat-活動: #f06292;
      --cat-旅遊: #ffd54f;
      --cat-移地訓練: #ba68c8;

      --text-main: #2c3e50;
      --text-sub: #546e7a;
      --bg-color: #fcfcfc;
      --card-bg: #ffffff;
      --brand-main: #2c3e50;
      
      --nav-active: #546e7a;
      --coin-gold: #e5c07b;
      --settle-pink: #e07a5f;
      --action-button-color: #78909c;
      --action-button-bg: #eceff1;
    }

    body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; background: var(--bg-color); margin: 0; padding: 0; color: var(--text-main); min-height: 100vh; }
    .container { max-width: 800px; width: 100%; margin: 0 auto; padding: 30px 20px; box-sizing: border-box; text-align: center; }
    
    .header-title { font-size: 26px; font-weight: 800; color: var(--brand-main); letter-spacing: 2px; margin-bottom: 20px; }

    /* 頂部固定控制區 */
    .sticky-controls {
        position: sticky;
        top: 0;
        background: rgba(252, 252, 252, 0.95);
        backdrop-filter: blur(10px);
        z-index: 100;
        padding: 15px 0 10px 0;
        border-bottom: 1px solid rgba(0,0,0,0.03);
        margin-bottom: 25px;
    }

    /* 黃金三角排版容器 */
    .nav-wrapper {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        max-width: 450px;
        margin: 0 auto 15px;
        padding: 0 15px;
        box-sizing: border-box;
    }
    
    /* 工具類小按鈕 */
    .tool-btn {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--action-button-bg);
        color: var(--action-button-color);
        border: none;
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: 0.2s;
    }
    .tool-btn.active {
        background: var(--settle-pink);
        color: #fff;
        box-shadow: 0 4px 12px rgba(224, 122, 95, 0.3);
    }

    /* 中央核心控制區 */
    .center-nav {
        display: flex;
        align-items: center;
        gap: 12px;
        background: #f0f0f0;
        padding: 4px 8px;
        border-radius: 25px;
    }
    .acc-toggle-btn {
        background: #fff;
        color: var(--coin-gold);
        border: none;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        font-weight: 900;
        cursor: pointer;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        transition: 0.2s;
    }
    .acc-toggle-btn.active { background: var(--coin-gold); color: #fff; }

    .view-switcher { display: flex; gap: 4px; }
    .view-btn {
        border: none;
        padding: 6px 14px;
        border-radius: 17px;
        cursor: pointer;
        font-size: 12px;
        font-weight: bold;
        color: #7f8c8d;
        background: transparent;
        transition: 0.3s;
    }
    .view-btn.active { background: #fff; color: var(--brand-main); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

    /* 過濾器與年份選單 */
    .filter-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 15px; }
    .filter-btn { padding: 8px 16px; background: #fff; border: 1px solid #e0e0e0; border-radius: 20px; font-size: 13px; font-weight: bold; color: #78909c; cursor: pointer; }
    .filter-btn.active { background: var(--nav-active); color: #fff; border-color: var(--nav-active); }
    .year-nav-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; }
    .year-nav-btn { padding: 4px 14px; border-radius: 15px; background: #f0f0f0; color: #7f8c8d; font-size: 12px; font-weight: bold; cursor: pointer; }
    .year-nav-btn.active { background: var(--nav-active); color: #fff; }

    /* 月份網格 */
    .month-nav-container { display: grid; grid-template-columns: repeat(6, 36px); gap: 10px 8px; justify-content: center; padding-bottom: 5px; }
    .month-nav-btn { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid #eceff1; background: #fff; color: #b0bec5; font-size: 14px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .month-nav-btn.active { background: var(--nav-active); color: #fff; border-color: var(--nav-active); transform: scale(1.1); }

    /* 日曆與內容樣式 */
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 14px; color: #cfd8dc; transition: 0.2s; font-size: 18px; position: relative; border: 2px solid transparent; }
    .day.has-event { background-color: #fff; color: #2c3e50; cursor: pointer; font-weight: 600; box-shadow: 0 2px 6px rgba(0,0,0,0.04); border-width: 2px; }
    .day.has-expense::after { content: ''; position: absolute; bottom: 4px; width: 4px; height: 4px; border-radius: 50%; background-color: #cfd8dc; }
    .day.selected { color: #fff !important; transform: scale(1.05); z-index: 10; border-color: transparent !important; }
    .weekday-header { font-weight: bold; font-size: 15px; text-align: center; color: #90a4ae; padding-bottom: 10px; }
    .month-title { font-weight: 800; font-size: 22px; margin: 20px 0 15px; text-align: left; color: var(--brand-main); }

    /* 管理模式按鈕 */
    .edit-controls { display: none; gap: 12px; margin-top: 12px; justify-content: flex-end; border-top: 1px dashed #f0f0f0; padding-top: 12px; }
    body.edit-mode-on .edit-controls { display: flex; }
    .circle-btn { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; cursor: pointer; color: #fff; box-shadow: 0 3px 8px rgba(0,0,0,0.15); border: none; }
    .edit-btn { background: #90a4ae; }
    .del-btn { background: var(--settle-pink); }

    /* 🚀 高質感毛玻璃警告視窗 */
    .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(44, 62, 80, 0.6); z-index:9999; align-items:center; justify-content:center; backdrop-filter: blur(5px); }
    .modal-content { background:#fff; width:85%; max-width:340px; border-radius:28px; padding:30px; box-sizing:border-box; text-align:center; box-shadow: 0 15px 40px rgba(0,0,0,0.2); animation: pop 0.3s ease; }
    @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .confirm-icon { width: 60px; height: 60px; background: #fff5f5; color: #e53935; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 20px; border: 2px solid #ffcdd2; font-weight: bold; }
    .modal-actions { display: flex; gap: 12px; margin-top: 20px; }
    .modal-btn { flex: 1; padding: 14px; border-radius: 16px; border: none; font-size: 15px; font-weight: 800; cursor: pointer; transition: 0.2s; }
    .btn-cancel { background: #f5f5f5; color: #78909c; }
    .btn-danger { background: #e53935; color: #fff; }

    /* 編輯視窗內部的輸入框 */
    .modal-body { max-height: 60vh; overflow-y: auto; text-align: left; margin-bottom: 20px; }
    .edit-input-group { margin-bottom: 15px; }
    .edit-input-group label { font-size: 12px; color: var(--text-sub); font-weight: bold; display:block; margin-bottom:5px; }
    .edit-input { width: 100%; padding: 12px; border: 1.5px solid #dcdde1; border-radius: 12px; box-sizing: border-box; font-family: inherit; font-size: 16px; background: #fcfcfc; }

    .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; justify-content: center; align-items: center; z-index: 9999; color: #90a4ae; font-weight: bold;}
  </style>
</head>
<body>

  <div id="loading" class="loading-overlay">正在讀取光聿行程資料...</div>

  <div class="container">
    <div class="header-title">行程小助理</div>

    <div class="sticky-controls">
        <div class="nav-wrapper">
            <button id="mode-toggle-btn" class="tool-btn" onclick="toggleEditMode()">✎</button>
            
            <div class="center-nav">
                <button id="acc-panel-btn" class="acc-toggle-btn" onclick="toggleAccPanel()">$</button>
                <div class="view-switcher">
                    <button id="btn-cal" class="view-btn active" onclick="switchView('cal')">日曆</button>
                    <button id="btn-list" class="view-btn" onclick="switchView('list')">清單</button>
                </div>
            </div>
            
            <button class="tool-btn" onclick="location.reload()">↻</button>
        </div>
        
        <div id="filter-bar" class="filter-bar"></div>
        <div id="year-nav" class="year-nav-container"></div>
        <div id="month-nav" class="month-nav-container"></div>
    </div>

    <div id="acc-panel" style="display:none; text-align:left; background:#fff; padding:25px; border-radius:20px; margin-bottom:30px; border:1px solid #eceff1;">
      <div style="background:var(--brand-main); color:#fff; padding:20px; border-radius:16px; text-align:center; margin-bottom:25px;">
        <div id="acc-grand-label-dynamic" style="font-size:12px; opacity:0.8; margin-bottom:5px;">篩選範圍總支出</div>
        <div id="acc-grand-total" style="font-size:32px; font-weight:900;">$0</div>
      </div>
      <div style="position: relative; height: 180px; margin-bottom: 25px;"><canvas id="expenseChart"></canvas></div>
      <div id="dynamic-cat-legend" style="display:grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 25px;"></div>
      <div id="acc-tabs" style="display:flex; gap:8px; margin-bottom:15px; flex-wrap:wrap;"></div>
      <div id="acc-detail-list" style="background:#fff; border-radius:12px; border:1px solid #eceff1; overflow:hidden;"></div>
    </div>

    <div id="cal-view" class="view-container active"><div id="calendar-container"></div></div>
    <div id="list-view" class="view-container"><div id="list-container"></div></div>
  </div>

  <div id="confirm-modal" class="modal-overlay">
      <div class="modal-content">
          <div class="confirm-icon">!</div>
          <div style="font-weight:800; font-size:18px; margin-bottom:10px;">確定要刪除嗎？</div>
          <div id="confirm-desc" style="font-size:14px; color:#78909c; line-height:1.6;">刪除後資料將無法恢復。</div>
          <div class="modal-actions">
              <button class="modal-btn btn-cancel" onclick="closeConfirmModal()">取消</button>
              <button id="confirm-delete-btn" class="modal-btn btn-danger">確定刪除</button>
          </div>
      </div>
  </div>

  <div id="edit-modal" class="modal-overlay">
      <div class="modal-content">
          <h3 style="margin:0 0 20px 0; color:var(--brand-main); text-align:left;" id="edit-modal-title">編輯資料</h3>
          <input type="hidden" id="edit-sheetName"><input type="hidden" id="edit-rowIndex">
          <div id="dynamic-edit-form" class="modal-body"></div>
          <button onclick="saveDynamicEdit()" style="width:100%; padding:16px; border-radius:15px; border:none; background:var(--nav-active); color:#fff; font-weight:bold; font-size:17px; cursor:pointer;">儲存修改</button>
      </div>
  </div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbxUGVmAqfEmepMoAAlY0KkEiGOis9aSR-DpCqA9Nea6ZJZg4YUCg9uBvnJs6HuR0DAjQg/exec";
  let dbData = {}, currentFilter = '全部', currentView = 'cal', selectedMonthFilter = null, displayYear = new Date().getFullYear(), isEditMode = false;
  let accDetailsData = {}, currentAccTab = '', expenseChartInstance = null; 

  const categoryColors = { '報名費': '#64b5f6', '住宿': '#ffd54f', '交通': '#81c784', '飲食': '#ff8a65', '購物': '#ba68c8', '採買': '#4dd0e1', '娛樂': '#f06292', '其他': '#b0bec5' };
  function getColorForCategory(cat) { return categoryColors[cat] || '#cfd8dc'; }

  const sheetHeaders = {
      '行程': ['行程代碼', '行程名稱', '行程類別', '日期', '行程連結', '聿凡項目', '光武項目', '報名費總額', '報名費付款人', '付款方式', '狀態', '備註'],
      '住宿': ['行程代碼', '飯店名稱', '入住日期', '入住時間', '退房日期', '退房時間', '訂房平台', '費用', '付款人', '付款方式', '狀態', '連結', '備註'],
      '交通': ['行程代碼', '類型', '出發日期', '去程班次 / 航班', '去程出發時間', '去程抵達時間', '回程日期', '回程班次 / 航班', '回程出發時間', '回程抵達時間', '票價或油資', '付款人', '付款方式', '狀態'],
      '帳務明細': ['行程代碼', '日期', '類別', '項目', '金額', '付款方式', '備註']
  };

  const selectOptions = {
      '行程類別': ['鐵人','自行車','路跑','游泳','活動','旅遊','移地訓練'],
      '類別': ['飲食','交通','購物','採買','娛樂','其他'],
      '報名費付款人': ['聿凡','光武','-'], '付款人': ['聿凡','光武','-'], '付款方式': ['現金','刷卡','-'], '狀態': ['已付','未付','現場付','-'], '訂房平台': ['Agoda','Booking.com','Trip.com','易遊網','官方網站','其他'], '類型': ['自駕','火車','飛機']
  };

  window.onload = initSystem;

  async function initSystem() {
    const cached = localStorage.getItem('kuangyu_dbData');
    if (cached) { dbData = JSON.parse(cached); renderFilters(); renderMain(); document.getElementById('loading').style.display = 'none'; }
    try {
      const res = await fetch(API_URL + "?t=" + new Date().getTime());
      dbData = await res.json();
      localStorage.setItem('kuangyu_dbData', JSON.stringify(dbData));
      renderFilters(); renderMain();
      document.getElementById('loading').style.display = 'none';
    } catch (e) { if (!cached) document.getElementById('loading').innerHTML = "連線失敗"; }
  }

  function toggleEditMode() {
      isEditMode = !isEditMode;
      const btn = document.getElementById('mode-toggle-btn');
      if (isEditMode) { document.body.classList.add('edit-mode-on'); btn.classList.add('active'); }
      else { document.body.classList.remove('edit-mode-on'); btn.classList.remove('active'); }
  }

  function showConfirmDelete(sheetName, rowIndex, e) {
      if(e) e.stopPropagation();
      const modal = document.getElementById('confirm-modal');
      const desc = document.getElementById('confirm-desc');
      const confirmBtn = document.getElementById('confirm-delete-btn');
      desc.innerHTML = `確定要刪除這筆【${sheetName}】資料嗎？<br><span style="color:#e07a5f; font-size:12px;">(⚠️ 刪除後無法復原)</span>`;
      confirmBtn.onclick = () => doDelete(sheetName, rowIndex);
      modal.style.display = 'flex';
  }
  function closeConfirmModal() { document.getElementById('confirm-modal').style.display = 'none'; }

  async function doDelete(sheetName, rowIndex) {
      closeConfirmModal();
      document.getElementById('loading').style.display = 'flex';
      document.getElementById('loading').innerHTML = '正在刪除...';
      try {
          await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', sheetName: sheetName, rowIndex: rowIndex }) });
          localStorage.removeItem('kuangyu_dbData'); location.reload();
      } catch (err) { alert('操作失敗'); document.getElementById('loading').style.display = 'none'; }
  }

  function openEditModal(sheetName, rowIndex, e) {
      if(e) e.stopPropagation();
      const rowData = dbData[sheetName].find(r => r['_rowIndex'] === rowIndex);
      if(!rowData) return;
      const headers = sheetHeaders[sheetName], formBody = document.getElementById('dynamic-edit-form');
      formBody.innerHTML = '';
      headers.forEach((h, idx) => {
          const val = rowData[h] || '';
          let input = '';
          if(selectOptions[h]) input = `<select id="field-${idx}" class="edit-input">${selectOptions[h].map(o=>`<option ${val===o?'selected':''}>${o}</option>`).join('')}</select>`;
          else if(h.includes('日期')) input = `<input type="date" id="field-${idx}" class="edit-input" value="${formatDate(val)}">`;
          else if(h.includes('金額') || h.includes('費用') || h.includes('總額')) input = `<input type="number" id="field-${idx}" class="edit-input" value="${val}">`;
          else input = `<input type="text" id="field-${idx}" class="edit-input" value="${val}" ${h==='行程代碼'?'readonly style="background:#eee;color:#888;"':''}>`;
          formBody.innerHTML += `<div class="edit-input-group"><label>${h}</label>${input}</div>`;
      });
      document.getElementById('edit-sheetName').value = sheetName; document.getElementById('edit-rowIndex').value = rowIndex;
      document.getElementById('edit-modal-title').textContent = `編輯${sheetName}`; document.getElementById('edit-modal').style.display = 'flex';
  }
  function closeEditModal() { document.getElementById('edit-modal').style.display = 'none'; }

  async function saveDynamicEdit() {
      const sheetName = document.getElementById('edit-sheetName').value, rowIndex = parseInt(document.getElementById('edit-rowIndex').value);
      const rowData = sheetHeaders[sheetName].map((h, idx) => document.getElementById(`field-${idx}`).value);
      closeEditModal(); document.getElementById('loading').style.display = 'flex';
      try {
          await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'update', sheetName: sheetName, rowIndex: rowIndex, data: rowData }) });
          localStorage.removeItem('kuangyu_dbData'); location.reload();
      } catch (err) { alert('儲存失敗'); document.getElementById('loading').style.display = 'none'; }
  }

  function getVal(obj, key) { if(!obj) return ""; const exact = Object.keys(obj).find(k=>k.trim()===key); if(exact) return obj[exact]; const clean=key.replace(/\s+/g,'').replace('／','/'); const fuzzy=Object.keys(obj).find(k=>k.replace(/\s+/g,'').replace('／','/')===clean); return fuzzy?obj[fuzzy]:""; }
  function formatDate(d) { const date = new Date(d); return isNaN(date.getTime()) ? "" : `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`; }
  function hasVal(v) { return v !== "" && v !== null && v !== undefined && v !== 0 && v !== "0"; }

  function switchView(view) {
      currentView = view; document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+view).classList.add('active');
      document.querySelectorAll('.view-container').forEach(c => c.classList.remove('active')); document.getElementById(view+'-view').classList.add('active');
      closeCurrentPanel(); renderMain();
  }

  function renderMain() { renderMonthNav(); if (currentView === 'cal') renderCalendar(); else renderList(); }

  function toggleAccPanel() {
      const panel = document.getElementById('acc-panel'), btn = document.getElementById('acc-panel-btn');
      const isVisible = panel.style.display === 'block'; panel.style.display = isVisible ? 'none' : 'block';
      if (!isVisible) { btn.classList.add('active'); calculateAccounting(); } else { btn.classList.remove('active'); }
  }

  function renderFilters() {
      const bar = document.getElementById('filter-bar'), cats = ['全部', ...new Set(dbData['行程'].map(r => getVal(r, '行程類別')).filter(c => c))];
      bar.innerHTML = ''; cats.forEach(c => {
          const btn = document.createElement('button'); btn.className = `filter-btn ${c === currentFilter ? 'active' : ''}`; btn.textContent = c;
          btn.onclick = () => { currentFilter = c; renderFilters(); renderMain(); if(document.getElementById('acc-panel').style.display === 'block') calculateAccounting(); };
          bar.appendChild(btn);
      });
  }

  function renderMonthNav() {
      const yearContainer = document.getElementById('year-nav'), navContainer = document.getElementById('month-nav');
      yearContainer.innerHTML = ''; navContainer.innerHTML = '';
      const now = new Date(), curMonthKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
      let races = currentFilter === '全部' ? dbData['行程'] : dbData['行程'].filter(r => getVal(r, '行程類別') === currentFilter);
      const monthsWithData = [...new Set([...races.map(r => formatDate(getVal(r, '日期')).substring(0, 7)), ...(currentFilter === '全部' ? (dbData['帳務明細']||[]).map(b => formatDate(getVal(b, '日期')).substring(0, 7)) : [])])].filter(k => k);
      const uniqueYears = [...new Set(monthsWithData.map(k => parseInt(k.substring(0, 4))))].sort();
      if (!uniqueYears.includes(now.getFullYear())) uniqueYears.push(now.getFullYear());
      uniqueYears.forEach(y => {
          const btn = document.createElement('div'); btn.className = 'year-nav-btn ' + (y === displayYear ? 'active' : '');
          btn.textContent = y + ' 年'; btn.onclick = () => { displayYear = y; selectedMonthFilter = null; renderMain(); };
          yearContainer.appendChild(btn);
      });
      for (let i = 1; i <= 12; i++) {
          const mKey = `${displayYear}-${String(i).padStart(2, '0')}`, hasData = monthsWithData.includes(mKey);
          const btn = document.createElement('div'); btn.className = 'month-nav-btn ' + (hasData ? 'has-data' : 'no-data');
          if (selectedMonthFilter === mKey) btn.classList.add('active');
          btn.textContent = i; if (mKey < curMonthKey && selectedMonthFilter !== mKey) btn.style.opacity = '0.4';
          if (hasData) btn.onclick = () => { selectedMonthFilter = (selectedMonthFilter === mKey) ? null : mKey; renderMain(); };
          navContainer.appendChild(btn);
      }
  }

  function renderCalendar() {
      const container = document.getElementById('calendar-container'); container.innerHTML = '';
      const now = new Date(), curMonthKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
      let races = currentFilter === '全部' ? dbData['行程'] : dbData['行程'].filter(r => getVal(r, '行程類別') === currentFilter);
      let eventMap = {}; races.forEach(r => { const d = formatDate(getVal(r, '日期')); if (d) eventMap[d] = r; });
      let expenseMap = {}; (dbData['帳務明細']||[]).forEach(b => { const d = formatDate(getVal(b, '日期')); if (d) expenseMap[d] = true; });
      const months = [...new Set([...races.map(r => formatDate(getVal(r, '日期')).substring(0, 7)), ...Object.keys(expenseMap).map(k=>k.substring(0,7))])].filter(k=>k).sort();
      let hasRendered = false;
      months.forEach(mKey => {
          if (selectedMonthFilter ? mKey !== selectedMonthFilter : (mKey.substring(0,4) != displayYear || mKey < curMonthKey)) return;
          hasRendered = true; const [y, m] = mKey.split('-');
          const section = document.createElement('div'); section.className = 'month-section';
          section.innerHTML = `<div class="month-title">${y}年${m}月</div><div class="calendar-header">${['日','一','二','三','四','五','六'].map(d => `<div class="weekday-header">${d}</div>`).join('')}</div>`;
          const grid = document.createElement('div'); grid.className = 'calendar-grid';
          const firstDay = new Date(y, m-1, 1).getDay(), lastDate = new Date(y, m, 0).getDate();
          for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
          for (let d = 1; d <= lastDate; d++) {
              const dStr = `${y}-${m}-${String(d).padStart(2,'0')}`, cell = document.createElement('div'); cell.className = 'day'; cell.innerHTML = `<span class="day-number">${d}</span>`;
              if (eventMap[dStr]) {
                  cell.classList.add('has-event'); cell.style.borderColor = getColorForCategory(getVal(eventMap[dStr], '行程類別'));
                  cell.onclick = () => handleDayClick(eventMap[dStr], cell, grid, dStr);
              } else if (expenseMap[dStr] && currentFilter === '全部') { cell.classList.add('has-expense'); cell.onclick = () => handleDayClick(null, cell, grid, dStr); }
              grid.appendChild(cell);
          }
          section.appendChild(grid); container.appendChild(section);
      });
      if (!hasRendered) container.innerHTML = '<div style="padding:60px; color:#90a4ae;">此區間無資料</div>';
  }

  function renderList() {
      const container = document.getElementById('list-container'); container.innerHTML = '';
      let races = currentFilter === '全部' ? dbData['行程'] : dbData['行程'].filter(r => getVal(r, '行程類別') === currentFilter);
      races.sort((a, b) => new Date(getVal(a, '日期')) - new Date(getVal(b, '日期')));
      const today = new Date(); today.setHours(0, 0, 0, 0);
      let renderRaces = selectedMonthFilter ? races.filter(r => formatDate(getVal(r, '日期')).startsWith(selectedMonthFilter)) : races.filter(r => formatDate(getVal(r, '日期')).substring(0,4) == displayYear && new Date(getVal(r, '日期')) >= today);
      if (renderRaces.length === 0) { container.innerHTML = '<div style="padding:60px; color:#90a4ae;">目前無排定行程</div>'; return; }
      renderRaces.forEach(event => {
          const eDate = new Date(getVal(event, '日期')), diff = Math.ceil((eDate - today) / 86400000);
          const item = document.createElement('div'); item.className = 'list-item'; item.style.borderLeftColor = getColorForCategory(getVal(event, '行程類別'));
          item.innerHTML = `<div class="list-date"><span style="font-size:11px;color:#7f8c8d;display:block;">${eDate.getMonth()+1}月</span><span style="font-size:22px;font-weight:800;">${eDate.getDate()}</span></div><div class="list-name">${getVal(event, '行程名稱')}</div><div style="font-size:13px; font-weight:bold;">${diff > 0 ? `還有 <span style="color:var(--settle-pink); font-size:18px;">${diff}</span> 天` : (diff===0?'今天':'已結束')}</div>`;
          item.onclick = () => handleListClick(event, item); container.appendChild(item);
      });
  }

  function calculateAccounting() {
    let all = []; const races = currentFilter === '全部' ? dbData['行程'] : dbData['行程'].filter(r => getVal(r, '行程類別') === currentFilter);
    races.forEach(r => {
      const code = getVal(r, '行程代碼'), rDate = formatDate(getVal(r, '日期'));
      const regFee = parseFloat(getVal(r, '報名費總額')) || 0; if (regFee > 0) all.push({ cat: '報名費', amt: regFee, name: getVal(r, '行程名稱'), date: rDate });
      (dbData['住宿']||[]).filter(s => getVal(s,'行程代碼')===code).forEach(s => { const f = parseFloat(getVal(s,'費用')) || 0; if (f > 0) all.push({ cat: '住宿', amt: f, name: getVal(s,'飯店名稱'), date: formatDate(getVal(s,'入住日期'))||rDate }); });
      (dbData['交通']||[]).filter(t => getVal(t,'行程代碼')===code).forEach(t => { const f = parseFloat(getVal(t,'票價或油資')) || 0; if (f > 0) all.push({ cat: '交通', amt: f, name: getVal(t,'類型'), date: formatDate(getVal(t,'出發日期'))||rDate }); });
      (dbData['帳務明細']||[]).filter(b => getVal(b,'行程代碼')===code).forEach(b => { const f = parseFloat(getVal(b,'金額')) || 0; if (f > 0) all.push({ cat: getVal(b, '類別'), amt: f, name: getVal(b,'項目'), date: formatDate(getVal(b,'日期'))||rDate }); });
    });
    if (currentFilter === '全部') { (dbData['帳務明細']||[]).filter(b => !getVal(b, '行程代碼') || getVal(b, '行程代碼').trim() === '').forEach(b => { const f = parseFloat(getVal(b,'金額')) || 0; if (f > 0) all.push({ cat: getVal(b, '類別'), amt: f, name: getVal(b,'項目'), date: formatDate(getVal(b,'日期')) }); }); }
    const curMonthKey = `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`;
    let filtered = all.filter(e => e.date && (selectedMonthFilter ? e.date.startsWith(selectedMonthFilter) : e.date.startsWith(curMonthKey)));
    document.getElementById('acc-grand-label-dynamic').textContent = selectedMonthFilter ? `${selectedMonthFilter.replace('-','年')}月 總支出` : `本月總支出`;
    let totals = {}, grand = 0; filtered.forEach(e => { totals[e.cat] = (totals[e.cat] || 0) + e.amt; grand += e.amt; });
    document.getElementById('acc-grand-total').textContent = '$' + grand.toLocaleString();
    const legend = document.getElementById('dynamic-cat-legend'); legend.innerHTML = '';
    const labels = [], data = [], colors = [];
    Object.keys(totals).sort((a,b)=>totals[b]-totals[a]).forEach(k => {
      const c = getColorForCategory(k); labels.push(k); data.push(totals[k]); colors.push(c);
      legend.innerHTML += `<div style="background:#fafafa; padding:10px; border-radius:12px; display:flex; justify-content:space-between; align-items:center;"><div style="display:flex; align-items:center; gap:8px;"><div style="width:10px; height:10px; border-radius:50%; background:${c};"></div><span style="font-size:13px;">${k}</span></div><div style="font-weight:bold; font-size:14px;">$${totals[k].toLocaleString()}</div></div>`;
    });
    renderDoughnutChart(labels, data, colors);
  }

  function renderDoughnutChart(labels, data, colors) {
      const ctx = document.getElementById('expenseChart').getContext('2d');
      if (expenseChartInstance) expenseChartInstance.destroy();
      expenseChartInstance = new Chart(ctx, { type: 'doughnut', data: { labels: labels, datasets: [{ data: data, backgroundColor: colors, borderWidth: 3, borderColor: '#fff' }] }, options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { display: false } } } });
  }

  function handleDayClick(event, cell, grid, dStr) {
    if (currentSelectedEl === cell && currentOpenPanel) { closeCurrentPanel(); return; }
    if (currentSelectedEl) { currentSelectedEl.classList.remove('selected'); currentSelectedEl.style.backgroundColor = ''; }
    currentSelectedEl = cell; cell.classList.add('selected');
    if (event) cell.style.backgroundColor = getColorForCategory(getVal(event, '行程類別'));
    if (currentOpenPanel) currentOpenPanel.remove();
    const panel = document.createElement('div'); panel.className = 'detail-panel'; panel.innerHTML = generateDetailHTML(event, dStr);
    const cells = Array.from(grid.children), idx = cells.indexOf(cell), rowEnd = Math.min(cells.length - 1, idx + (6 - (idx % 7)));
    grid.insertBefore(panel, cells[rowEnd].nextSibling); setTimeout(() => panel.classList.add('open'), 10); currentOpenPanel = panel;
  }

  function handleListClick(event, item) {
      if (currentSelectedEl === item && currentOpenPanel) { closeCurrentPanel(); return; }
      if (currentOpenPanel) currentOpenPanel.remove();
      currentSelectedEl = item; const panel = document.createElement('div'); panel.className = 'detail-panel'; panel.innerHTML = generateDetailHTML(event, formatDate(getVal(event, '日期')));
      item.parentNode.insertBefore(panel, item.nextSibling); setTimeout(() => panel.classList.add('open'), 10); currentOpenPanel = panel;
  }

  function closeCurrentPanel() {
      if (currentOpenPanel) { currentOpenPanel.remove(); currentOpenPanel = null; if (currentSelectedEl) { currentSelectedEl.classList.remove('selected'); currentSelectedEl.style.backgroundColor = ''; currentSelectedEl = null; } }
  }

  function switchPanelTab(btn, tabId) {
      const panel = btn.closest('.detail-panel'); panel.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
      panel.querySelectorAll('.panel-tab-content').forEach(c => c.style.display = 'none'); panel.querySelector('#' + tabId).style.display = 'block';
  }

  function generateReceiptHTML(bills) {
      if (bills.length === 0) return `<div style="text-align:center; color:#95a5a6; font-size:13px; padding:20px;">無帳務明細</div>`;
      const grouped = {}; bills.forEach(b => { const d = formatDate(getVal(b, '日期')); if (!grouped[d]) grouped[d] = []; grouped[d].push(b); });
      let html = `<div style="background:#fff; border-radius:12px; border:1px solid #eee; padding:15px; margin-bottom:15px;">`;
      Object.keys(grouped).sort().forEach(dateKey => {
          html += `<div style="font-weight:bold; color:var(--brand-main); margin-bottom:8px; border-bottom:1px solid #eee; padding-bottom:5px; font-size:14px; margin-top:10px;">${dateKey}</div>`;
          grouped[dateKey].forEach(b => {
              const cat = getVal(b, '類別'), item = getVal(b, '項目'), pay = getVal(b, '付款方式'), amt = parseFloat(getVal(b, '金額')) || 0, memo = getVal(b, '備註');
              html += `
              <div style="display:flex; flex-direction:column; padding: 12px 0; border-bottom: 1px dashed #f5f5f5;">
                  <div style="display: grid; grid-template-columns: auto 1fr auto auto; gap: 8px; font-size: 14px; align-items: center;">
                      <div style="color:#fff; font-size:10px; background:${getColorForCategory(cat)}; padding:2px 8px; border-radius:10px; white-space: nowrap; font-weight:bold;">${cat}</div>
                      <div style="color:#2c3e50; font-weight: 500;">${item}</div>
                      <div style="font-size:12px; color:#aaa;">${pay}</div>
                      <div style="font-weight:bold; color:var(--settle-pink); text-align: right; min-width: 60px;">$${amt.toLocaleString()}</div>
                  </div>
                  ${memo ? `<div style="font-size: 12px; color: #95a5a6; margin-top: 4px; padding-left: 45px;">備註：${memo}</div>` : ''}
                  <div class="edit-controls">
                      <button class="circle-btn edit-btn" onclick="openEditModal('帳務明細', ${b['_rowIndex']}, event)">✎</button>
                      <button class="circle-btn del-btn" onclick="showConfirmDelete('帳務明細', ${b['_rowIndex']}, event)">✖</button>
                  </div>
              </div>`;
          });
      });
      return html + `</div>`;
  }

  function generateDetailHTML(event, dateStr) {
    if (!event) return `<div class="detail-header" style="margin-bottom:10px; border:none;"><div><div class="detail-race-name">日常帳務</div><div style="font-size:14px;color:#7f8c8d;margin-top:4px;">日期：${dateStr}</div></div></div>` + generateReceiptHTML((dbData['帳務明細']||[]).filter(b => formatDate(getVal(b, '日期')) === dateStr));
    const code = getVal(event, '行程代碼'), bills = (dbData['帳務明細']||[]).filter(b => getVal(b, '行程代碼') === code);
    let html = `
    <div class="detail-header" style="flex-direction:column; gap:10px; align-items: flex-start;">
        <div style="display:flex; justify-content:space-between; width:100%; align-items:baseline;">
            <div><div class="detail-race-name">${getVal(event, '行程名稱')}</div><div style="font-size:14px;color:#7f8c8d;margin-top:4px;">日期：${formatDate(getVal(event, '日期'))}</div></div>
            ${getVal(event,'行程連結') ? `<a href="${getVal(event,'行程連結')}" target="_blank" class="link-btn">簡章 >></a>` : ''}
        </div>
        <div class="edit-controls" style="width:100%; border:none; margin:0; padding:0;">
            <button class="circle-btn edit-btn" onclick="openEditModal('行程', ${event['_rowIndex']}, event)">✎</button>
            <button class="circle-btn del-btn" onclick="showConfirmDelete('行程', ${event['_rowIndex']}, event)">✖</button>
        </div>
    </div>`;
    html += `<div class="view-switcher" style="margin-bottom: 20px; width: fit-content; background: #f0f0f0;"><button class="view-btn panel-view-btn active" onclick="switchPanelTab(this, 'tab-info')">行程資訊</button><button class="view-btn panel-view-btn" onclick="switchPanelTab(this, 'tab-expense')">帳務明細</button></div>`;
    html += `<div id="tab-info" class="panel-tab-content" style="display:block;"><div class="info-section"><div class="info-title title-race">報名資訊</div><div class="info-card card-race">`;
    if(getVal(event,'聿凡項目')) html += `<div class="info-row"><span>聿凡</span><span>${getVal(event,'聿凡項目')}</span></div>`;
    if(getVal(event,'光武項目')) html += `<div class="info-row"><span>光武</span><span>${getVal(event,'光武項目')}</span></div>`;
    html += renderPriceRow('費用', getVal(event,'報名費總額'), getVal(event,'報名費付款人'), getVal(event,'付款方式')) + `</div></div>`;
    
    (dbData['住宿']||[]).filter(s => getVal(s, '行程代碼') === code).forEach(s => {
      html += `<div class="info-section"><div class="info-title">住宿資訊</div><div class="info-card"><div style="display:flex;justify-content:space-between;margin-bottom:10px;"><span style="font-weight:bold;">${getVal(s,'飯店名稱')}</span>${getVal(s,'連結') ? `<a href="${getVal(s,'連結')}" target="_blank" style="font-size:12px;background:#eceff1;color:#546e7a;padding:3px 10px;border-radius:15px;text-decoration:none;">地圖 >></a>` : ''}</div>` + renderPriceRow('費用', getVal(s,'費用'), getVal(s,'付款人'), getVal(s,'付款方式')) + `<div class="edit-controls"><button class="circle-btn edit-btn" onclick="openEditModal('住宿', ${s['_rowIndex']}, event)">✎</button><button class="circle-btn del-btn" onclick="showConfirmDelete('住宿', ${s['_rowIndex']}, event)">✖</button></div></div></div>`;
    });
    
    (dbData['交通']||[]).filter(t => getVal(t, '行程代碼') === code).forEach(t => {
      html += `<div class="info-section"><div class="info-title">交通安排</div><div class="info-card"><div style="font-weight:bold;margin-bottom:10px;">${getVal(t,'類型')}</div>` + renderPriceRow('費用', getVal(t,'票價或油資'), getVal(t,'付款人'), getVal(t,'付款方式')) + `<div class="edit-controls"><button class="circle-btn edit-btn" onclick="openEditModal('交通', ${t['_rowIndex']}, event)">✎</button><button class="circle-btn del-btn" onclick="showConfirmDelete('交通', ${t['_rowIndex']}, event)">✖</button></div></div></div>`;
    });
    
    html += `<div style="display: flex; justify-content: flex-end; margin-top: 5px;"><div class="event-settle-card"><div style="font-weight:bold; color:var(--settle-pink); font-size:13px;">本場行程結算</div><div style="font-size:20px; font-weight:900; color:var(--settle-pink);">$${calculateEventTotal(code).toLocaleString()}</div></div></div></div><div id="tab-expense" class="panel-tab-content" style="display:none;">${generateReceiptHTML(bills)}</div>`;
    return html;
  }
</script>
</body>
</html>
