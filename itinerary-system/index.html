<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>光聿 KUANGYU - 行程總覽</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* =========================================
       光聿行程美學定義 (品牌色平衡 + 顯示修正版)
       ========================================= */
    :root {
      --brand-blue: #1e88e5;
      --brand-pink: #f06292;
      --brand-yellow: #ffb74d;
      --brand-green: #2ecc71;

      --cat-鐵人: var(--brand-blue); 
      --cat-自行車: #4caf50; 
      --cat-路跑: #ff7043;
      --cat-游泳: #00acc1; 
      --cat-活動: var(--brand-pink); 
      --cat-旅遊: var(--brand-yellow);
      --cat-移地訓練: var(--brand-green);

      --text-main: #2c3e50; --text-sub: #546e7a; --bg-color: #ffffff;
      --card-bg: #f7f9fa; --brand-main: #2c3e50;
    }

    body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; background: var(--bg-color); margin: 0; padding: 0; color: var(--text-main); min-height: 100vh; }
    .container { max-width: 800px; width: 100%; margin: 0 auto; padding: 30px 20px; box-sizing: border-box; text-align: center; }
    .header-title { font-size: 28px; font-weight: 800; color: var(--text-main); letter-spacing: 2px; margin-bottom: 5px; }
    .header-subtitle { font-size: 16px; margin-bottom: 20px; color: var(--text-sub); display: flex; align-items: center; justify-content: center; gap: 10px; }
    .refresh-btn { cursor: pointer; font-size: 14px; background: #fce4ec; color: var(--brand-pink); padding: 5px 8px; border-radius: 50%; font-weight: bold; display: inline-flex; align-items: center; justify-content: center; }

    .action-bar { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 30px; }
    .top-btns { display: flex; gap: 10px; align-items: center; }
    .acc-toggle-btn { background: var(--brand-main); color: #fff; border: none; padding: 10px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 13px; }
    
    .view-switcher { background: #eee; border-radius: 20px; padding: 3px; display: flex; gap: 2px; }
    .view-btn { border: none; padding: 6px 15px; border-radius: 17px; cursor: pointer; font-size: 12px; font-weight: bold; color: #7f8c8d; background: transparent; }
    .view-btn.active { background: #fff; color: var(--brand-main); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

    #acc-panel { display: none; background: #f8f9fa; border-radius: 20px; padding: 25px; margin-bottom: 30px; text-align: left; border: 1px solid #eee; animation: fadeIn 0.3s ease; }
    .acc-title { font-size: 18px; font-weight: 800; margin-bottom: 15px; color: var(--brand-main); border-bottom: 2px solid #eee; padding-bottom: 10px; }
    .acc-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
    .acc-card { background: #fff; padding: 12px 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
    .acc-label { font-size: 11px; color: #7f8c8d; font-weight: bold; display: block; }
    .acc-val { font-size: 16px; font-weight: 800; color: var(--brand-main); }
    
    .filter-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
    .filter-btn { padding: 8px 16px; background: #fff; border: 1px solid #ddd; border-radius: 20px; font-size: 13px; font-weight: bold; color: #7f8c8d; cursor: pointer; }
    .filter-btn.active { background: var(--brand-main); color: #fff; border-color: var(--brand-main); }

    .view-container { display: none; text-align: left; }
    .view-container.active { display: block; }

    /* 日曆核心樣式 (修正數字消失問題) */
    .month-section { margin-bottom: 40px; }
    .month-title { font-weight: 800; font-size: 22px; margin: 0 0 20px; padding-left: 5px; }
    .calendar-header, .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .weekday-header { font-weight: bold; font-size: 15px; text-align: center; color: #b0bec5; padding-bottom: 10px; }
    
    .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 14px; background-color: var(--card-bg); color: #cfd8dc; font-size: 18px; border: 2px solid transparent; transition: 0.2s; position: relative; }
    .day-number { position: relative; z-index: 2; }
    
    .day.has-event { background-color: #fff; color: #333; cursor: pointer; border-width: 2px; font-weight: 600; }
    .day.selected { color: #fff !important; transform: scale(1.05); box-shadow: 0 5px 15px rgba(0,0,0,0.1) !important; z-index: 10; }

    /* 清單與倒數 */
    .list-item { background: #fff; border-radius: 15px; padding: 15px 20px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; cursor: pointer; border: 1px solid #eee; transition: 0.2s; border-left: 6px solid #ddd; }
    .list-date { min-width: 50px; text-align: center; }
    .list-date .m { font-size: 11px; color: #7f8c8d; display: block; }
    .list-date .d { font-size: 22px; font-weight: 800; color: var(--brand-main); }
    .list-name { font-size: 17px; font-weight: bold; color: var(--brand-main); flex: 1; }
    .list-countdown { text-align: right; min-width: 70px; }
    .list-countdown-label { font-size: 11px; color: #999; display: block; margin-bottom: -2px; }
    .list-countdown-days { font-size: 17px; font-weight: 900; color: var(--brand-pink); }

    /* 詳情面板 */
    .detail-panel { grid-column: 1 / -1; background: #fff; border-radius: 16px; margin: 8px 0; max-height: 0; opacity: 0; overflow: hidden; transition: max-height 0.4s ease, opacity 0.3s ease; box-sizing: border-box; width: 100%; }
    .detail-panel.open { max-height: 5000px; opacity: 1; padding: 25px; border: 1px solid #eee; margin-bottom: 20px; text-align: left; }
    .detail-header { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid #eee; padding-bottom: 12px; margin-bottom: 20px; }
    .detail-race-name { font-size: 22px; font-weight: bold; color: var(--text-main); }
    
    .link-btn { font-size: 13px; padding: 6px 14px; background: #fce4ec; color: var(--brand-pink); border-radius: 20px; text-decoration: none; font-weight: bold; display: inline-block; }

    /* 資訊卡片配色 */
    .info-section { margin-bottom: 25px; }
    .info-title { font-weight: bold; font-size: 16px; color: #7f8c8d; margin-bottom: 10px; display: flex; align-items: center; }
    .info-title::before { content: ''; display: inline-block; width: 6px; height: 16px; background: #ddd; margin-right: 10px; border-radius: 3px; }
    .info-card { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 10px; font-size: 15px; line-height: 1.6; color: #333; border-left: 5px solid #ddd; }
    
    .card-race { border-left-color: var(--brand-blue); }
    .card-stay { border-left-color: var(--brand-yellow); }
    .card-trans { border-left-color: var(--brand-green); }
    .card-bill { border-left-color: var(--brand-pink); }

    .info-row { display: flex; gap: 12px; margin-bottom: 8px; align-items: baseline; }
    .info-row > span:first-child { color: #7f8c8d; min-width: 65px; text-align: center; }
    .info-row > span:last-child { color: #2c3e50; flex: 1; }
    
    .price-row { display: flex; justify-content: space-between; align-items: center; border-top: 1px dashed #ddd; padding-top: 12px; margin-top: 12px; }
    .price-tag { color: var(--brand-pink); font-weight: bold; font-size: 16px; }
    .status-tag { font-size: 11px; padding: 3px 8px; border-radius: 6px; background: #eee; color: #666; font-weight: bold; }
    .status-tag.paid { background: #e8f5e9; color: #2e7d32; }
    
    .event-settle-card { background: #fff4f7; border: 1.5px solid var(--brand-pink); padding: 10px 15px; border-radius: 12px; margin-top: 15px; display: flex; justify-content: space-between; align-items: center; }

    .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; justify-content: center; align-items: center; z-index: 9999; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div id="loading" class="loading-overlay">正在讀取光聿行程資料...</div>

  <div class="container">
    <div class="header-title">光聿 KUANGYU</div>
    <div class="header-subtitle">行程總覽系統 <span class="refresh-btn" onclick="location.reload()">↻</span></div>

    <div class="action-bar">
      <div class="top-btns">
          <button class="acc-toggle-btn" onclick="toggleAccPanel()">帳務明細總覽</button>
          <div class="view-switcher">
              <button id="btn-cal" class="view-btn active" onclick="switchView('cal')">日曆</button>
              <button id="btn-list" class="view-btn" onclick="switchView('list')">清單</button>
          </div>
      </div>
      <div id="filter-bar" class="filter-bar"></div>
    </div>

    <div id="acc-panel">
      <div class="acc-title">年度分類統計</div>
      <div id="acc-cat-grid" class="acc-grid"></div>
      <div class="acc-title" style="margin-top:20px;">年度項目統計</div>
      <div id="acc-item-grid" class="acc-grid"></div>
      <div class="event-settle-card" style="background: #ebf0f1; border-color: var(--brand-main); margin-top:20px;">
        <div style="font-weight:bold; color:var(--brand-main); font-size:13px;">當前總額支出</div>
        <div id="acc-grand-total" style="font-size:18px; font-weight:900; color:var(--brand-main);">$0</div>
      </div>
    </div>

    <div id="cal-view" class="view-container active"><div id="calendar-container"></div></div>
    <div id="list-view" class="view-container"><div id="list-container"></div></div>
  </div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbxUGVmAqfEmepMoAAlY0KkEiGOis9aSR-DpCqA9Nea6ZJZg4YUCg9uBvnJs6HuR0DAjQg/exec";
  let dbData = {};
  let currentFilter = '全部';
  let currentView = 'cal';

  window.onload = initSystem;

  async function initSystem() {
    try {
      const res = await fetch(API_URL + "?t=" + new Date().getTime());
      dbData = await res.json();
      renderFilters();
      renderMain();
      document.getElementById('loading').style.display = 'none';
    } catch (e) {
      document.getElementById('loading').innerHTML = "讀取失敗，請確認網路連線";
    }
  }

  function switchView(view) {
      currentView = view;
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-' + view).classList.add('active');
      document.querySelectorAll('.view-container').forEach(c => c.classList.remove('active'));
      document.getElementById(view + '-view').classList.add('active');
      closeCurrentPanel();
      renderMain();
  }

  function renderMain() { if (currentView === 'cal') renderCalendar(); else renderList(); }

  function toggleAccPanel() {
    const panel = document.getElementById('acc-panel');
    const isVisible = panel.style.display === 'block';
    panel.style.display = isVisible ? 'none' : 'block';
    if (!isVisible) calculateAccounting();
  }

  function calculateAccounting() {
    let races = currentFilter === '全部' ? dbData['行程'] : dbData['行程'].filter(r => getVal(r, '行程類別') === currentFilter);
    let catTotals = {}, itemTotals = { '報名費': 0, '住宿': 0, '交通': 0, '其他': 0 }, grandTotal = 0;
    races.forEach(r => {
      const code = getVal(r, '行程代碼'), cat = getVal(r, '行程類別'), sum = calculateEventTotal(code);
      catTotals[cat] = (catTotals[cat] || 0) + sum; grandTotal += sum;
      itemTotals['報名費'] += parseFloat(getVal(r, '報名費總額')) || 0;
      (dbData['住宿']||[]).filter(s => getVal(s,'行程代碼')===code).forEach(s => itemTotals['住宿'] += parseFloat(getVal(s,'費用')) || 0);
      (dbData['交通']||[]).filter(t => getVal(t,'行程代碼')===code).forEach(t => itemTotals['交通'] += parseFloat(getVal(t,'票價或油資')) || 0);
      (dbData['帳務明細']||[]).filter(b => getVal(b,'行程代碼')===code).forEach(b => itemTotals['其他'] += parseFloat(getVal(b,'金額')) || 0);
    });
    const catGrid = document.getElementById('acc-cat-grid'); catGrid.innerHTML = '';
    Object.entries(catTotals).forEach(([k, v]) => catGrid.innerHTML += `<div class="acc-card"><label>${k}</label><span class="acc-val">$${v.toLocaleString()}</span></div>`);
    const itemGrid = document.getElementById('acc-item-grid'); itemGrid.innerHTML = '';
    Object.entries(itemTotals).forEach(([k, v]) => itemGrid.innerHTML += `<div class="acc-card"><label>${k}總結</label><span class="acc-val">$${v.toLocaleString()}</span></div>`);
    document.getElementById('acc-grand-total').textContent = '$' + grandTotal.toLocaleString();
  }

  function calculateEventTotal(code) {
    let sum = 0; const race = dbData['行程'].find(r => getVal(r, '行程代碼') === code);
    if (race) sum += parseFloat(getVal(race, '報名費總額')) || 0;
    (dbData['住宿']||[]).filter(s => getVal(s, '行程代碼') === code).forEach(s => sum += parseFloat(getVal(s, '費用')) || 0);
    (dbData['交通']||[]).filter(t => getVal(t, '行程代碼') === code).forEach(t => sum += parseFloat(getVal(t, '票價或油資')) || 0);
    (dbData['帳務明細']||[]).filter(b => getVal(b, '行程代碼') === code).forEach(b => sum += parseFloat(getVal(b, '金額')) || 0);
    return sum;
  }

  function renderFilters() {
    const bar = document.getElementById('filter-bar');
    const cats = ['全部', ...new Set(dbData['行程'].map(r => getVal(r, '行程類別')).filter(c => c))];
    bar.innerHTML = '';
    cats.forEach(c => {
      const btn = document.createElement('button');
      btn.className = `filter-btn ${c === currentFilter ? 'active' : ''}`;
      btn.textContent = c;
      btn.onclick = () => { currentFilter = c; renderFilters(); renderMain(); if(document.getElementById('acc-panel').style.display === 'block') calculateAccounting(); };
      bar.appendChild(btn);
    });
  }

  function getVal(obj, key) { if(!obj) return ""; return obj[Object.keys(obj).find(k => k.trim() === key)] || ""; }
  function hasVal(v) { return v !== "" && v !== null && v !== undefined; }
  function formatDate(d) { const date = new Date(d); return isNaN(date.getTime()) ? "" : `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`; }

  function renderPriceRow(label, val, payer, method, status) {
    if(!hasVal(val)) return '';
    let p = payer || '-', m = method || '-', s = status || '-';
    let pm = method === undefined ? p : (p==='-' && m==='-' ? '-' : `${p} / ${m}`);
    return `<div class="price-row"><div><span style="color:#7f8c8d;">${label}</span> <span class="price-tag">$${val}</span></div><div style="font-size:12px;color:#888;">${pm} <span class="status-tag ${s==='已付'?'paid':''}">${s}</span></div></div>`;
  }

  function renderCalendar() {
    const container = document.getElementById('calendar-container'); container.innerHTML = '';
    let races = currentFilter === '全部' ? dbData['行程'] : dbData['行程'].filter(r => getVal(r, '行程類別') === currentFilter);
    const monthKeys = [...new Set(races.map(r => formatDate(getVal(r, '日期')).substring(0, 7)))].sort();

    monthKeys.forEach(mKey => {
      const [y, m] = mKey.split('-');
      const section = document.createElement('div'); section.className = 'month-section';
      section.innerHTML = `<div class="month-title">${y}年${m}月</div><div class="calendar-header">${['日','一','二','三','四','五','六'].map(d => `<div class="weekday-header">${d}</div>`).join('')}</div>`;
      const grid = document.createElement('div'); grid.className = 'calendar-grid';
      const firstDay = new Date(y, m-1, 1).getDay(), lastDate = new Date(y, m, 0).getDate();
      for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
      for (let d = 1; d <= lastDate; d++) {
        const dStr = `${y}-${m}-${String(d).padStart(2,'0')}`, cell = document.createElement('div'); cell.className = 'day'; cell.innerHTML = `<span class="day-number">${d}</span>`;
        const event = races.find(r => formatDate(getVal(r, '日期')) === dStr);
        if (event) {
          cell.classList.add('has-event'); 
          cell.style.borderColor = 'var(--cat-' + getVal(event, '行程類別') + ')';
          cell.onclick = () => handleDayClick(event, cell, grid);
        }
        grid.appendChild(cell);
      }
      section.appendChild(grid); container.appendChild(section);
    });
  }

  function renderList() {
      const container = document.getElementById('list-container'); container.innerHTML = '';
      let races = currentFilter === '全部' ? dbData['行程'] : dbData['行程'].filter(r => getVal(r, '行程類別') === currentFilter);
      races.sort((a, b) => new Date(getVal(a, '日期')) - new Date(getVal(b, '日期')));
      const today = new Date(); today.setHours(0, 0, 0, 0);
      races.forEach(event => {
          const eDate = new Date(getVal(event, '日期')); const cat = getVal(event, '行程類別');
          const daysDiff = Math.ceil((eDate - today) / (1000 * 60 * 60 * 24));
          let countdownHtml = daysDiff > 0 ? `<span class="list-countdown-label">還有</span><span class="list-countdown-days">${daysDiff}天</span>` : (daysDiff === 0 ? `<span class="list-countdown-days">今天</span>` : `<span class="list-countdown-days" style="color:#bbb;">已結束</span>`);
          const item = document.createElement('div'); item.className = 'list-item'; item.style.borderLeftColor = 'var(--cat-' + cat + ')';
          item.innerHTML = `<div class="list-date"><span class="m">${eDate.getMonth()+1}月</span><span class="d">${eDate.getDate()}</span></div><div class="list-name">${getVal(event, '行程名稱')}</div><div class="list-countdown">${countdownHtml}</div>`;
          item.onclick = () => handleListClick(event, item);
          container.appendChild(item);
      });
  }

  let currentOpenPanel = null, currentSelectedEl = null;

  function handleDayClick(event, cell, grid) {
    if (currentSelectedEl === cell && currentOpenPanel) { closeCurrentPanel(); return; }
    if (currentSelectedEl) { currentSelectedEl.classList.remove('selected'); currentSelectedEl.style.backgroundColor = ''; }
    currentSelectedEl = cell; cell.classList.add('selected');
    
    // 直接從變數抓取類別顏色
    const category = getVal(event, '行程類別');
    cell.style.backgroundColor = 'var(--cat-' + category + ')';
    
    if (currentOpenPanel) currentOpenPanel.remove();
    const panel = document.createElement('div'); panel.className = 'detail-panel'; panel.innerHTML = generateDetailHTML(event);
    const cells = Array.from(grid.children), idx = cells.indexOf(cell), rowEnd = Math.min(cells.length - 1, idx + (6 - (idx % 7)));
    grid.insertBefore(panel, cells[rowEnd].nextSibling); setTimeout(() => panel.classList.add('open'), 10); currentOpenPanel = panel;
  }

  function handleListClick(event, item) {
      if (currentSelectedEl === item && currentOpenPanel) { closeCurrentPanel(); return; }
      if (currentOpenPanel) currentOpenPanel.remove();
      currentSelectedEl = item;
      const panel = document.createElement('div'); panel.className = 'detail-panel'; panel.innerHTML = generateDetailHTML(event);
      item.parentNode.insertBefore(panel, item.nextSibling); setTimeout(() => panel.classList.add('open'), 10); currentOpenPanel = panel;
  }

  function closeCurrentPanel() {
      if (currentOpenPanel) { currentOpenPanel.remove(); currentOpenPanel = null;
          if (currentSelectedEl) { currentSelectedEl.classList.remove('selected'); currentSelectedEl.style.backgroundColor = ''; currentSelectedEl = null; }
      }
  }

  function generateDetailHTML(event) {
    const code = getVal(event, '行程代碼'), cat = getVal(event, '行程類別');
    let html = `<div class="detail-header"><div><div class="detail-race-name">${getVal(event, '行程名稱')}</div><div style="font-size:14px;color:#7f8c8d;margin-top:4px;">日期：${formatDate(getVal(event, '日期'))}</div></div>${getVal(event,'行程連結')?`<a href="${getVal(event,'行程連結')}" target="_blank" class="link-btn">前往簡章 >></a>`:''}</div>`;
    
    html += `<div class="info-section"><div class="info-title">報名資訊</div><div class="info-card race">`;
    if(getVal(event,'聿凡項目')) html += `<div class="info-row"><span>聿凡</span><span>${getVal(event,'聿凡項目')}</span></div>`;
    if(getVal(event,'光武項目')) html += `<div class="info-row"><span>光武</span><span>${getVal(event,'光武項目')}</span></div>`;
    html += renderPriceRow('費用', getVal(event,'報名費總額'), getVal(event,'付款人'), getVal(event,'報名費付款方式'), getVal(event,'狀態')) + `</div></div>`;

    const stays = (dbData['住宿']||[]).filter(s => getVal(s, '行程代碼') === code);
    if(stays.length > 0) {
      html += `<div class="info-section"><div class="info-title">住宿資訊</div>`;
      stays.forEach(s => {
        html += `<div class="info-card stay"><div style="display:flex;justify-content:space-between;margin-bottom:10px;"><span style="font-weight:bold;">${getVal(s,'飯店名稱')}</span>${getVal(s,'連結')?`<a href="${getVal(s,'連結')}" target="_blank" style="font-size:12px;background:#e1f5fe;color:#01579b;padding:3px 10px;border-radius:15px;text-decoration:none;font-weight:bold;">地圖 >></a>`:''}</div>`;
        if(getVal(s,'入住日期')) html += `<div class="info-row"><span>入住</span><span>${formatDate(getVal(s,'入住日期')).substring(5)} ${getVal(s,'入住時間')||''}</span></div>`;
        if(getVal(s,'退房日期')) html += `<div class="info-row"><span>退房</span><span>${formatDate(getVal(s,'退房日期')).substring(5)} ${getVal(s,'退房時間')||''}</span></div>`;
        if(getVal(s,'訂房平台')) html += `<div class="info-row"><span>平台</span><span>${getVal(s,'訂房平台')}</span></div>`;
        html += renderPriceRow('費用', getVal(s,'費用'), getVal(s,'付款人'), getVal(s,'付款方式'), getVal(s,'狀態'));
        if(getVal(s,'備註')) html += `<div style="margin-top:8px; font-size:12px; color:#666;">備註：${getVal(s,'備註')}</div>`;
        html += `</div>`;
      });
      html += `</div>`;
    }

    const trans = (dbData['交通']||[]).filter(t => getVal(t, '行程代碼') === code);
    if(trans.length > 0) {
      html += `<div class="info-section"><div class="info-title">交通安排</div>`;
      trans.forEach(t => {
        html += `<div class="info-card trans"><div style="font-weight:bold;margin-bottom:8px;">${getVal(t,'類型')}</div>`;
        const goB = getVal(t,'去程班次 / 航班') || getVal(t,'去程班次/航班');
        if(goB) html += `<div class="info-row"><span>去程班次</span><span>${goB}</span></div>`;
        if(getVal(t,'出發日期')) html += `<div class="info-row"><span>日期時間</span><span>${formatDate(getVal(t,'出發日期')).substring(5)} ${getVal(t,'去程出發時間')||'--:--'} - ${getVal(t,'去程抵達時間')||'--:--'}</span></div>`;
        const bkB = getVal(t,'回程班次 / 航班') || getVal(t,'回程班次/航班');
        if(bkB) html += `<div class="info-row" style="margin-top:5px;"><span>回程班次</span><span>${bkB}</span></div>`;
        if(getVal(t,'回程日期')) html += `<div class="info-row"><span>日期時間</span><span>${formatDate(getVal(t,'回程日期')).substring(5)} ${getVal(t,'回程出發時間')||'--:--'} - ${getVal(t,'回程抵達時間')||'--:--'}</span></div>`;
        html += renderPriceRow('費用', getVal(t,'費用'), getVal(t,'付款人'), getVal(t,'付款方式'), getVal(t,'狀態')) + `</div>`;
      });
      html += `</div>`;
    }

    const bills = (dbData['帳務明細']||[]).filter(b => getVal(b, '行程代碼') === code);
    if(bills.length > 0) {
      html += `<div class="info-section"><div class="info-title">其他帳務</div>`;
      bills.forEach(b => {
        html += `<div class="info-card bill"><div style="font-weight:bold;margin-bottom:8px;">${getVal(b,'項目名稱')}</div>${renderPriceRow('金額', getVal(b,'金額'), getVal(b,'付款人'), undefined, getVal(b,'付款狀態'))}`;
        if(getVal(b,'備註')) html += `<div style="font-size:12px;color:#666;margin-top:5px;">備註：${getVal(b,'備註')}</div>`;
        html += `</div>`;
      });
      html += `</div>`;
    }

    if(getVal(event,'備註')) html += `<div class="info-section"><div class="info-title">備註</div><div class="info-card" style="border-left-color:#95a5a6;">${getVal(event,'備註')}</div></div>`;
    html += `<div class="event-settle-card"><div style="font-weight:bold; color:var(--brand-pink); font-size:13px;">本場行程結算</div><div style="font-size:18px; font-weight:900; color:var(--brand-pink);">$${calculateEventTotal(code).toLocaleString()}</div></div>`;
    return html;
  }
</script>
</body>
</html>
