<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>光聿 KUANGYU - 行程小助理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* =========================================
       光聿行程美學定義 (月份獨立篩選版)
       ========================================= */
    :root {
      --brand-blue: #1e88e5;
      --brand-pink: #f06292;
      --brand-yellow: #ffb74d;
      --brand-green: #2ecc71;
      
      --action-button-color: #00838f;
      --action-button-bg: #e0f2f1;

      --cat-鐵人: var(--brand-blue); 
      --cat-自行車: #4caf50; 
      --cat-路跑: #ff7043;
      --cat-游泳: #00acc1; 
      --cat-活動: var(--brand-pink); 
      --cat-旅遊: var(--brand-yellow);
      --cat-移地訓練: var(--brand-green);

      --text-main: #2c3e50; --text-sub: #546e7a; --bg-color: #fcfcfc;
      --card-bg: #ffffff; --brand-main: #2c3e50;
    }

    body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; background: var(--bg-color); margin: 0; padding: 0; color: var(--text-main); min-height: 100vh; }
    .container { max-width: 800px; width: 100%; margin: 0 auto; padding: 30px 20px; box-sizing: border-box; text-align: center; }
    
    .header-title { font-size: 28px; font-weight: 800; color: var(--text-main); letter-spacing: 2px; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .refresh-btn { cursor: pointer; font-size: 13px; background: var(--action-button-bg); color: var(--action-button-color); padding: 5px 10px; border-radius: 15px; font-weight: bold; line-height: 1; display: inline-flex; align-items: center; justify-content: center; transition: background 0.2s; }
    .refresh-btn:hover { background: #b2dfdb; }

    .action-bar { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 30px; }
    .top-btns { display: flex; gap: 10px; align-items: center; }
    .acc-toggle-btn { background: var(--brand-main); color: #fff; border: none; padding: 10px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 13px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    
    .view-switcher { background: #eee; border-radius: 20px; padding: 3px; display: flex; gap: 2px; }
    .view-btn { border: none; padding: 6px 15px; border-radius: 17px; cursor: pointer; font-size: 12px; font-weight: bold; color: #7f8c8d; background: transparent; transition: 0.3s; }
    .view-btn.active { background: #fff; color: var(--brand-main); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

    #acc-panel { display: none; background: #fff; border-radius: 20px; padding: 25px; margin-bottom: 30px; text-align: left; border: 1px solid #eee; animation: fadeIn 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
    .acc-grand-banner { background: var(--brand-main); color: #fff; padding: 20px; border-radius: 16px; text-align: center; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(44, 62, 80, 0.2); }
    .acc-grand-label { font-size: 13px; opacity: 0.8; margin-bottom: 5px; }
    .acc-grand-val { font-size: 28px; font-weight: 900; letter-spacing: 1px; color: #fff; }

    .acc-title { font-size: 16px; font-weight: 800; margin-bottom: 15px; color: var(--brand-main); display: flex; align-items: center;}
    .acc-title::before { content: ''; display: inline-block; width: 4px; height: 14px; background: var(--brand-main); margin-right: 8px; border-radius: 2px; }
    
    .acc-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 25px; }
    .acc-card { background: #fafafa; padding: 12px 15px; border-radius: 12px; border: 1px solid #f0f0f0;}
    .acc-label { font-size: 12px; color: #7f8c8d; font-weight: bold; margin-bottom: 4px;}
    .acc-val { font-size: 15px; font-weight: 800; color: var(--brand-main); }
    
    .acc-tabs { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
    .acc-tab-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #ddd; background: #fff; color: #7f8c8d; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; }
    .acc-tab-btn.active { background: var(--brand-main); color: #fff; border-color: var(--brand-main); }

    .acc-detail-container { background: #fff; border-radius: 12px; border: 1px solid #eee; overflow: hidden; }
    .acc-detail-item { display: flex; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 14px; }
    .acc-detail-item:last-child { border-bottom: none; }
    .acc-detail-name { color: var(--text-main); font-weight: bold; }
    .acc-detail-amount { color: var(--brand-main); font-weight: 900; }

    .filter-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
    .filter-btn { padding: 8px 16px; background: #fff; border: 1px solid #ddd; border-radius: 20px; font-size: 13px; font-weight: bold; color: #7f8c8d; cursor: pointer; transition: 0.2s; }
    .filter-btn.active { background: var(--brand-main); color: #fff; border-color: var(--brand-main); }

    .view-container { display: none; text-align: left; }
    .view-container.active { display: block; }

    .month-nav-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; flex-wrap: wrap; }
    .month-nav-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid #ddd; background: #fff; color: #7f8c8d; font-size: 15px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .month-nav-btn.has-data { border-color: var(--brand-main); color: var(--brand-main); }
    .month-nav-btn.has-data:hover { background: var(--brand-main); color: #fff; }
    .month-nav-btn.no-data { opacity: 0.3; cursor: default; }
    /* 新增：被選中的月份按鈕樣式 */
    .month-nav-btn.active { background: var(--brand-main); color: #fff; border-color: var(--brand-main); opacity: 1 !important; }

    .past-toggle-btn { text-align: center; color: #7f8c8d; font-size: 13px; cursor: pointer; margin-bottom: 20px; font-weight: bold; background: #f0f0f0; padding: 10px; border-radius: 20px; transition: 0.2s; }
    .past-toggle-btn:hover { background: #e0e0e0; color: var(--brand-main); }

    .month-title { font-weight: 800; font-size: 22px; margin: 20px 0 20px; padding-left: 5px; color: var(--text-main); }
    .calendar-header, .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .weekday-header { font-weight: bold; font-size: 15px; text-align: center; color: #b0bec5; padding-bottom: 10px; }
    
    .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 14px; background-color: transparent; color: #cfd8dc; transition: 0.2s ease; font-size: 18px; position: relative; border: 2px solid transparent; }
    .day-number { position: relative; z-index: 2; }
    .day.has-event { background-color: #fff; color: #333; cursor: pointer; font-weight: 600; box-shadow: 0 2px 6px rgba(0,0,0,0.04); border-width: 2px; }
    .day.selected { color: #fff !important; transform: scale(1.05); box-shadow: 0 5px 15px rgba(0,0,0,0.15) !important; z-index: 10; border-color: transparent !important; }

    .list-item { background: #fff; border-radius: 15px; padding: 15px 20px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; cursor: pointer; border: 1px solid #eee; transition: 0.2s; box-shadow: 0 2px 6px rgba(0,0,0,0.02); border-left: 6px solid #ddd; }
    .list-item:hover { transform: translateX(5px); box-shadow: 0 5px 15px rgba(0,0,0,0.06); }
    
    .list-date { min-width: 50px; text-align: center; }
    .list-date .m { font-size: 11px; color: #95a5a6; display: block; letter-spacing: 1px;}
    .list-date .d { font-size: 22px; font-weight: 800; color: var(--brand-main); }
    .list-name { font-size: 17px; font-weight: bold; color: var(--brand-main); flex: 1; }
    
    .list-countdown { text-align: right; min-width: 80px; font-size: 13px; font-weight: bold; color: var(--text-main); }
    .list-countdown-days { font-size: 18px; font-weight: 900; color: var(--brand-pink); margin: 0 3px; }

    .detail-panel { grid-column: 1 / -1; background: transparent; border-radius: 16px; margin: 10px 0; max-height: 0; opacity: 0; overflow: hidden; transition: max-height 0.4s ease, opacity 0.3s ease; box-sizing: border-box; width: 100%; }
    .detail-panel.open { max-height: 8000px; opacity: 1; margin-bottom: 30px; text-align: left; overflow: visible; }
    
    .detail-header { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; padding-top: 10px;}
    .detail-race-name { font-size: 24px; font-weight: 800; color: var(--text-main); }
    
    .link-btn { font-size: 13px; padding: 6px 14px; background: var(--action-button-bg); color: var(--action-button-color); border-radius: 20px; text-decoration: none; font-weight: bold; display: inline-block; transition: 0.2s; }
    .link-btn:hover { background: #b2dfdb; }

    .info-section { margin-bottom: 25px; }
    .info-title { font-weight: bold; font-size: 15px; color: var(--text-sub); margin-bottom: 12px; display: flex; align-items: center; letter-spacing: 0.5px;}
    .info-title::before { content: ''; display: inline-block; width: 6px; height: 16px; margin-right: 10px; border-radius: 3px; background: #ddd;}
    
    .title-race::before { background: var(--brand-blue); }
    .title-stay::before { background: var(--brand-yellow); }
    .title-trans::before { background: var(--brand-green); }
    .title-bill::before { background: var(--brand-pink); }
    
    .info-card { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 10px; font-size: 15px; line-height: 1.6; color: #333; border-left: 5px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
    .card-race { border-left-color: var(--brand-blue); }
    .card-stay { border-left-color: var(--brand-yellow); }
    .card-trans { border-left-color: var(--brand-green); }
    .card-bill { border-left-color: var(--brand-pink); }

    .info-row { display: flex; gap: 12px; margin-bottom: 10px; align-items: baseline; }
    .info-row > span:first-child { color: #7f8c8d; min-width: 70px; text-align: left; font-weight: 500;}
    .info-row > span:last-child { color: #2c3e50; flex: 1; font-weight: 500;}
    
    .price-row { display: flex; justify-content: space-between; align-items: center; border-top: 1px dashed rgba(0,0,0,0.1); padding-top: 12px; margin-top: 12px; }
    .price-tag { color: var(--brand-pink); font-weight: 800; font-size: 16px; }
    .status-tag { font-size: 11px; padding: 3px 8px; border-radius: 6px; background: rgba(0,0,0,0.05); color: #666; font-weight: bold; }
    .status-tag.paid { background: #e8f5e9; color: #2e7d32; }
    
    .event-settle-card { background: #fff4f7; border: 1.5px solid var(--brand-pink); padding: 10px 16px; border-radius: 12px; display: inline-flex; align-items: baseline; gap: 12px; box-shadow: 0 4px 10px rgba(240, 98, 146, 0.1);}

    .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; justify-content: center; align-items: center; z-index: 9999; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div id="loading" class="loading-overlay">正在讀取光聿行程資料...</div>

  <div class="container">
    <div class="header-title">行程小助理 <span class="refresh-btn" onclick="location.reload()">[ 重整 ]</span></div>

    <div class="action-bar">
      <div class="top-btns">
          <button class="acc-toggle-btn" onclick="toggleAccPanel()">帳務總覽</button>
          <div class="view-switcher">
              <button id="btn-cal" class="view-btn active" onclick="switchView('cal')">日曆</button>
              <button id="btn-list" class="view-btn" onclick="switchView('list')">清單</button>
          </div>
      </div>
      <div id="filter-bar" class="filter-bar"></div>
    </div>

    <div id="acc-panel">
      <div class="acc-grand-banner">
        <div class="acc-grand-label">篩選範圍總支出</div>
        <div id="acc-grand-total" class="acc-grand-val">$0</div>
      </div>

      <div class="acc-title">支出佔比</div>
      <div id="acc-progress-grid" class="acc-grid"></div>

      <div class="acc-title" style="margin-top:10px;">分類明細清單</div>
      <div class="acc-tabs" id="acc-tabs">
         <button class="acc-tab-btn active" onclick="switchAccTab('報名費')">報名費</button>
         <button class="acc-tab-btn" onclick="switchAccTab('住宿')">住宿</button>
         <button class="acc-tab-btn" onclick="switchAccTab('交通')">交通</button>
         <button class="acc-tab-btn" onclick="switchAccTab('其他')">其他</button>
      </div>
      <div id="acc-detail-list" class="acc-detail-container"></div>
      
      <div style="display: flex; justify-content: flex-end; margin-top:20px;">
          <div class="event-settle-card" style="background: #ebf0f1; border-color: var(--brand-main); box-shadow: none;">
            <div style="font-weight:bold; color:var(--brand-main); font-size:13px;">年度範圍總支出</div>
            <div id="acc-grand-total-static" style="font-size:18px; font-weight:900; color:var(--brand-main);">$0</div>
          </div>
      </div>
    </div>

    <div id="cal-view" class="view-container active">
        <div id="month-nav" class="month-nav-container"></div>
        <div id="calendar-container"></div>
    </div>
    
    <div id="list-view" class="view-container"><div id="list-container"></div></div>
  </div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbxUGVmAqfEmepMoAAlY0KkEiGOis9aSR-DpCqA9Nea6ZJZg4YUCg9uBvnJs6HuR0DAjQg/exec";
  let dbData = {};
  let currentFilter = '全部';
  let currentView = 'cal';
  let showPastList = false;
  
  // 新增：紀錄目前選中的月份 (用於日曆過濾)
  let selectedMonthFilter = null;

  let accDetailsData = { '報名費': [], '住宿': [], '交通': [], '其他': [] };
  let currentAccTab = '報名費';

  window.onload = initSystem;

  async function initSystem() {
    try {
      const res = await fetch(API_URL + "?t=" + new Date().getTime());
      dbData = await res.json();
      renderFilters();
      renderMain();
      document.getElementById('loading').style.display = 'none';
    } catch (e) {
      document.getElementById('loading').innerHTML = "資料連線失敗";
    }
  }

  function switchView(view) {
      currentView = view;
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-' + view).classList.add('active');
      document.querySelectorAll('.view-container').forEach(c => c.classList.remove('active'));
      document.getElementById(view + '-view').classList.add('active');
      closeCurrentPanel();
      renderMain();
  }

  function renderMain() { if (currentView === 'cal') renderCalendar(); else renderList(); }

  function toggleAccPanel() {
    const panel = document.getElementById('acc-panel');
    const isVisible = panel.style.display === 'block';
    panel.style.display = isVisible ? 'none' : 'block';
    if (!isVisible) calculateAccounting();
  }

  function calculateAccounting() {
    let races = currentFilter === '全部' ? dbData['行程'] : dbData['行程'].filter(r => getVal(r, '行程類別') === currentFilter);
    let itemTotals = { '報名費': 0, '住宿': 0, '交通': 0, '其他': 0 };
    let grandTotal = 0;
    
    accDetailsData = { '報名費': [], '住宿': [], '交通': [], '其他': [] };

    races.forEach(r => {
      const code = getVal(r, '行程代碼');
      const raceName = getVal(r, '行程名稱');

      const regFee = parseFloat(getVal(r, '報名費總額')) || 0;
      if (regFee > 0) {
        itemTotals['報名費'] += regFee;
        accDetailsData['報名費'].push({ name: raceName, amount: regFee });
      }

      (dbData['住宿']||[]).filter(s => getVal(s,'行程代碼')===code).forEach(s => {
        const fee = parseFloat(getVal(s,'費用')) || 0;
        if (fee > 0) {
          itemTotals['住宿'] += fee;
          accDetailsData['住宿'].push({ name: getVal(s,'飯店名稱') || raceName, amount: fee });
        }
      });

      (dbData['交通']||[]).filter(t => getVal(t,'行程代碼')===code).forEach(t => {
        const fee = parseFloat(getVal(t,'票價或油資')) || 0;
        if (fee > 0) {
          itemTotals['交通'] += fee;
          accDetailsData['交通'].push({ name: getVal(t,'類型') || raceName, amount: fee });
        }
      });

      (dbData['帳務明細']||[]).filter(b => getVal(b,'行程代碼')===code).forEach(b => {
        const fee = parseFloat(getVal(b,'金額')) || 0;
        if (fee > 0) {
          itemTotals['其他'] += fee;
          accDetailsData['其他'].push({ name: getVal(b,'項目名稱') || raceName, amount: fee });
        }
      });
    });

    grandTotal = itemTotals['報名費'] + itemTotals['住宿'] + itemTotals['交通'] + itemTotals['其他'];
    const formattedTotal = '$' + grandTotal.toLocaleString();
    document.getElementById('acc-grand-total').textContent = formattedTotal;
    document.getElementById('acc-grand-total-static').textContent = formattedTotal;

    const pGrid = document.getElementById('acc-progress-grid');
    pGrid.innerHTML = '';
    const colors = { '報名費': 'var(--brand-blue)', '住宿': 'var(--brand-yellow)', '交通': 'var(--brand-green)', '其他': 'var(--brand-pink)' };

    Object.keys(itemTotals).forEach(k => {
      const val = itemTotals[k];
      const pct = grandTotal === 0 ? 0 : (val / grandTotal) * 100;
      pGrid.innerHTML += `
        <div class="acc-card">
          <div style="display:flex; justify-content:space-between; margin-bottom:8px; align-items:baseline;">
            <span class="acc-label">${k}</span>
            <span class="acc-val">$${val.toLocaleString()}</span>
          </div>
          <div style="width:100%; background:#f0f0f0; height:6px; border-radius:3px; overflow:hidden;">
            <div style="width:${pct}%; background:${colors[k]}; height:100%; border-radius:3px;"></div>
          </div>
        </div>
      `;
    });

    renderAccDetailsList();
  }

  function switchAccTab(tabName) {
      currentAccTab = tabName;
      document.querySelectorAll('.acc-tab-btn').forEach(b => {
          if(b.textContent === tabName) b.classList.add('active');
          else b.classList.remove('active');
      });
      renderAccDetailsList();
  }

  function renderAccDetailsList() {
      const listContainer = document.getElementById('acc-detail-list');
      listContainer.innerHTML = '';
      const items = accDetailsData[currentAccTab] || [];

      if (items.length === 0) {
          listContainer.innerHTML = '<div style="padding:20px; text-align:center; color:#95a5a6; font-size:13px; font-weight:bold;">此分類目前無支出紀錄</div>';
          return;
      }

      items.forEach(item => {
          listContainer.innerHTML += `
              <div class="acc-detail-item">
                  <div class="acc-detail-name">${item.name}</div>
                  <div class="acc-detail-amount">$${item.amount.toLocaleString()}</div>
              </div>
          `;
      });
  }

  function calculateEventTotal(code) {
    let sum = 0; const race = dbData['行程'].find(r => getVal(r, '行程代碼') === code);
    if (race) sum += parseFloat(getVal(race, '報名費總額')) || 0;
    (dbData['住宿']||[]).filter(s => getVal(s, '行程代碼') === code).forEach(s => sum += parseFloat(getVal(s, '費用')) || 0);
    (dbData['交通']||[]).filter(t => getVal(t, '行程代碼') === code).forEach(t => sum += parseFloat(getVal(t, '票價或油資')) || 0);
    (dbData['帳務明細']||[]).filter(b => getVal(b, '行程代碼') === code).forEach(b => sum += parseFloat(getVal(b, '金額')) || 0);
    return sum;
  }

  function renderFilters() {
    const bar = document.getElementById('filter-bar');
    const cats = ['全部', ...new Set(dbData['行程'].map(r => getVal(r, '行程類別')).filter(c => c))];
    bar.innerHTML = '';
    cats.forEach(c => {
      const btn = document.createElement('button');
      btn.className = `filter-btn ${c === currentFilter ? 'active' : ''}`;
      btn.textContent = c;
      btn.onclick = () => { currentFilter = c; renderFilters(); renderMain(); if(document.getElementById('acc-panel').style.display === 'block') calculateAccounting(); };
      bar.appendChild(btn);
    });
  }

  function getVal(obj, key) { 
    if(!obj) return ""; 
    const exactKey = Object.keys(obj).find(k => k.trim() === key);
    if(exactKey) return obj[exactKey];
    const cleanKeyToFind = key.replace(/\s+/g, '').replace('／', '/');
    const fuzzyKey = Object.keys(obj).find(k => k.replace(/\s+/g, '').replace('／', '/') === cleanKeyToFind);
    return fuzzyKey ? obj[fuzzyKey] : "";
  }

  function hasVal(v) { return v !== "" && v !== null && v !== undefined && v !== 0 && v !== "0"; }
  function formatDate(d) { const date = new Date(d); return isNaN(date.getTime()) ? "" : `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`; }

  function renderPriceRow(label, val, payer, method, status) {
    if(!hasVal(val) && !hasVal(payer)) return '';
    let p = payer || '-', m = method || '-', s = status || '-';
    let pm = (m === undefined || !hasVal(m)) ? p : (p==='-' && m==='-' ? '-' : `${p} / ${m}`);
    return `<div class="price-row"><div><span style="color:#7f8c8d;">${label}</span> <span class="price-tag">$${val || 0}</span></div><div style="font-size:12px;color:#888;">${pm} <span class="status-tag ${s==='已付'?'paid':''}">${s}</span></div></div>`;
  }

  function renderCalendar() {
    const container = document.getElementById('calendar-container'); container.innerHTML = '';
    const navContainer = document.getElementById('month-nav'); navContainer.innerHTML = '';
    
    const now = new Date();
    const currentMonthKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
    
    let races = currentFilter === '全部' ? dbData['行程'] : dbData['行程'].filter(r => getVal(r, '行程類別') === currentFilter);
    const monthKeys = [...new Set(races.map(r => formatDate(getVal(r, '日期')).substring(0, 7)))].sort();
    
    // 生成 1 到 12 月份導覽按鈕
    for (let i = 1; i <= 12; i++) {
        const mStr = String(i).padStart(2, '0');
        const targetKey = monthKeys.find(key => key.endsWith('-' + mStr));
        const btn = document.createElement('div');
        
        btn.className = 'month-nav-btn ' + (targetKey ? 'has-data' : 'no-data');
        
        // 若該月已被選中，加上 active 樣式
        if (selectedMonthFilter === targetKey && targetKey) {
            btn.classList.add('active');
        }
        
        btn.textContent = i;
        
        if (targetKey) {
            // 過去的月份且未被選中時，呈現半透明
            if (targetKey < currentMonthKey && selectedMonthFilter !== targetKey) {
                btn.style.opacity = '0.4';
                btn.title = "點擊顯示過去行程";
            }
            
            btn.onclick = () => {
                if (selectedMonthFilter === targetKey) {
                    selectedMonthFilter = null; // 再次點擊，取消選取恢復預設
                } else {
                    selectedMonthFilter = targetKey; // 點擊選取該月
                }
                renderCalendar();
            };
        }
        navContainer.appendChild(btn);
    }

    monthKeys.forEach(mKey => {
      // 判斷是否應該渲染這個月份
      let shouldShow = false;
      if (selectedMonthFilter) {
          shouldShow = (mKey === selectedMonthFilter); // 若有篩選，只顯示選中的月份
      } else {
          shouldShow = (mKey >= currentMonthKey); // 沒篩選時，預設顯示未來與當下月份
      }
      
      if (!shouldShow) return; // 不符合條件的月份直接不渲染

      const [y, m] = mKey.split('-');
      const section = document.createElement('div'); section.className = 'month-section';
      section.id = 'month-section-' + mKey;
      
      section.innerHTML = `<div class="month-title">${y}年${m}月</div><div class="calendar-header">${['日','一','二','三','四','五','六'].map(d => `<div class="weekday-header">${d}</div>`).join('')}</div>`;
      const grid = document.createElement('div'); grid.className = 'calendar-grid';
      const firstDay = new Date(y, m-1, 1).getDay(), lastDate = new Date(y, m, 0).getDate();
      for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
      for (let d = 1; d <= lastDate; d++) {
        const dStr = `${y}-${m}-${String(d).padStart(2,'0')}`, cell = document.createElement('div'); cell.className = 'day'; cell.innerHTML = `<span class="day-number">${d}</span>`;
        const event = races.find(r => formatDate(getVal(r, '日期')) === dStr);
        if (event) {
          const cat = getVal(event, '行程類別');
          cell.classList.add('has-event'); 
          cell.style.borderColor = `var(--cat-${cat})`;
          cell.onclick = () => handleDayClick(event, cell, grid);
        }
        grid.appendChild(cell);
      }
      section.appendChild(grid); container.appendChild(section);
    });
  }

  function renderList() {
      const container = document.getElementById('list-container'); container.innerHTML = '';
      let races = currentFilter === '全部' ? dbData['行程'] : dbData['行程'].filter(r => getVal(r, '行程類別') === currentFilter);
      races.sort((a, b) => new Date(getVal(a, '日期')) - new Date(getVal(b, '日期')));
      
      const today = new Date(); today.setHours(0, 0, 0, 0);
      
      const pastRaces = races.filter(r => new Date(getVal(r, '日期')) < today);
      const futureRaces = races.filter(r => new Date(getVal(r, '日期')) >= today);
      
      if (pastRaces.length > 0) {
          const toggleBtn = document.createElement('div');
          toggleBtn.className = 'past-toggle-btn';
          // 使用純文字箭頭取代 Emoji
          toggleBtn.textContent = showPastList ? '^ 收起歷史行程 ^' : `v 顯示歷史行程 (${pastRaces.length}筆) v`;
          toggleBtn.onclick = () => {
              showPastList = !showPastList;
              renderList();
          };
          container.appendChild(toggleBtn);
      }

      const racesToRender = showPastList ? races : futureRaces;
      
      if (racesToRender.length === 0) {
          const emptyMsg = document.createElement('div');
          emptyMsg.style.cssText = "padding:40px; text-align:center; color:#95a5a6; font-size:15px; font-weight:bold;";
          emptyMsg.textContent = "目前沒有行程資料";
          container.appendChild(emptyMsg);
          return;
      }

      racesToRender.forEach(event => {
          const eDate = new Date(getVal(event, '日期')); const cat = getVal(event, '行程類別');
          const daysDiff = Math.ceil((eDate - today) / (1000 * 60 * 60 * 24));
          
          let countdownHtml = "";
          if (daysDiff > 0) {
              countdownHtml = `<span style="font-weight:bold; font-size:13px; color:var(--text-main);">還有<span class="list-countdown-days">${daysDiff}</span>天</span>`;
          } else if (daysDiff === 0) {
              countdownHtml = `<span style="font-weight:bold; font-size:14px; color:var(--text-main);">今天</span>`;
          } else {
              countdownHtml = `<span style="font-weight:bold; font-size:13px; color:#bbb;">已結束</span>`;
          }

          const item = document.createElement('div'); item.className = 'list-item'; 
          item.style.borderLeftColor = `var(--cat-${cat})`;
          item.innerHTML = `<div class="list-date"><span class="m">${eDate.getMonth()+1}月</span><span class="d">${eDate.getDate()}</span></div><div class="list-name">${getVal(event, '行程名稱')}</div><div class="list-countdown">${countdownHtml}</div>`;
          item.onclick = () => handleListClick(event, item);
          container.appendChild(item);
      });
  }

  let currentOpenPanel = null, currentSelectedEl = null;

  function handleDayClick(event, cell, grid) {
    if (currentSelectedEl === cell && currentOpenPanel) { closeCurrentPanel(); return; }
    if (currentSelectedEl) { currentSelectedEl.classList.remove('selected'); currentSelectedEl.style.backgroundColor = ''; }
    currentSelectedEl = cell; cell.classList.add('selected');
    
    const category = getVal(event, '行程類別');
    cell.style.backgroundColor = `var(--cat-${category})`;
    
    if (currentOpenPanel) currentOpenPanel.remove();
    const panel = document.createElement('div'); panel.className = 'detail-panel'; panel.innerHTML = generateDetailHTML(event);
    const cells = Array.from(grid.children), idx = cells.indexOf(cell), rowEnd = Math.min(cells.length - 1, idx + (6 - (idx % 7)));
    grid.insertBefore(panel, cells[rowEnd].nextSibling); setTimeout(() => panel.classList.add('open'), 10); currentOpenPanel = panel;
  }

  function handleListClick(event, item) {
      if (currentSelectedEl === item && currentOpenPanel) { closeCurrentPanel(); return; }
      if (currentOpenPanel) currentOpenPanel.remove();
      currentSelectedEl = item;
      const panel = document.createElement('div'); panel.className = 'detail-panel'; panel.innerHTML = generateDetailHTML(event);
      item.parentNode.insertBefore(panel, item.nextSibling); setTimeout(() => panel.classList.add('open'), 10); currentOpenPanel = panel;
  }

  function closeCurrentPanel() {
      if (currentOpenPanel) { currentOpenPanel.remove(); currentOpenPanel = null;
          if (currentSelectedEl) { currentSelectedEl.classList.remove('selected'); currentSelectedEl.style.backgroundColor = ''; currentSelectedEl = null; }
      }
  }

  function generateDetailHTML(event) {
    const code = getVal(event, '行程代碼'), cat = getVal(event, '行程類別');
    let html = `<div class="detail-header"><div><div class="detail-race-name">${getVal(event, '行程名稱')}</div><div style="font-size:14px;color:#7f8c8d;margin-top:4px;">日期：${formatDate(getVal(event, '日期'))}</div></div>${getVal(event,'行程連結')?`<a href="${getVal(event,'行程連結')}" target="_blank" class="link-btn">前往簡章 >></a>`:''}</div>`;
    
    html += `<div class="info-section"><div class="info-title title-race">報名資訊</div><div class="info-card card-race">`;
    if(getVal(event,'聿凡項目')) html += `<div class="info-row"><span>聿凡</span><span>${getVal(event,'聿凡項目')}</span></div>`;
    if(getVal(event,'光武項目')) html += `<div class="info-row"><span>光武</span><span>${getVal(event,'光武項目')}</span></div>`;
    html += renderPriceRow('費用', getVal(event,'報名費總額'), getVal(event,'付款人'), getVal(event,'付款方式'), getVal(event,'狀態'));
    
    if(getVal(event,'備註')) {
        html += `<div style="margin-top:12px; font-size:13px; color:#666; border-top: 1px dashed #ddd; padding-top: 10px;">備註：${getVal(event,'備註')}</div>`;
    }
    html += `</div></div>`;

    const stays = (dbData['住宿']||[]).filter(s => getVal(s, '行程代碼') === code);
    if(stays.length > 0) {
      html += `<div class="info-section"><div class="info-title title-stay">住宿資訊</div>`;
      stays.forEach(s => {
        html += `<div class="info-card card-stay"><div style="display:flex;justify-content:space-between;margin-bottom:10px;"><span style="font-weight:bold;font-size:16px;">${getVal(s,'飯店名稱')}</span>${getVal(s,'連結')?`<a href="${getVal(s,'連結')}" target="_blank" style="font-size:12px;background:#e1f5fe;color:#01579b;padding:3px 10px;border-radius:15px;text-decoration:none;font-weight:bold;">地圖 >></a>`:''}</div>`;
        if(getVal(s,'入住日期')) html += `<div class="info-row"><span>入住時間</span><span>${formatDate(getVal(s,'入住日期')).substring(5)} ｜ ${getVal(s,'入住時間')||''}</span></div>`;
        if(getVal(s,'退房日期')) html += `<div class="info-row"><span>退房時間</span><span>${formatDate(getVal(s,'退房日期')).substring(5)} ｜ ${getVal(s,'退房時間')||''}</span></div>`;
        if(getVal(s,'訂房平台')) html += `<div class="info-row"><span>平台</span><span>${getVal(s,'訂房平台')}</span></div>`;
        html += renderPriceRow('費用', getVal(s,'費用'), getVal(s,'付款人'), getVal(s,'付款方式'), getVal(s,'狀態'));
        if(getVal(s,'備註')) html += `<div style="margin-top:8px; font-size:12px; color:#666;">備註：${getVal(s,'備註')}</div>`;
        html += `</div>`;
      });
      html += `</div>`;
    }

    const trans = (dbData['交通']||[]).filter(t => getVal(t, '行程代碼') === code);
    if(trans.length > 0) {
      html += `<div class="info-section"><div class="info-title title-trans">交通安排</div>`;
      trans.forEach(t => {
        html += `<div class="info-card card-trans"><div style="font-weight:bold;margin-bottom:10px;font-size:16px;">${getVal(t,'類型')}</div>`;
        
        const goB = getVal(t,'去程班次 / 飛機') || getVal(t,'去程班次/飛機') || getVal(t,'去程班次 / 航班') || getVal(t,'去程班次/航班');
        const goD = getVal(t,'出發日期');
        const goS = getVal(t,'去程出發時間');
        const goA = getVal(t,'去程抵達時間');
        if(hasVal(goB)) html += `<div class="info-row"><span>航班號碼</span><span>${goB}</span></div>`;
        if(hasVal(goD)) html += `<div class="info-row"><span>日期時間</span><span>${formatDate(goD).substring(5)}</span></div>`;
        if(hasVal(goS) || hasVal(goA)) html += `<div class="info-row"><span></span><span>${goS||'--:--'}出發－${goA||'--:--'}抵達</span></div>`;
        
        const bkB = getVal(t,'回程班次 / 飛機') || getVal(t,'回程班次/飛機') || getVal(t,'回程班次 / 航班') || getVal(t,'回程班次/航班');
        const bkD = getVal(t,'回程日期');
        const bkS = getVal(t,'回程出發時間');
        const bkA = getVal(t,'回程抵達時間');
        if(hasVal(bkB)) html += `<div class="info-row" style="margin-top:10px;"><span>航班號碼</span><span>${bkB}</span></div>`;
        if(hasVal(bkD)) html += `<div class="info-row"><span>日期時間</span><span>${formatDate(bkD).substring(5)}</span></div>`;
        if(hasVal(bkS) || hasVal(bkA)) html += `<div class="info-row"><span></span><span>${bkS||'--:--'}出發－${bkA||'--:--'}抵達</span></div>`;
        
        html += renderPriceRow('費用', getVal(t,'票價或油資'), getVal(t,'付款人'), getVal(t,'付款方式'), getVal(t,'狀態')) + `</div>`;
      });
      html += `</div>`;
    }

    const bills = (dbData['帳務明細']||[]).filter(b => getVal(b, '行程代碼') === code);
    if(bills.length > 0) {
      html += `<div class="info-section"><div class="info-title title-bill">其他帳務</div>`;
      bills.forEach(b => {
        html += `<div class="info-card card-bill"><div style="font-weight:bold;margin-bottom:8px;">${getVal(b,'項目名稱')}</div>${renderPriceRow('金額', getVal(b,'金額'), getVal(b,'付款人'), undefined, getVal(b,'付款狀態'))}`;
        if(getVal(b,'備註')) html += `<div style="font-size:12px;color:#666;margin-top:5px;">備註：${getVal(b,'備註')}</div>`;
        html += `</div>`;
      });
      html += `</div>`;
    }

    html += `<div style="display: flex; justify-content: flex-end; margin-top: 5px;">
                <div class="event-settle-card">
                    <div style="font-weight:bold; color:var(--brand-pink); font-size:13px;">本場行程結算</div>
                    <div style="font-size:18px; font-weight:900; color:var(--brand-pink);">$${calculateEventTotal(code).toLocaleString()}</div>
                </div>
             </div>`;
    return html;
  }
</script>
</body>
</html>
