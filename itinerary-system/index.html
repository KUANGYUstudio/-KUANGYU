<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>光聿 KUANGYU - 行程總覽</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* =========================================
       🎨 光聿行程美學定義 (22px 鎖死版)
       ========================================= */
    :root {
      --cat-鐵人: #4169E1; --cat-自行車: #228B22; --cat-路跑: #D2691E;
      --cat-游泳: #008080; --cat-活動: #9932CC; --cat-旅遊: #DB7093;
      --text-main: #2c3e50; --text-sub: #546e7a; --bg-color: #ffffff;
      --card-bg: #f7f9fa; --brand-main: #2c3e50;
    }

    body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; background: var(--bg-color); margin: 0; padding: 0; color: var(--text-main); min-height: 100vh; }
    .container { max-width: 800px; width: 100%; margin: 0 auto; padding: 40px 20px; box-sizing: border-box; text-align: center; }
    .header-title { font-size: 28px; font-weight: 800; color: var(--text-main); letter-spacing: 2px; margin-bottom: 5px; }
    .header-subtitle { font-size: 16px; margin-bottom: 40px; color: var(--text-sub); font-weight: 400; letter-spacing: 1px; }

    .month-section { margin-bottom: 40px; text-align: left; }
    .month-title { font-weight: 800; font-size: 24px; margin: 0 0 20px; color: var(--text-main); padding-left: 5px; }
    
    .calendar-header, .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; padding: 0; box-sizing: border-box; max-width: 100%; }
    @media (max-width: 750px) { .calendar-header, .calendar-grid { gap: 4px; } }

    .weekday-header { font-weight: bold; font-size: 16px; text-align: center; color: #b0bec5; padding-bottom: 10px; }
    
    .day { 
      aspect-ratio: 1; width: 100%; 
      display: flex; flex-direction: column; align-items: center; justify-content: center; 
      border-radius: 12px; background-color: var(--card-bg); color: #cfd8dc; 
      cursor: default; box-sizing: border-box; transition: all 0.2s; position: relative; 
      border: 2px solid transparent;
    }
    
    .day-number { font-size: 22px !important; font-weight: bold !important; margin-bottom: 2px; line-height: 1; }
    @media (max-width: 750px) { .day-number { font-size: 18px !important; } }

    .day.has-event { background-color: #fff; color: #333; cursor: pointer; border-width: 2px; }
    .day.has-event:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    .day.selected { color: #fff !important; transform: scale(1.05); box-shadow: 0 5px 15px rgba(0,0,0,0.1) !important; z-index: 10; }

    /* 👇 行內展開資訊框 (與日曆同排) */
    .detail-panel { 
      grid-column: 1 / -1; background: #fff; border-radius: 16px; 
      margin-top: 8px; margin-bottom: 8px; overflow: hidden; 
      max-height: 0; opacity: 0; transition: all 0.4s ease; box-sizing: border-box;
    }
    .detail-panel.open { max-height: 1200px; opacity: 1; padding: 25px; border: 1px solid #eee; }

    .detail-race-name { font-size: 20px; font-weight: bold; color: var(--text-main); margin-bottom: 5px; }
    .detail-race-date { font-size: 14px; color: var(--text-sub); margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }

    .info-section { margin-bottom: 20px; text-align: left; }
    .info-title { font-weight: bold; font-size: 15px; color: #7f8c8d; margin-bottom: 8px; display: flex; align-items: center; }
    .info-title::before { content: ''; display: inline-block; width: 6px; height: 16px; background: #ddd; margin-right: 10px; border-radius: 3px; }
    .info-content { background: var(--card-bg); padding: 15px; border-radius: 10px; font-size: 15px; line-height: 1.8; color: #666; }
    .price-tag { color: #e67e22; font-weight: bold; }

    .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; justify-content: center; align-items: center; z-index: 9999; }
  </style>
</head>
<body>

  <div id="loading" class="loading-overlay">正在讀取光聿行程資料...</div>

  <div class="container">
    <div class="header-title">光聿 KUANGYU</div>
    <div class="header-subtitle">行程總覽系統</div>
    <div id="calendar-container"></div>
  </div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbxUGVmAqfEmepMoAAlY0KkEiGOis9aSR-DpCqA9Nea6ZJZg4YUCg9uBvnJs6HuR0DAjQg/exec";
  let dbData = {};

  window.onload = initSystem;

  async function initSystem() {
    try {
      const res = await fetch(API_URL);
      dbData = await res.json();
      renderCalendar();
      document.getElementById('loading').style.display = 'none';
    } catch (e) {
      console.error(e);
      document.getElementById('loading').innerHTML = "資料讀取失敗，請確認 API 設定。";
    }
  }

  // 核心功能：強制統一日期格式為 YYYY-MM-DD，解決抓不到行程的問題
  function formatDate(d) {
    if (!d) return "";
    const date = new Date(d);
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function renderCalendar() {
    const container = document.getElementById('calendar-container');
    const races = dbData['賽事'];
    if (!races || races.length === 0) {
      container.innerHTML = '<div style="color:#999; margin-top:50px;">目前尚無行程紀錄</div>';
      return;
    }

    // 取得所有有行程的月份
    const monthSet = new Set();
    races.forEach(r => {
      const d = new Date(r['出發日期']);
      monthSet.add(`${d.getFullYear()}-${d.getMonth() + 1}`);
    });

    const sortedMonths = Array.from(monthSet).sort((a, b) => {
      const [y1, m1] = a.split('-'), [y2, m2] = b.split('-');
      return y1 !== y2 ? y1 - y2 : m1 - m2;
    });

    sortedMonths.forEach(mKey => {
      const [y, m] = mKey.split('-');
      renderMonth(parseInt(y), parseInt(m), container, races);
    });
  }

  function renderMonth(year, month, container, races) {
    const section = document.createElement('div');
    section.className = 'month-section';
    section.innerHTML = `<div class="month-title">${year}年${month}月</div>`;
    
    const header = document.createElement('div');
    header.className = 'calendar-header';
    ['日','一','二','三','四','五','六'].forEach(d => header.innerHTML += `<div class="weekday-header">${d}</div>`);
    section.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'calendar-grid';
    const firstDay = new Date(year, month - 1, 1).getDay();
    const lastDate = new Date(year, month, 0).getDate();

    for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));

    for (let d = 1; d <= lastDate; d++) {
      const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
      const cell = document.createElement('div');
      cell.className = 'day';
      cell.innerHTML = `<span class="day-number">${d}</span>`;

      // 使用統一格式進行比對
      const event = races.find(r => formatDate(r['出發日期']) === dateStr);
      if (event) {
        const cat = event['行程類別'];
        cell.classList.add('has-event');
        cell.style.borderColor = `var(--cat-${cat})`;
        cell.onclick = () => handleDayClick(dateStr, event, cell, grid);
      }
      grid.appendChild(cell);
    }
    section.appendChild(grid);
    container.appendChild(section);
  }

  let currentOpenPanel = null;
  let currentSelectedCell = null;

  function handleDayClick(dateStr, event, cell, grid) {
    if (currentSelectedCell) {
      currentSelectedCell.classList.remove('selected');
      currentSelectedCell.style.backgroundColor = '';
    }

    if (currentSelectedCell === cell && currentOpenPanel) {
      closeCurrentPanel();
      currentSelectedCell = null;
      return;
    }

    currentSelectedCell = cell;
    cell.classList.add('selected');
    const color = getComputedStyle(document.documentElement).getPropertyValue(`--cat-${event['行程類別']}`);
    cell.style.backgroundColor = color;
    cell.style.borderColor = color;

    if (currentOpenPanel) closeCurrentPanel();

    const panel = document.createElement('div');
    panel.className = 'detail-panel';
    panel.innerHTML = generateDetailHTML(event);

    const cells = Array.from(grid.children);
    const index = cells.indexOf(cell);
    const rowEnd = Math.min(cells.length - 1, index + (6 - (index % 7)));
    
    grid.insertBefore(panel, cells[rowEnd].nextSibling);
    setTimeout(() => panel.classList.add('open'), 10);
    currentOpenPanel = panel;
  }

  function closeCurrentPanel() {
    if (currentOpenPanel) {
      const p = currentOpenPanel;
      p.classList.remove('open');
      setTimeout(() => p.remove(), 400);
      currentOpenPanel = null;
    }
  }

  function generateDetailHTML(event) {
    const code = event['行程代碼'];
    let html = `
      <div class="detail-race-name">${event['行程名稱']}</div>
      <div class="detail-race-date">日期：${formatDate(event['出發日期'])}</div>
    `;

    if (event['聿凡項目'] || event['光武項目']) {
      html += `
        <div class="info-section">
          <div class="info-title">參與項目</div>
          <div class="info-content">
            <div>聿凡：${event['聿凡項目'] || '-'}</div>
            <div>光武：${event['光武項目'] || '-'}</div>
          </div>
        </div>
      `;
    }

    const stays = dbData['住宿'].filter(s => s['行程代碼'] === code);
    if (stays.length > 0) {
      html += `<div class="info-section"><div class="info-title">住宿資訊</div><div class="info-content">`;
      stays.forEach(s => {
        html += `<div>🏠 <strong>${s['飯店名稱']}</strong> (${s['訂房平台']})</div>`;
        html += `<div>費用：<span class="price-tag">${s['費用']}</span> (${s['付款人']}付 / ${s['狀態']})</div>`;
      });
      html += `</div></div>`;
    }

    const trans = dbData['交通'].filter(t => t['行程代碼'] === code);
    if (trans.length > 0) {
      html += `<div class="info-section"><div class="info-title">交通安排</div><div class="info-content">`;
      trans.forEach(t => {
        html += `<div>🚆 <strong>${t['類型']}</strong> - ${t['班次或班機號碼']}</div>`;
        html += `<div>時間：${t['出發時間']} / 費用：${t['票價或油資']} (${t['付款人']}付)</div>`;
      });
      html += `</div></div>`;
    }

    if (event['備註']) html += `<div class="info-section"><div class="info-title">備註</div><div class="info-content">${event['備註']}</div></div>`;
    
    return html;
  }
</script>
</body>
</html>
