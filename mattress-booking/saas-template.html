<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>預約系統 | 載入中...</title>
  <style>
    /* ... (樣式與原本相同，為了版面簡潔我省略 CSS，請直接用原本的即可) ... */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #f0f7f9 0%, #fdf9e8 100%); min-height: 100vh; padding: 20px; line-height: 1.6; color: #444; }
    .container { max-width: 600px; margin: 0 auto; background: #ffffff; border-radius: 30px; box-shadow: 0 10px 40px rgba(0, 188, 212, 0.1); overflow: hidden; padding-bottom: 30px; }
    .header { background: linear-gradient(135deg, #26c6da 0%, #00acc1 100%); color: white; padding: 30px 20px; text-align: center; }
    .notice-section { background: #f0fbfc; padding: 30px 25px; border-left: 5px solid #00bcd4; margin: 25px; border-radius: 0 20px 20px 0; }
    .notice-section li { list-style: none; padding: 8px 0; padding-left: 24px; position: relative; }
    .notice-section li:before { content: "✓"; position: absolute; left: 0; color: #f4a792; font-weight: bold; }
    .form-section { padding: 40px 30px; }
    .form-group { margin-bottom: 25px; } 
    label, .group-title { display: block; margin-bottom: 10px; font-weight: 700; }
    .required { color: #f4a792; }
    input[type="text"], input[type="email"], input[type="tel"], input[type="number"], textarea { width: 100%; padding: 12px; border: 2px solid #e0f2f1; border-radius: 15px; }
    .radio-option, .checkbox-option { display: flex; align-items: center; padding: 10px; background: #f9fdfd; border: 2px solid #e0f2f1; border-radius: 15px; margin-bottom: 5px; cursor: pointer; }
    .month-title { text-align: center; font-weight: bold; font-size: 1.4em; margin-top: 20px; color: #e98b7d; }
    .calendar-header, .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; max-width: 450px; margin: 0 auto; text-align: center; }
    .calendar-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 10px; background: #f5f5f5; color: #ccc; }
    .calendar-day.available { background: #fff; color: #444; border: 2px solid #fbd0c4; cursor: pointer; }
    .calendar-day.selected { background: #f4a792; color: white; border-color: #f4a792; }
    .time-slots { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 15px; }
    .time-slot { padding: 10px; text-align: center; border: 2px solid #fbd0c4; border-radius: 10px; cursor: pointer; }
    .time-slot.selected { background: #f4a792; color: white; }
    .submit-btn { width: 100%; padding: 16px; background: #00acc1; color: white; border: none; border-radius: 20px; font-size: 1.15em; cursor: pointer; margin-top: 20px; }
    .loading, .hidden { display: none; }
    .footer { text-align: center; padding: 20px; color: #ccc; font-size: 0.8em; }
    
    /* 彈窗樣式 */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
    .modal-box { background: #fff; width: 90%; max-width: 400px; padding: 30px; border-radius: 20px; text-align: center; }
    .modal-btn { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; margin: 5px; font-size: 1em; }
    .btn-confirm { background: #00acc1; color: white; }
    .btn-cancel { background: #f5f5f5; }
    
    @media (min-width: 768px) { body { padding: 40px; } }
  </style>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    
    <div style="max-width: 600px; margin: 20px auto 30px auto; background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden;">
      
      <div style="background: linear-gradient(135deg, #00acc1, #00838f); padding: 40px 20px; text-align: center; color: white;">
        <h1 style="margin: 0; font-size: 26px; font-weight: bold; letter-spacing: 1.5px;">線上預約</h1>
        <p style="margin: 10px 0 0 0; opacity: 0.9; font-size: 15px;">歡迎使用我們的預約服務</p>
      </div>

      <div style="padding: 25px 20px; text-align: center; background: #ffffff;">
        <div style="display: inline-block; background: #e0f7fa; color: #006064; padding: 6px 16px; border-radius: 50px; font-size: 13px; font-weight: bold; margin-bottom: 15px;">
          📍 地點資訊
        </div>
        
        <h3 id="ui-company-name" style="margin: 0 0 8px 0; font-size: 18px; color: #333;">載入中...</h3>
        
        <p id="ui-address" style="margin: 0 0 20px 0; font-size: 15px; color: #666;">載入中...</p>
        
        <a id="ui-map-link" href="#" target="_blank" 
           style="display: inline-block; text-decoration: none; color: #00acc1; border: 1px solid #00acc1; padding: 10px 24px; border-radius: 50px; font-size: 14px;">
          查看地圖 →
        </a>
      </div>
    </div>

    <div class="notice-section">
      <h3>預約注意事項</h3>
      <ul>
        <li>請確認網路穩定</li>
        <li>我們將於 1-2 個工作天與您聯繫</li>
      </ul>
    </div>

    <div class="form-section">
      <div id="message"></div>
      <form id="booking-form">
        <div class="form-group"><label>姓名 <span class="required">*</span></label><input type="text" id="name" name="name" required></div>
        <div class="form-group"><label>電話 <span class="required">*</span></label><input type="tel" id="phone" name="phone" required></div>
        <div class="form-group"><label>Email <span class="required">*</span></label><input type="email" id="email" name="email" required></div>
        
        <div class="form-group"><label>人數</label><input type="number" id="numberOfPeople" name="numberOfPeople" value="1" min="1"></div>

        <div class="form-group">
           <label>預約日期 <span class="required">*</span></label>
           <div id="calendar-container"></div>
           <input type="hidden" id="selected-date" name="date">
        </div>
        <div class="form-group" id="time-slot-section" style="display:none;">
           <label>預約時段 <span class="required">*</span></label>
           <div id="time-slots-container" class="time-slots"></div>
           <input type="hidden" id="selected-time-slot" name="timeSlot">
        </div>
        
        <div class="form-group"><label>備註</label><textarea id="specialRequests" name="specialRequests"></textarea></div>

        <button type="submit" class="submit-btn">確認預約</button>
      </form>
      
      <div class="loading" id="loading"><p>處理中...</p></div>
      <div id="success-message" class="hidden" style="text-align: center; padding: 40px;">
        <h2>預約成功！</h2>
        <p>確認信已寄出。</p>
      </div>
    </div>
    
    <div class="footer"><p>© <span id="current-year"></span> Powered by Kuangyu Studio</p></div>
  </div>

  <div class="modal-overlay" id="custom-modal">
    <div class="modal-box">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-text" id="modal-text"></div>
      <div id="modal-buttons"></div>
    </div>
  </div>

  <script>
    // 🟢 商用版核心邏輯：自動抓取設定
    // 這裡填入「實驗室專案」的網址，未來賣給誰就換成誰的網址
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxawPp4K6DkE_oWK6gizh68aR01KglzpFYpH7wqtOwlPCrO_GYJeyiS2Yq5V062tX3z/exec";
    
    // 自動載入公司資訊
    async function loadCompanyInfo() {
      try {
        const res = await fetch(`${SCRIPT_URL}?action=getCompanyInfo`);
        const info = await res.json();
        if(info.name) {
             document.title = `預約 | ${info.name}`;
             document.getElementById('ui-company-name').textContent = info.name;
        }
        if(info.address) document.getElementById('ui-address').textContent = info.address;
        if(info.mapUrl) document.getElementById('ui-map-link').href = info.mapUrl;
      } catch (e) {
        console.error("載入失敗", e);
        document.getElementById('ui-company-name').textContent = "系統資訊載入失敗";
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('current-year').textContent = new Date().getFullYear();
      loadCompanyInfo(); // 🟢 執行載入
      renderCalendar();
    });

    // ... (以下 renderCalendar, submit 等邏輯與原本相同，請直接複製過來) ...
    // 為節省篇幅，請使用您 test-booking.html 裡面的 renderCalendar 到最後的 script 內容
    
    // (但在這裡我還是給您完整的 script 結尾結構以防出錯)
    async function renderCalendar() { /* ...請複製原本的... */ }
    document.getElementById('booking-form').addEventListener('submit', async function(e) { /* ...請複製原本的... */ });
    // ...
  </script>
</body>
</html>
