<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>預約系統 | 載入中...</title>
  <style>
    /* ... (樣式與原本相同，為了版面簡潔我省略 CSS，請直接用原本的即可) ... */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #f0f7f9 0%, #fdf9e8 100%); min-height: 100vh; padding: 20px; line-height: 1.6; color: #444; }
    .container { max-width: 600px; margin: 0 auto; background: #ffffff; border-radius: 30px; box-shadow: 0 10px 40px rgba(0, 188, 212, 0.1); overflow: hidden; padding-bottom: 30px; }
    .header { background: linear-gradient(135deg, #26c6da 0%, #00acc1 100%); color: white; padding: 30px 20px; text-align: center; }
    .notice-section { background: #f0fbfc; padding: 30px 25px; border-left: 5px solid #00bcd4; margin: 25px; border-radius: 0 20px 20px 0; }
    .notice-section li { list-style: none; padding: 8px 0; padding-left: 24px; position: relative; }
    .notice-section li:before { content: "✓"; position: absolute; left: 0; color: #f4a792; font-weight: bold; }
    .form-section { padding: 40px 30px; }
    .form-group { margin-bottom: 25px; } 
    label, .group-title { display: block; margin-bottom: 10px; font-weight: 700; }
    .required { color: #f4a792; }
    input[type="text"], input[type="email"], input[type="tel"], input[type="number"], textarea { width: 100%; padding: 12px; border: 2px solid #e0f2f1; border-radius: 15px; }
    .radio-option, .checkbox-option { display: flex; align-items: center; padding: 10px; background: #f9fdfd; border: 2px solid #e0f2f1; border-radius: 15px; margin-bottom: 5px; cursor: pointer; }
    .month-title { text-align: center; font-weight: bold; font-size: 1.4em; margin-top: 20px; color: #e98b7d; }
    .calendar-header, .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; max-width: 450px; margin: 0 auto; text-align: center; }
    .calendar-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 10px; background: #f5f5f5; color: #ccc; }
    .calendar-day.available { background: #fff; color: #444; border: 2px solid #fbd0c4; cursor: pointer; }
    .calendar-day.selected { background: #f4a792; color: white; border-color: #f4a792; }
    .time-slots { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 15px; }
    .time-slot { padding: 10px; text-align: center; border: 2px solid #fbd0c4; border-radius: 10px; cursor: pointer; }
    .time-slot.selected { background: #f4a792; color: white; }
    .submit-btn { width: 100%; padding: 16px; background: #00acc1; color: white; border: none; border-radius: 20px; font-size: 1.15em; cursor: pointer; margin-top: 20px; }
    .loading, .hidden { display: none; }
    .footer { text-align: center; padding: 20px; color: #ccc; font-size: 0.8em; }
    
    /* 彈窗樣式 */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
    .modal-box { background: #fff; width: 90%; max-width: 400px; padding: 30px; border-radius: 20px; text-align: center; }
    .modal-btn { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; margin: 5px; font-size: 1em; }
    .btn-confirm { background: #00acc1; color: white; }
    .btn-cancel { background: #f5f5f5; }
    
    @media (min-width: 768px) { body { padding: 40px; } }
  </style>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    
    <div style="max-width: 600px; margin: 20px auto 30px auto; background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden;">
      
      <div style="background: linear-gradient(135deg, #00acc1, #00838f); padding: 40px 20px; text-align: center; color: white;">
        <h1 style="margin: 0; font-size: 26px; font-weight: bold; letter-spacing: 1.5px;">線上預約</h1>
        <p style="margin: 10px 0 0 0; opacity: 0.9; font-size: 15px;">歡迎使用我們的預約服務</p>
      </div>

      <div style="padding: 25px 20px; text-align: center; background: #ffffff;">
        <div style="display: inline-block; background: #e0f7fa; color: #006064; padding: 6px 16px; border-radius: 50px; font-size: 13px; font-weight: bold; margin-bottom: 15px;">
          📍 地點資訊
        </div>
        
        <h3 id="ui-company-name" style="margin: 0 0 8px 0; font-size: 18px; color: #333;">載入中...</h3>
        
        <p id="ui-address" style="margin: 0 0 20px 0; font-size: 15px; color: #666;">載入中...</p>
        
        <a id="ui-map-link" href="#" target="_blank" 
           style="display: inline-block; text-decoration: none; color: #00acc1; border: 1px solid #00acc1; padding: 10px 24px; border-radius: 50px; font-size: 14px;">
          查看地圖 →
        </a>
      </div>
    </div>

    <div class="notice-section">
      <h3>預約注意事項</h3>
      <ul>
        <li>請確認網路穩定</li>
        <li>我們將於 1-2 個工作天與您聯繫</li>
      </ul>
    </div>

    <div class="form-section">
      <div id="message"></div>
      <form id="booking-form">
        <div class="form-group"><label>姓名 <span class="required">*</span></label><input type="text" id="name" name="name" required></div>
        <div class="form-group"><label>電話 <span class="required">*</span></label><input type="tel" id="phone" name="phone" required></div>
        <div class="form-group"><label>Email <span class="required">*</span></label><input type="email" id="email" name="email" required></div>
        
        <div class="form-group"><label>人數</label><input type="number" id="numberOfPeople" name="numberOfPeople" value="1" min="1"></div>

        <div class="form-group">
           <label>預約日期 <span class="required">*</span></label>
           <div id="calendar-container"></div>
           <input type="hidden" id="selected-date" name="date">
        </div>
        <div class="form-group" id="time-slot-section" style="display:none;">
           <label>預約時段 <span class="required">*</span></label>
           <div id="time-slots-container" class="time-slots"></div>
           <input type="hidden" id="selected-time-slot" name="timeSlot">
        </div>
        
        <div class="form-group"><label>備註</label><textarea id="specialRequests" name="specialRequests"></textarea></div>

        <button type="submit" class="submit-btn">確認預約</button>
      </form>
      
      <div class="loading" id="loading"><p>處理中...</p></div>
      <div id="success-message" class="hidden" style="text-align: center; padding: 40px;">
        <h2>預約成功！</h2>
        <p>確認信已寄出。</p>
      </div>
    </div>
    
    <div class="footer"><p>© <span id="current-year"></span> Powered by Kuangyu Studio</p></div>
  </div>

  <div class="modal-overlay" id="custom-modal">
    <div class="modal-box">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-text" id="modal-text"></div>
      <div id="modal-buttons"></div>
    </div>
  </div>

  <script>
    // 🟢 商用版核心邏輯：自動抓取設定
    // 這裡填入「實驗室專案」的網址，未來賣給誰就換成誰的網址
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxawPp4K6DkE_oWK6gizh68aR01KglzpFYpH7wqtOwlPCrO_GYJeyiS2Yq5V062tX3z/exec";
    
    // 自動載入公司資訊
    async function loadCompanyInfo() {
      try {
        const res = await fetch(`${SCRIPT_URL}?action=getCompanyInfo`);
        const info = await res.json();
        if(info.name) {
             document.title = `預約 | ${info.name}`;
             document.getElementById('ui-company-name').textContent = info.name;
        }
        if(info.address) document.getElementById('ui-address').textContent = info.address;
        if(info.mapUrl) document.getElementById('ui-map-link').href = info.mapUrl;
      } catch (e) {
        console.error("載入失敗", e);
        document.getElementById('ui-company-name').textContent = "系統資訊載入失敗";
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('current-year').textContent = new Date().getFullYear();
      loadCompanyInfo(); // 🟢 執行載入
      renderCalendar();
    });

    async function renderCalendar() {
      const container = document.getElementById('calendar-container');
      container.innerHTML = '<p style="color: #a67c52; text-align: center;">載入中...</p>';
      try {
        const res = await fetch(`${SCRIPT_URL}?action=getDates`);
        const dates = await res.json();
        container.innerHTML = '';
        if (!dates || dates.length === 0) {
          container.innerHTML = '<p style="color: #a67c52; text-align: center;">目前無可預約日期</p>';
          return;
        }
        const datesByMonth = {};
        dates.forEach(dateObj => {
          const parts = dateObj.value.split('-'); 
          const year = parseInt(parts[0]);
          const month = parseInt(parts[1]);
          const yearMonth = year + '-' + String(month).padStart(2, '0');
          if (!datesByMonth[yearMonth]) datesByMonth[yearMonth] = [];
          datesByMonth[yearMonth].push(dateObj.value);
        });
        
        Object.keys(datesByMonth).sort().forEach(yearMonth => {
          const [year, month] = yearMonth.split('-');
          renderMonthCalendar(container, parseInt(year), parseInt(month), new Set(datesByMonth[yearMonth]));
        });
      } catch (e) {
        container.innerHTML = '<p style="color: #c9705f; text-align: center;">載入失敗，請重新整理頁面</p>';
      }
    }

    document.getElementById('sleeping-position-other-text').addEventListener('focus', function() {
      document.getElementById('sleeping-position-other').checked = true;
    });
    document.getElementById('mattress-other-text').addEventListener('focus', function() {
      document.getElementById('mattress-other').checked = true;
    });
    document.getElementById('concern-other-text').addEventListener('focus', function() {
      document.getElementById('concern-other').checked = true;
    });

    function renderMonthCalendar(container, year, month, availableDates) {
      const section = document.createElement('div');
      section.innerHTML = `<div class="month-title">${year}年${month}月</div>`;
      const header = document.createElement('div');
      header.className = 'calendar-header';
      ['日','一','二','三','四','五','六'].forEach(d => {
        header.innerHTML += `<div class="weekday-header">${d}</div>`;
      });
      section.appendChild(header);
      const grid = document.createElement('div');
      grid.className = 'calendar-grid';
      const first = new Date(year, month - 1, 1).getDay();
      const last = new Date(year, month, 0).getDate();
      for(let i=0; i<first; i++) grid.appendChild(document.createElement('div'));
      for(let d=1; d<=last; d++) {
        const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const dayCell = document.createElement('div');
        dayCell.className = 'calendar-day' + (availableDates.has(dateStr) ? ' available' : '');
        dayCell.textContent = d;
        if(availableDates.has(dateStr)) dayCell.onclick = () => {
          document.querySelectorAll('.calendar-day.selected').forEach(el => el.classList.remove('selected'));
          dayCell.classList.add('selected');
          document.getElementById('selected-date').value = dateStr;
          document.getElementById('selected-time-slot').value = '';
          loadTimeSlots(dateStr);
        };
        grid.appendChild(dayCell);
      }
      section.appendChild(grid);
      container.appendChild(section);
    }

    async function loadTimeSlots(dateStr) {
      const container = document.getElementById('time-slots-container');
      document.getElementById('time-slot-section').style.display = 'block';
      container.innerHTML = '載入中...';
      try {
        const res = await fetch(`${SCRIPT_URL}?action=getSlots&date=${encodeURIComponent(dateStr)}`);
        const slots = await res.json();
        container.innerHTML = '';
        
        if (!slots || slots.length === 0) {
          container.innerHTML = '<p style="color: #c9705f; grid-column: 1/-1; padding: 20px;">抱歉，此日期的時段已全數約滿，請選擇其他日期。</p>';
          return;
        }

        slots.forEach(slot => {
          const div = document.createElement('div');
          div.className = 'time-slot';
          div.textContent = slot.display;
          div.onclick = () => {
            document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
            div.classList.add('selected');
            document.getElementById('selected-time-slot').value = slot.time;
          };
          container.appendChild(div);
        });
      } catch (e) { 
        container.innerHTML = '載入時段失敗，請重試'; 
      }
    }

    function getCheckboxValues(name) {
      const checked = document.querySelectorAll(`input[name="${name}"]:checked`);
      return Array.from(checked).map(cb => {
        if(cb.value === '其他') {
          const otherText = document.getElementById(cb.id + '-text').value;
          return otherText ? `其他：${otherText}` : '其他';
        }
        return cb.value;
      }).join('、');
    }

    document.getElementById('booking-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const mattressRadio = document.querySelector('input[name="mattress_type"]:checked');
      let mattressVal = mattressRadio ? mattressRadio.value : '';
      if(mattressVal === '其他') mattressVal = '其他：' + document.getElementById('mattress-other-text').value;

      const dateVal = document.getElementById('selected-date').value;
      const timeVal = document.getElementById('selected-time-slot').value;

      const data = {
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        email: document.getElementById('email').value,
        numberOfPeople: document.getElementById('numberOfPeople').value,
        date: dateVal,
        timeSlot: timeVal,
        sleepingPosition: getCheckboxValues('sleepingPosition'),
        mattress_type: mattressVal,
        mainConcern: getCheckboxValues('mainConcern'),
        sleepIssues: document.getElementById('sleepIssues').value,
        specialRequests: document.getElementById('specialRequests').value
      };

      if(!data.date || !data.timeSlot) { 
        showMessageModal('溫馨提醒', '請先選擇「日期」與「時段」再送出表單。'); 
        return; 
      }

      const form = document.getElementById('booking-form');
      const loading = document.getElementById('loading');
      const successMsg = document.getElementById('success-message');

      form.style.display = 'none';
      loading.style.display = 'block';

      try {
        const res = await fetch(`${SCRIPT_URL}?action=submit`, {
          method: 'POST',
          body: JSON.stringify(data)
        });
        const result = await res.json();
        
        loading.style.display = 'none';
        
        if(result.success) {
          currentBookingId = result.bookingId;

          document.getElementById('display-date').textContent = dateVal;
          document.getElementById('display-time').textContent = timeVal;
          successMsg.classList.remove('hidden');
          window.scrollTo({ top: 0, behavior: 'smooth' });

          startCountdown();
        } else { 
          showMessageModal('預約失敗', result.message); 
          form.style.display = 'block'; 
        }
      } catch (e) { 
        showMessageModal('系統錯誤', '提交失敗，請稍後再試。'); 
        loading.style.display = 'none';
        form.style.display = 'block'; 
      }
    });

    function startCountdown() {
      let timeLeft = 600; 
      const countdownEl = document.getElementById('countdown');
      const cancelSection = document.getElementById('cancel-section');
      cancelSection.style.display = 'block';
      
      const timer = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        countdownEl.textContent = `${m}:${s < 10 ? '0'+s : s}`;
        
        if (timeLeft <= 0) {
          clearInterval(timer);
          cancelSection.style.display = 'none'; 
        }
      }, 1000);
    }

    document.getElementById('cancel-btn').addEventListener('click', function() {
      showConfirmModal('確認取消', '請問確定要取消剛才的預約嗎？', async function() {
        const btn = document.getElementById('cancel-btn');
        btn.textContent = '處理中...';
        btn.disabled = true;

        try {
          const res = await fetch(`${SCRIPT_URL}?action=cancel`, {
            method: 'POST',
            body: JSON.stringify({ bookingId: currentBookingId })
          });
          const result = await res.json();

          if (result.success) {
            showMessageModal('取消成功', '您的預約已經成功取消。');
            document.getElementById('success-message').classList.add('hidden');
            document.getElementById('booking-form').style.display = 'block';
            document.getElementById('booking-form').reset(); 
            document.querySelectorAll('.calendar-day.selected').forEach(el => el.classList.remove('selected'));
            document.getElementById('time-slot-section').style.display = 'none';
          } else {
            showMessageModal('取消失敗', result.message);
          }
        } catch (e) {
          showMessageModal('網路錯誤', '無法取消，請稍後重試。');
        } finally {
          btn.textContent = '取消並重新填寫';
          btn.disabled = false;
        }
      });
    });

    renderCalendar();
  </script>
</body>
</html>
