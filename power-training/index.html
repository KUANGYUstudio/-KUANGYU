<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>光聿功率課</title>
  <style>
    /* =========================================
       全局設定 (極簡質感版)
       ========================================= */
    :root {
      --bg-color: #f8f9fa;
      --card-bg: #ffffff;
      --text-main: #2c3e50;
      --text-sub: #95a5a6;
      
      /* 更加柔和、擴散的高級陰影 */
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
      --shadow-hover: 0 12px 24px rgba(0, 0, 0, 0.08);
      
      --radius: 16px;
      
      /* 定義各區塊代表色 */
      --color-weekday: #00bcd4; /* 平日藍 */
      --color-online: #a5d6a7;  /* 線上綠 */
      --color-weekend: #ff8a65; /* 週末橘 */
    }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 40px 24px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* =========================================
       Logo 設定 (新增此段 CSS)
       ========================================= */
    .main-logo {
        display: block;
        margin: 0 auto 5px; /* 置中，下方留一點白 */
        width: 40px;        /* 手機版預設大小：40px */
        height: auto;
    }

    /* 電腦版變大 */
    @media (min-width: 751px) {
        .main-logo {
            width: 60px;     /* 電腦版大小：60px */
            margin-bottom: 10px;
        }
    }

    /* === 標題區 (移除裝飾線，回歸純粹) === */
    .header {
      margin-bottom: 40px;
      text-align: center;
    }
    h1 {
      font-size: 28px;
      margin: 0.1em 0 8px; /* 稍微增加一點點上方間距來配合 Logo */
      font-weight: 800;
      letter-spacing: 1.5px;
      color: #2c3e50;
    }
    p {
      font-size: 15px;
      color: var(--text-sub);
      margin: 0;
      letter-spacing: 0.5px;
    }

    /* 按鈕容器 */
    .menu-grid {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* === 卡片樣式 === */
    .card-btn {
      display: flex;
      align-items: center;
      padding: 28px 24px;
      background: var(--card-bg);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text-main);
      box-shadow: var(--shadow-sm);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      position: relative;
      overflow: hidden;
      border-left: 6px solid transparent; 
    }

    /* 懸浮與點擊效果 */
    .card-btn:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }
    .card-btn:active {
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }
    
    /* 文字區塊 */
    .btn-content {
      flex: 1;
      padding-left: 8px; 
    }
    .btn-title {
      font-size: 19px;
      font-weight: 700;
      display: block;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      color: #333;
    }
    .btn-desc {
      font-size: 14px;
      color: #888;
      display: block;
      font-weight: 400;
    }

    /* 個別按鈕顏色設定 */
    .card-btn.weekday { border-left-color: var(--color-weekday); }
    .card-btn.online  { border-left-color: var(--color-online); }
    .card-btn.weekend { border-left-color: var(--color-weekend); }

    /* === 精緻的 CSS 箭頭 === */
    .arrow-container {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.4;
      transition: opacity 0.3s, transform 0.3s;
    }
    /* 讓箭頭跟隨卡片主題色 */
    .card-btn.weekday .arrow-container { color: var(--color-weekday); }
    .card-btn.online .arrow-container  { color: var(--color-online); }
    .card-btn.weekend .arrow-container { color: var(--color-weekend); }

    .arrow {
      border: solid currentColor;
      border-width: 0 2.5px 2.5px 0;
      display: inline-block;
      padding: 4px;
      transform: rotate(-45deg);
    }

    /* 懸浮時箭頭變亮且稍微移動 */
    .card-btn:hover .arrow-container {
      opacity: 1;
      transform: translateX(4px);
    }

    /* 頁尾 */
    .footer {
      margin-top: 60px;
      font-size: 12px;
      color: #d1d5db;
      text-align: center;
      letter-spacing: 2px;
      font-weight: 500;
    }

  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <img src="../KUANGYU_logo_icon.png" alt="光聿 Logo" class="main-logo">
      <h1>光聿功率課</h1>
      <p>請選擇您的訓練計畫</p>
    </div>

    <div class="menu-grid">
      
      <a href="#" id="weekday-link" class="card-btn weekday">
        <div class="btn-content">
          <span class="btn-title">平日功率課</span>
          <span class="btn-desc">週二 / 週四晚班 & 週三早班</span>
        </div>
        <div class="arrow-container"><div class="arrow"></div></div>
      </a>

      <a href="#" id="weekend-link" class="card-btn weekend">
        <div class="btn-content">
          <span class="btn-title">週末長距離</span>
          <span class="btn-desc">室內功率3hr起＋轉換跑</span>
        </div>
        <div class="arrow-container"><div class="arrow"></div></div>
      </a>

    </div>

    <div class="footer">
      KUANGYU STUDIO
    </div>
  </div>

  <script>
    // 取得網址參數
    function getParam(key) {
      return new URLSearchParams(window.location.search).get(key) || '';
    }
    const name = getParam('name');
    const lineId = getParam('lineId');
    
    // 組合參數字串
    const params = `?name=${encodeURIComponent(name)}&lineId=${encodeURIComponent(lineId)}`;
    
    // 設定連結 (完全保留您原本的寫法，包含短橫線)
    document.getElementById('weekday-link').href = `signup_weekday.html${params}`;
    document.getElementById('weekend-link').href = `signup-weekend.html${params}`;
  </script>

</body>
</html>
