<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>長距離訓練</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* =========================================
       🎨 配色定義 (FirstClass 風格 - 週末橙版)
       ========================================= */
    :root {
      /* 週末課 - 活力橙 */
      --weekend-main: #ff7043; 
      --weekend-light: #ff8a65;
      --weekend-bg: #fbe9e7;
      
      /* 系統色 */
      --text-main: #2c3e50;
      --text-sub: #546e7a;
      --bg-color: #ffffff;
      --cancel-gold: #ffa000;
    }

    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: var(--bg-color); 
      margin: 0;
      padding: 0;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center; 
    }
    .container {
      max-width: 800px; 
      width: 100%;
      margin: 0 auto;
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
      position: relative;
    }
    
    /* =========================================
       🔥 Logo 設定 (統一置中，手機優先)
       ========================================= */
    .main-logo {
        display: block;
        margin: 0 auto 5px; /* 置中，下方留一點白 */
        width: 40px;        /* 🎯 手機版預設大小：40px */
        height: auto;
    }

    /* 💻 電腦版變大 (當螢幕寬度大於 750px 時) */
    @media (min-width: 751px) {
        .main-logo {
            width: 60px;     /* 🎯 電腦版大小：60px */
            margin-bottom: 10px;
        }
    }
    
    /* 標題設定 */
    h1 {
      font-size: 32px;
      margin: 0.1em 0 0.2em; /* 配合上方 Logo，縮小間距 */
      color: var(--text-main);
      font-weight: 800;
      letter-spacing: 1px;
    }

    /* === 👋 歡迎訊息 === */
    .user-welcome {
        font-size: 18px;
        color: var(--weekend-main);
        margin-bottom: 4px;
        font-weight: bold;
        min-height: 20px;
    }

    /* === 🔑 會員驗證區 (Email) === */
    .login-section {
        background-color: #fafafa;
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 20px;
        border: 1px solid #eee;
        display: none; 
        text-align: left;
        max-width: 500px;
        margin-left: auto;
        margin-right: auto;
    }
    .login-title { font-weight: bold; margin-bottom: 8px; color: var(--text-main); font-size: 16px; }
    .login-input-group { display: flex; gap: 8px; }
    .login-input {
        flex: 1;
        padding: 10px; font-size: 16px; border-radius: 8px; border: 1px solid #ddd;
        outline: none; transition: border 0.3s;
    }
    .login-input:focus { border-color: var(--weekend-main); }
    .login-btn {
        padding: 10px 20px; font-size: 16px; border-radius: 8px; border: none; 
        background-color: var(--text-main); color: white; cursor: pointer;
        font-weight: bold;
    }

    /* === 📅 課程時間表 === */
    .schedule-box {
      text-align: left;
      display: block; 
      margin-bottom: 20px;
      background: #fafafa;
      padding: 15px 20px;
      border-radius: 12px;
      border: 1px solid #eee;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    .schedule-row {
      margin: 8px 0;
      font-size: 16px;
      color: var(--text-sub);
      display: flex;
      align-items: center;
    }
    .time-badge {
        display: inline-block;
        width: 80px;
        text-align: center;
        padding: 4px 0;
        border-radius: 6px;
        font-size: 14px;
        margin-right: 12px;
        font-weight: bold;
        color: white;
        flex-shrink: 0; 
    }
    .badge-weekend { background-color: var(--weekend-main); }

    /* === Modal 彈窗樣式 (新增) === */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 10000; }
    .modal-box { background: white; padding: 30px; border-radius: 24px; text-align: center; max-width: 320px; width: 85%; box-shadow: 0 15px 35px rgba(0,0,0,0.2); animation: modalShow 0.3s ease-out; }
    @keyframes modalShow { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .modal-title { font-size: 20px; font-weight: 800; color: #2c3e50; margin-bottom: 10px; }
    
    .modal-btn { 
        margin-top: 20px; padding: 12px 0; border-radius: 50px; border: none; 
        background: var(--weekend-main); color: white; font-weight: bold; cursor: pointer; 
        width: 50%; min-width: 120px; display: block; margin-left: auto; margin-right: auto;
        font-size: 16px; transition: background 0.2s; 
    }
    .modal-btn:hover { background: var(--weekend-light); }

    .btn-red { background-color: #ff5252 !important; width: 100% !important; min-width: auto !important; }
    .btn-gray { background-color: #eee !important; color: #333 !important; width: 100% !important; min-width: auto !important; }

    /* === 載入動畫 === */
    .loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.98);
      display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
    }
    .loading-spinner {
      width: 50px; height: 50px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid var(--weekend-main);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loading-text { margin-top: 20px; font-size: 18px; color: #666; font-weight: 500; }

    /* === 日曆樣式 === */
    .month-title {
      font-weight: 800;
      font-size: 24px; 
      margin: 1.5em 0 0.8em;
      color: var(--text-main);
    }
    .calendar-header, .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      padding: 0;
      box-sizing: border-box;
      max-width: 100%;
    }
    .weekday-header {
      font-weight: bold;
      font-size: 16px; 
      text-align: center;
      color: #b0bec5;
      padding-bottom: 10px; 
    }
    
    .day {
      aspect-ratio: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 12px; 
      background-color: #f7f9fa;
      color: #cfd8dc;
      cursor: default;
      box-sizing: border-box;
      transition: all 0.1s;
      position: relative;
    }

    /* 空白格保持透明但維持高度 */
    .day.empty { background-color: transparent; }
    
    .day-number { 
        font-size: 22px; 
        font-weight: bold; 
        margin-bottom: 2px; 
        line-height: 1; 
    }
    
    .day-label { 
        font-size: 12px; 
        margin-top: 2px; 
        font-weight: normal; 
        line-height: 1; 
    }

    /* === 週末課樣式 (橙色) === */
    .day.available.weekend {
      background-color: #fff;
      color: #333;
      border: 2px solid var(--weekend-main);
      cursor: pointer;
    }
    .day.available.weekend .day-label { 
        color: var(--weekend-main); 
    }
    
    .day.selected.weekend {
      background-color: var(--weekend-main);
      color: #fff;
      border-color: var(--weekend-main);
      transform: scale(1.05);
      box-shadow: 0 4px 10px rgba(255, 112, 67, 0.4);
    }
    .day.selected.weekend .day-label { color: #fff; }
    
    /* 調整時限內樣式 (新增) */
    .day.registered.can-cancel { 
        background-color: #fbe9e7 !important; /* weekend-bg */
        border: 2px solid var(--weekend-main) !important; 
        color: var(--weekend-main) !important; 
        cursor: pointer !important; 
    }

    .day.registered {
      background-color: #eceff1;
      color: #b0bec5;
      border: 2px solid #cfd8dc; 
      cursor: not-allowed;
    }
    .day.registered .day-label { color: #b0bec5; }

    .day.full {
      background-color: #e0e0e0;
      color: #666; 
      cursor: not-allowed;
      border: 2px solid var(--weekend-main); 
      opacity: 0.8;
    }
    .day.full .full-label { font-size: 11px; color: #666; margin-top: 2px;}

    #submit-btn {
      margin: 40px auto 20px; 
      padding: 16px 0;
      font-size: 20px;
      letter-spacing: 1px;
      background: var(--weekend-main); 
      color: #fff;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      max-width: 260px;
      display: block;
      width: 100%;
      font-weight: bold;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(255, 112, 67, 0.3);
    }
    #submit-btn:disabled { 
        background-color: #cfd8dc; 
        cursor: not-allowed; 
        box-shadow: none;
    }

    @media (max-width: 750px) {
      .container { margin: 0; padding: 15px; }
      h1 { 
          font-size: 26px; 
          margin-top: 0.1em;
      }
      .schedule-box { padding: 12px 15px; }
      .calendar-header, .calendar-grid { gap: 4px; }
      .day { font-size: 22px; border-radius: 8px; }
      .day-number { font-size: 16px; } 
      .day-label { font-size: 9px; }
      #submit-btn { font-size: 18px; max-width: 60%; }
    }
  </style>
</head>
<body>
  <div id="cancel-modal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-title" id="cancel-modal-title">調整登記</div>
        <div id="cancel-modal-msg" style="color: #444; font-size: 16px; line-height: 1.8; margin: 15px 0;"></div>
        <div id="cancel-modal-footer" style="display: flex; gap: 10px; justify-content: center;">
          <button class="modal-btn btn-gray" onclick="closeCancelModal()">先不要</button>
          <button class="modal-btn btn-red" id="confirm-cancel-btn">取消登記</button>
        </div>
        <button id="cancel-close-btn" class="modal-btn" style="display:none;" onclick="closeCancelModal()">確定</button>
    </div>
  </div>

  <div id="alert-modal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-title" id="alert-title">提示</div>
        <div id="alert-msg" style="color: #444; font-size: 16px; line-height: 1.6; margin: 15px 0;"></div>
        <button class="modal-btn" id="alert-btn">確定</button>
    </div>
  </div>

  <div id="loading" class="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">載入課程與身分...</div>
  </div>

  <div class="container">
    
    <img src="../KUANGYU_logo_icon.png" alt="光聿 Logo" class="main-logo">

    <h1>長距離訓練</h1>
    <div id="welcome-msg" class="user-welcome"></div> 

    <div id="login-area" class="login-section">
        <div class="login-title">⚠️ 請驗證會員身分</div>
        <div style="font-size:13px; color:#666; margin-bottom:10px;">請輸入您留存的「Email」進行驗證</div>
        <div class="login-input-group">
            <input type="email" id="member-search-email" class="login-input" placeholder="例如：example@gmail.com">
            <button onclick="searchMember()" class="login-btn">驗證</button>
        </div>
        <div id="login-error" style="color:#e53935; margin-top:8px; font-size:13px;"></div>
    </div>

  <div class="schedule-box">
        <div style="text-align: left; margin-bottom: 8px;">
            <span class="time-badge badge-weekend" style="width: auto; padding: 4px 12px; white-space: nowrap;">近期目標賽事</span>
        </div>
        
        <div style="font-weight: bold; color: #2c3e50; font-size: 16px; text-align: left; line-height: 1.6; margin-bottom: 12px; padding-left: 4px;">
            3月 普悠瑪鐵人賽<br>
            4月 IRONMAN澎湖、Challenge Taiwan
        </div>
        
        <div style="font-size: 14px; color: var(--text-sub); line-height: 1.8; text-align: left; padding-left: 4px; border-top: 1px solid #eee; padding-top: 10px;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <span style="color: var(--weekend-main); font-size: 10px;">●</span> 
                <span>週末功率課程，堂數扣２堂</span>
            </div>
            <div style="display: flex; align-items: center; gap: 8px;">
                <span style="color: var(--weekend-main); font-size: 10px;">●</span> 
                <span>課程所需時間依群組公告</span>
            </div>
        </div>
    </div>
    
    <div id="calendar"></div>
    <button id="submit-btn" style="display:none;">送出選課</button>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwaAiWuCchIr3I4cpPD0GzWqgE9AW4MEXYuPKOFOldl3mQE1WxjCECssLVetJC5Wb-O/exec";

    const selectedDates = new Set(); 
    let myRegisteredDetails = []; 
    let weekendInfo = {};
    let currentUser = { name: "", lineId: "" };
    let countdownInterval = null;

    function getParam(key) { 
      return new URLSearchParams(window.location.search).get(key) || ''; 
    }
    function closeCancelModal() { document.getElementById('cancel-modal').style.display = 'none'; if (countdownInterval) clearInterval(countdownInterval); }

    function showSystemAlert(title, message, callback) {
        document.getElementById('alert-title').textContent = title;
        document.getElementById('alert-msg').textContent = message;
        
        const btn = document.getElementById('alert-btn');
        const newBtn = btn.cloneNode(true);
        btn.parentNode.replaceChild(newBtn, btn);

        newBtn.onclick = () => {
             document.getElementById('alert-modal').style.display = 'none';
             if (callback) callback();
        };
        document.getElementById('alert-modal').style.display = 'flex';
    }

    async function initSystem() {
        const loadingDiv = document.getElementById('loading');
        loadingDiv.style.display = 'flex';

        let urlName = getParam('name');
        let urlLineId = getParam('lineId');

        if (urlName && urlLineId) {
            currentUser.name = urlName;
            currentUser.lineId = urlLineId;
            loginSuccess();
        } else {
            loadingDiv.style.display = 'none';
            document.getElementById('login-area').style.display = 'block';
        }
    }

    async function searchMember() {
        const emailInput = document.getElementById('member-search-email').value.trim();
        const errorMsg = document.getElementById('login-error');
        const loadingDiv = document.getElementById('loading');

        if (!emailInput) {
            errorMsg.textContent = "請輸入 Email";
            return;
        }

        loadingDiv.style.display = 'flex';
        document.querySelector('.loading-text').textContent = "正在搜尋會員資料...";
        
        try {
            const res = await fetch(`${SCRIPT_URL}?mode=search_member&email=${encodeURIComponent(emailInput)}`);
            const data = await res.json();

            if (data.found) {
                currentUser.name = data.name;
                currentUser.lineId = data.lineId;
                errorMsg.textContent = "";
                loginSuccess();
            } else {
                loadingDiv.style.display = 'none';
                errorMsg.textContent = "❌ 找不到此 Email，請確認是否與報名資料一致";
            }
        } catch (e) {
            console.error(e);
            loadingDiv.style.display = 'none';
            errorMsg.textContent = "系統連線錯誤";
        }
    }

    async function loginSuccess() {
        const loadingDiv = document.getElementById('loading');
        document.getElementById('login-area').style.display = 'none'; 
        document.getElementById('submit-btn').style.display = 'block'; 
        document.querySelector('.loading-text').textContent = "載入課程資料...";
        if(loadingDiv.style.display === 'none') loadingDiv.style.display = 'flex';

        await renderCalendar();
        loadingDiv.style.display = 'none';
    }

    async function loadAllData() {
      try {
        const targetLineId = currentUser.lineId || "";
        const res = await fetch(`${SCRIPT_URL}?mode=weekendAllData&lineId=${encodeURIComponent(targetLineId)}`);
        const data = await res.json();
        return {
          dates: data.dates || [],
          info: data.info || {},
          mySignupsDetails: data.mySignupsDetails || [],
          counts: data.counts || {}
        };
      } catch (error) {
        console.error('載入資料錯誤:', error);
        return { dates: [], info: {}, mySignupsDetails: [], counts: {} };
      }
    }

    async function renderCalendar() {
      const calendarDiv = document.getElementById('calendar');
      calendarDiv.innerHTML = '';

      const allData = await loadAllData();
      const availableDates = allData.dates;
      myRegisteredDetails = allData.mySignupsDetails;
      weekendInfo = allData.info;
      const signupCounts = allData.counts;
      const availableSet = new Set(availableDates);

      if (!availableDates.length) {
        calendarDiv.innerHTML = '<div style="color:red; font-size: 1.2em; margin-top: 20px;">⚠️ 目前無週末團練開課</div>';
        return;
      }

      const start = new Date(availableDates[0]);
      const end = new Date(availableDates[availableDates.length - 1]);
      const nowTs = new Date().getTime(); 

      for (let y = start.getFullYear(); y <= end.getFullYear(); y++) {
        for (let m = 0; m < 12; m++) {
          const first = new Date(y, m, 1);
          const last = new Date(y, m + 1, 0);
          if (last < start || first > end) continue;

          const title = document.createElement('div');
          title.className = 'month-title';
          title.textContent = `${y}年${m + 1}月`;
          calendarDiv.appendChild(title);

          const header = document.createElement('div');
          header.className = 'calendar-header';
          ['日','一','二','三','四','五','六'].forEach(d => {
            const h = document.createElement('div');
            h.className = 'weekday-header'; h.textContent = d; header.appendChild(h);
          });
          calendarDiv.appendChild(header);

          const grid = document.createElement('div');
          grid.className = 'calendar-grid';

          for (let i = 0; i < first.getDay(); i++) {
            const emptyCell = document.createElement('div');
            emptyCell.className = 'day empty';
            grid.appendChild(emptyCell);
          }

          for (let d = 1; d <= last.getDate(); d++) {
            const dateStr = `${y}/${String(m + 1).padStart(2, '0')}/${String(d).padStart(2, '0')}`;
            const cell = document.createElement('div');
            cell.className = 'day';
            
            const numSpan = document.createElement('span');
            numSpan.className = 'day-number';
            numSpan.textContent = d;
            cell.appendChild(numSpan);

            let currentCount = 0;
            let maxCapacity = 15;
            
            if (signupCounts[dateStr]) {
                currentCount = signupCounts[dateStr].weekend || 0;
            }
            if (weekendInfo[dateStr]) {
                maxCapacity = weekendInfo[dateStr].maxCapacity || 15;
            }
            
            const isFull = currentCount >= maxCapacity;
            
            // 找出是否已登記
            const myRecord = myRegisteredDetails.find(r => r.date === dateStr);

            if (myRecord) {
              const diff = nowTs - myRecord.signupTime;
              cell.classList.add('registered');
              
              if (diff <= 600000) {
                  cell.classList.add('can-cancel');
                  cell.onclick = () => {
                    const updateCancelModal = () => {
                      const now = new Date().getTime();
                      const remainMs = 600000 - (now - myRecord.signupTime);
                      const msgEl = document.getElementById('cancel-modal-msg'), titleEl = document.getElementById('cancel-modal-title');
                      const footer = document.getElementById('cancel-modal-footer'), closeBtn = document.getElementById('cancel-close-btn');
                      if (remainMs > 0) {
                        const mins = Math.floor(remainMs / 60000), secs = Math.floor((remainMs % 60000) / 1000);
                        titleEl.textContent = "取消登記";
                        msgEl.innerHTML = `您已登記 ${dateStr} 團練。<br>還有 <b style="font-size: 22px; color: var(--cancel-gold);">${mins} 分 ${secs.toString().padStart(2, '0')} 秒</b> 可以取消登記喔！`;
                        footer.style.display = 'flex'; closeBtn.style.display = 'none';
                        document.getElementById('confirm-cancel-btn').onclick = () => { closeCancelModal(); handleCancel(dateStr); };
                      } else {
                        if (countdownInterval) clearInterval(countdownInterval);
                        titleEl.textContent = "課程已完成登記！"; msgEl.innerHTML = `如需請假，請直接私訊教練。`;
                        footer.style.display = 'none'; closeBtn.style.display = 'block';
                      }
                      document.getElementById('cancel-modal').style.display = 'flex';
                    };
                    updateCancelModal(); if (countdownInterval) clearInterval(countdownInterval);
                    countdownInterval = setInterval(updateCancelModal, 1000);
                  };
              }

              const label = document.createElement('div');
              label.className = 'day-label';
              label.textContent = "已登記";
              cell.appendChild(label);
            } else if (isFull && availableSet.has(dateStr)) {
              cell.classList.add('full');
              const label = document.createElement('div');
              label.className = 'full-label';
              label.textContent = "額滿";
              cell.appendChild(label);
            } else if (availableSet.has(dateStr)) {
              cell.classList.add('available');
              cell.classList.add('weekend'); 
              
              const info = weekendInfo[dateStr];
              if (info) {
                  const timeLabel = document.createElement('div');
                  timeLabel.className = 'day-label';
                  timeLabel.textContent = info.startTime;
                  cell.appendChild(timeLabel);
              }

              cell.onclick = () => {
                if (selectedDates.has(dateStr)) {
                  selectedDates.delete(dateStr);
                  cell.classList.remove('selected');
                } else {
                  selectedDates.add(dateStr);
                  cell.classList.add('selected');
                }
                updateSubmitButton();
              };
            }
            grid.appendChild(cell);
          }
          calendarDiv.appendChild(grid);
        }
      }
    }

    function updateSubmitButton() {
        const btn = document.getElementById('submit-btn');
        if (selectedDates.size > 0) {
            btn.textContent = `確認送出 (${selectedDates.size}堂)`;
            btn.disabled = false;
        } else {
            btn.textContent = "請先選擇日期";
            btn.disabled = true; 
        }
    }

    async function handleCancel(dateStr) {
      const loadingDiv = document.getElementById('loading');
      loadingDiv.style.display = 'flex';
      document.querySelector('.loading-text').textContent = "正在取消登記...";
      
      try {
        const res = await fetch(`${SCRIPT_URL}?mode=cancel&date=${encodeURIComponent(dateStr)}&lineId=${encodeURIComponent(currentUser.lineId)}`);
        const data = await res.json();
        
        loadingDiv.style.display = 'none';

        if (data.status === 'success') {
             showSystemAlert('取消成功！', '', () => { location.reload(); });
        } else {
             showSystemAlert('提示', data.message, () => { location.reload(); });
        }

      } catch (e) { 
        loadingDiv.style.display = 'none';
        showSystemAlert("連線錯誤", "系統連線失敗，請稍後再試。", null);
      }
    }

    document.getElementById('submit-btn').addEventListener('click', async () => {
      if (!currentUser.name || !currentUser.lineId) {
          showSystemAlert('提示', '請先進行會員驗證');
          return;
      }
      if (!selectedDates.size) {
          showSystemAlert('提示', '請至少選擇一個日期');
          return;
      }

      const loadingDiv = document.getElementById('loading');
      const btn = document.getElementById('submit-btn');
      
      loadingDiv.style.display = 'flex';
      document.querySelector('.loading-text').textContent = `正在為 ${currentUser.name} 預約中...`;
      btn.disabled = true;

      try {
        for (const date of selectedDates) {
          await fetch(`${SCRIPT_URL}?mode=submit&date=${encodeURIComponent(date)}&courseType=weekend&name=${encodeURIComponent(currentUser.name)}&lineId=${encodeURIComponent(currentUser.lineId)}`);
        }

        loadingDiv.style.display = 'none';
        // 週末班成功提示，這裡保留您原本的 alert 還是要換成 systemAlert? 
        // 為了風格統一，我這邊也幫您升級成 systemAlert
        showSystemAlert('登記成功！', '', () => {
            selectedDates.clear();
            window.location.href = window.location.pathname + '?name=' + encodeURIComponent(currentUser.name) + '&lineId=' + encodeURIComponent(currentUser.lineId);
        });

      } catch (error) {
        console.error('提交錯誤:', error);
        loadingDiv.style.display = 'none';
        btn.disabled = false;
        showSystemAlert('提示', '發生錯誤，請稍後再試');
      }
    });

    initSystem();
  </script>
</body>
</html>
