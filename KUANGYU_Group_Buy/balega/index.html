<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光聿團購 - Balega Running Socks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f8f8f8;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            background: white;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 3px solid #E8601C;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        h1 {
            font-size: 2.5em;
            color: #E8601C;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 1.1em;
            color: #666;
            font-weight: 300;
        }

        /* Main Layout */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        /* Form Section */
        .form-section {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 0.95em;
        }

        input[type="text"],
        input[type="email"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #E8601C;
            box-shadow: 0 0 0 3px rgba(232, 96, 28, 0.1);
        }

        /* Products Section */
        .products-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.3em;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #E8601C;
        }

        .series-group {
            margin-bottom: 30px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .series-name {
            font-size: 1.15em;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .series-description {
            font-size: 0.9em;
            color: #E8601C;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .product-type {
            font-size: 0.95em;
            color: #666;
            font-weight: 600;
            margin-bottom: 12px;
            margin-top: 15px;
        }

        .product-item {
            display: grid;
            grid-template-columns: 120px 1fr auto;
            gap: 15px;
            align-items: center;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 6px;
            margin-bottom: 10px;
            transition: background-color 0.2s;
        }

        .product-item:hover {
            background-color: #f0f0f0;
        }

        @media (max-width: 768px) {
            .product-item {
                grid-template-columns: 1fr;
                gap: 10px;
            }
        }

        .product-image {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .product-image:hover {
            transform: scale(1.05);
        }

        .product-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .product-code {
            font-weight: 600;
            color: #333;
            font-size: 0.95em;
        }

        .product-color {
            color: #666;
            font-size: 0.9em;
        }

        .product-price {
            color: #E8601C;
            font-weight: 700;
            font-size: 1.1em;
        }

        .size-qty-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        select.size-select {
            padding: 8px 12px;
            font-size: 0.9em;
            min-width: 70px;
        }

        .qty-control {
            display: flex;
            align-items: center;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: white;
        }

        .qty-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: white;
            cursor: pointer;
            font-weight: bold;
            color: #E8601C;
            transition: background-color 0.2s;
        }

        .qty-btn:hover {
            background-color: #f0f0f0;
        }

        .qty-input {
            width: 50px;
            text-align: center;
            border: none;
            font-size: 0.9em;
            padding: 0 5px;
        }

        .qty-input::-webkit-outer-spin-button,
        .qty-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Cart Sidebar */
        .cart-sidebar {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            position: sticky;
            top: 20px;
            height: fit-content;
        }

        .cart-title {
            font-size: 1.2em;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-items {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        .cart-item {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 8px;
            padding: 8px;
            background: #f9f9f9;
            border-radius: 4px;
        }

        .cart-total {
            background: #fff3e0;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            border-left: 4px solid #E8601C;
        }

        .total-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .total-amount {
            font-size: 1.8em;
            font-weight: 700;
            color: #E8601C;
        }

        /* Payment Methods */
        .payment-methods {
            margin-bottom: 20px;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .radio-item:hover {
            background-color: #f9f9f9;
        }

        .radio-item input[type="radio"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
            accent-color: #E8601C;
        }

        .bank-info {
            background: #fff3e0;
            padding: 15px;
            border-radius: 6px;
            margin-top: 10px;
            border-left: 4px solid #E8601C;
            display: none;
        }

        .bank-info.show {
            display: block;
        }

        .bank-info-item {
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        .bank-info-label {
            font-weight: 600;
            color: #333;
        }

        .bank-info-value {
            color: #E8601C;
            font-weight: 700;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button.submit-btn,
        button.reset-btn {
            flex: 1;
            padding: 14px 20px;
            font-size: 1em;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        button.submit-btn {
            background: #E8601C;
            color: white;
        }

        button.submit-btn:hover {
            background: #d14d0a;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(232, 96, 28, 0.3);
        }

        button.submit-btn:active {
            transform: translateY(0);
        }

        button.reset-btn {
            background: #f0f0f0;
            color: #333;
        }

        button.reset-btn:hover {
            background: #e0e0e0;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            animation: fadeIn 0.3s;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 8px;
            max-width: 90%;
            max-height: 90vh;
            overflow: auto;
            position: relative;
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #E8601C;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2em;
            transition: background-color 0.2s;
        }

        .modal-close:hover {
            background: #d14d0a;
        }

        .modal-image {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* Success Message */
        .success-message {
            display: none;
            background: #e8f5e9;
            border: 1px solid #4caf50;
            color: #2e7d32;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            animation: slideDown 0.3s;
        }

        .success-message.show {
            display: block;
        }

        @keyframes slideDown {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .error-message {
            display: none;
            background: #ffebee;
            border: 1px solid #f44336;
            color: #c62828;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .error-message.show {
            display: block;
        }

        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f0f0f0;
            border-top: 4px solid #E8601C;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header>
        <h1>光聿團購</h1>
        <p class="subtitle">Balega Running Socks</p>
    </header>

    <div class="container">
        <div class="main-content">
            <div>
                <div class="success-message" id="successMessage"></div>
                <div class="error-message" id="errorMessage"></div>

                <form id="orderForm" class="form-section">
                    <!-- Personal Info -->
                    <div class="form-group">
                        <label for="name">姓名 *</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <!-- Products Section -->
                    <div class="products-section" id="productsContainer"></div>

                    <!-- Payment Method -->
                    <div class="form-group">
                        <label>付款方式 *</label>
                        <div class="radio-group">
                            <label class="radio-item">
                                <input type="radio" name="paymentMethod" value="bank" required>
                                <span>銀行轉帳</span>
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="paymentMethod" value="cash">
                                <span>現金</span>
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="paymentMethod" value="linepay">
                                <span>LINE Pay</span>
                            </label>
                        </div>
                        <div class="bank-info" id="bankInfo">
                            <div class="bank-info-item">
                                <span class="bank-info-label">銀行：</span>
                                <span class="bank-info-value">國泰世華（013）</span>
                            </div>
                            <div class="bank-info-item">
                                <span class="bank-info-label">帳戶名稱：</span>
                                <span class="bank-info-value">費聿凡</span>
                            </div>
                            <div class="bank-info-item">
                                <span class="bank-info-label">匯款帳號：</span>
                                <span class="bank-info-value">269506136805</span>
                            </div>
                        </div>
                    </div>

                    <!-- Account Last 5 Digits -->
                    <div class="form-group">
                        <label for="accountLast5">帳號後五碼 (銀行轉帳時填寫)</label>
                        <input type="text" id="accountLast5" name="accountLast5" placeholder="例：12345" maxlength="5">
                    </div>

                    <!-- Total Amount -->
                    <div class="form-group">
                        <label for="totalAmount">總金額 *</label>
                        <input type="number" id="totalAmount" name="totalAmount" readonly value="0">
                    </div>

                    <!-- Buttons -->
                    <div class="button-group">
                        <button type="submit" class="submit-btn">提交訂單</button>
                        <button type="reset" class="reset-btn">清除</button>
                    </div>

                    <div class="loading" id="loading">
                        <div class="spinner"></div>
                        <p>正在提交訂單...</p>
                    </div>
                </form>
            </div>

            <!-- Cart Sidebar -->
            <div class="cart-sidebar">
                <div class="cart-title">🛒 購物車</div>
                <div class="cart-items" id="cartItems">
                    <p style="color: #999; font-size: 0.9em;">尚未選擇商品</p>
                </div>
                <div class="cart-total">
                    <div class="total-label">訂單總額</div>
                    <div class="total-amount" id="cartTotal">$0</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Image Modal -->
    <div class="modal" id="imageModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeImageModal()">×</button>
            <img id="modalImage" class="modal-image" src="" alt="放大圖片">
        </div>
    </div>

    <script>
        // Product Data
        const PRODUCTS = [
            {
                series: "HIDDEN COMFORT 雲朵舒適系列",
                description: "柔軟舒適，全天候乾爽",
                type: "NO SHOW 隱形襪",
                items: [
                    { code: "8025-0200", color: "白", sizes: ["S","M","L","XL"], price: 450, image: "https://cdn.shopify.com/s/files/1/0603/5985/6271/products/8025-0200.jpg" },
                    { code: "8025-0300", color: "黑", sizes: ["S","M","L","XL"], price: 450, image: "https://cdn.shopify.com/s/files/1/0603/5985/6271/products/8025-0300.jpg" },
                    { code: "8025-0339", color: "炭灰", sizes: ["S","M","L","XL"], price: 450, image: "https://cdn.shopify.com/s/files/1/0603/5985/6271/products/8025-0339.jpg" },
                ]
            },
            {
                series: "ULTRA LIGHT 超輕快系列",
                description: "超輕薄設計 ，速度首選",
                type: "NO SHOW 隱形襪",
                items: [
                    { code: "8926-3300", color: "黑", sizes: ["S","M","L"], price: 450, image: "https://cdn.shopify.com/s/files/1/0603/5985/6271/products/8926-3300.jpg" },
                    { code: "8926-0331", color: "灰白", sizes: ["S","M","L"], price: 450, image: "https://cdn.shopify.com/s/files/1/0603/5985/6271/products/8926-0331.jpg" },
                ]
            },
            {
                series: "ULTRA LIGHT 超輕快系列",
                description: "超輕薄設計 ，速度首選",
                type: "MINI CREW 中筒襪",
                items: [
                    { code: "8927-3300", color: "黑", sizes: ["S","M","L","XL"], price: 550, image: "https://cdn.shopify.com/s/files/1/0603/5985/6271/products/8927-3300.jpg" },
                    { code: "8927-2200", color: "白", sizes: ["S","M","L","XL"], price: 550, image: "https://cdn.shopify.com/s/files/1/0603/5985/6271/products/8927-2200.jpg" },
                ]
            },
            {
                series: "SILVER 抗菌銀離子系列",
                description: "銀離子抗菌 ，防臭防滑",
                type: "NO SHOW 隱形襪",
                items: [
                    { code: "8073-0339", color: "白灰", sizes: ["S","M","L"], price: 450, image: "https://cdn.shopify.com/s/files/1/0603/5985/6271/products/8073-0339.jpg" },
                    { code: "8073-0300", color: "黑", sizes: ["S","M","L","XL"], price: 450, image: "https://cdn.shopify.com/s/files/1/0603/5985/6271/products/8073-0300.jpg" },
                ]
            }
        ];

        // State
        let cart = {};
        let GAS_URL = "https://script.google.com/macros/d/YOUR_GAS_SCRIPT_ID/usercallback";

        // Initialize
        document.addEventListener('DOMContentLoaded', ( ) => {
            renderProducts();
            setupEventListeners();
        });

        function renderProducts() {
            const container = document.getElementById('productsContainer');
            let html = '';

            PRODUCTS.forEach((group, groupIndex) => {
                html += `
                    <div class="series-group">
                        <div class="series-name">${group.series}</div>
                        <div class="series-description">${group.description}</div>
                        <div class="product-type">${group.type}</div>
                `;

                group.items.forEach((item, itemIndex) => {
                    const key = `${groupIndex}-${itemIndex}`;
                    html += `
                        <div class="product-item">
                            <img src="${item.image}" alt="${item.color}" class="product-image" onclick="openImageModal('${item.image}')">
                            <div class="product-info">
                                <div class="product-code">${item.code} - ${item.color}</div>
                                <div class="product-price">$${item.price}</div>
                            </div>
                            <div class="size-qty-controls">
                                <select class="size-select" data-key="${key}" data-price="${item.price}">
                                    <option value="">選擇尺寸</option>
                                    ${item.sizes.map(size => `<option value="${size}">${size}</option>`).join('')}
                                </select>
                                <div class="qty-control">
                                    <button type="button" class="qty-btn" onclick="decreaseQty('${key}')">−</button>
                                    <input type="number" class="qty-input" id="qty-${key}" value="0" min="0" readonly>
                                    <button type="button" class="qty-btn" onclick="increaseQty('${key}')">+</button>
                                </div>
                            </div>
                        </div>
                    `;
                });

                html += `</div>`;
            });

            container.innerHTML = html;

            // Add event listeners to size selects
            document.querySelectorAll('.size-select').forEach(select => {
                select.addEventListener('change', (e) => {
                    if (e.target.value) {
                        const key = e.target.dataset.key;
                        if (!cart[key]) {
                            cart[key] = { size: e.target.value, qty: 1, price: parseInt(e.target.dataset.price), code: '', color: '' };
                        } else {
                            cart[key].size = e.target.value;
                        }
                        updateCart();
                    }
                });
            });
        }

        function increaseQty(key) {
            const input = document.getElementById(`qty-${key}`);
            const currentQty = parseInt(input.value) || 0;
            input.value = currentQty + 1;
            
            if (!cart[key]) {
                cart[key] = { size: '', qty: currentQty + 1, price: 0, code: '', color: '' };
            } else {
                cart[key].qty = currentQty + 1;
            }
            updateCart();
        }

        function decreaseQty(key) {
            const input = document.getElementById(`qty-${key}`);
            const currentQty = parseInt(input.value) || 0;
            if (currentQty > 0) {
                input.value = currentQty - 1;
                if (currentQty - 1 === 0) {
                    delete cart[key];
                } else {
                    cart[key].qty = currentQty - 1;
                }
                updateCart();
            }
        }

        function updateCart() {
            let total = 0;
            let itemCount = 0;
            let cartHtml = '';

            Object.entries(cart).forEach(([key, item]) => {
                if (item.qty > 0 && item.size) {
                    const subtotal = item.price * item.qty;
                    total += subtotal;
                    itemCount += item.qty;
                    cartHtml += `<div class="cart-item">✓ $${item.price} × ${item.qty} = $${subtotal}</div>`;
                }
            });

            document.getElementById('cartItems').innerHTML = cartHtml || '<p style="color: #999; font-size: 0.9em;">尚未選擇商品</p>';
            document.getElementById('cartTotal').textContent = `$${total}`;
            document.getElementById('totalAmount').value = total;
        }

        function setupEventListeners() {
            document.getElementById('orderForm').addEventListener('submit', handleSubmit);

            document.querySelectorAll('input[name="paymentMethod"]').forEach(radio => {
                radio.addEventListener('change', (e) => {
                    const bankInfo = document.getElementById('bankInfo');
                    if (e.target.value === 'bank') {
                        bankInfo.classList.add('show');
                    } else {
                        bankInfo.classList.remove('show');
                    }
                });
            });
        }

        function openImageModal(imageSrc) {
            document.getElementById('modalImage').src = imageSrc;
            document.getElementById('imageModal').classList.add('show');
        }

        function closeImageModal() {
            document.getElementById('imageModal').classList.remove('show');
        }

        function handleSubmit(e) {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked')?.value;
            const accountLast5 = document.getElementById('accountLast5').value.trim();
            const totalAmount = parseInt(document.getElementById('totalAmount').value);

            // Validation
            if (!name) {
                showError('請填寫姓名');
                return;
            }
            if (!email) {
                showError('請填寫 Email');
                return;
            }
            if (!paymentMethod) {
                showError('請選擇付款方式');
                return;
            }
            if (totalAmount === 0) {
                showError('請選擇商品');
                return;
            }

            // Prepare order data
            const orderItems = [];
            Object.entries(cart).forEach(([key, item]) => {
                if (item.qty > 0 && item.size) {
                    orderItems.push({
                        code: item.code,
                        color: item.color,
                        size: item.size,
                        qty: item.qty,
                        price: item.price,
                        subtotal: item.price * item.qty
                    });
                }
            });

            const orderData = {
                name,
                email,
                paymentMethod,
                accountLast5,
                totalAmount,
                items: orderItems,
                timestamp: new Date().toISOString()
            };

            // Show loading
            document.getElementById('loading').classList.add('show');

            // Submit to Google Apps Script
            submitToGAS(orderData);
        }

        function submitToGAS(orderData) {
            fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify(orderData),
                mode: 'no-cors'
            })
            .then(() => {
                document.getElementById('loading').classList.remove('show');
                showSuccess('訂單已提交！確認信已發送到您的 Email。');
                document.getElementById('orderForm').reset();
                cart = {};
                updateCart();
            })
            .catch(error => {
                document.getElementById('loading').classList.remove('show');
                console.error('Error:', error);
                showError('提交失敗，請稍後重試或聯繫管理員。');
            });
        }

        function showSuccess(message) {
            const el = document.getElementById('successMessage');
            el.textContent = message;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }

        function showError(message) {
            const el = document.getElementById('errorMessage');
            el.textContent = message;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }

        // Close modal when clicking outside
        window.addEventListener('click', (e) => {
            const modal = document.getElementById('imageModal');
            if (e.target === modal) {
                closeImageModal();
            }
        });
    </script>
</body>
</html>
